non_goals_yet:
  - Refonte complète et immédiate des pipelines existants.
  - Déplacement effectif des artefacts canoniques vers un nouveau layout source.
  - Implémentation immédiate des compileurs, validateurs et projections dérivées.

guardrails:
  - Le canon publié reste unique tant que la nouvelle chaîne n'est pas validée.
  - Les pipelines existants restent la référence opérationnelle tant qu'ils ne sont pas explicitement adaptés.
  - Le parallélisme s'applique aux scopes locaux, pas à la promotion finale.
  - Toute reprise doit mettre à jour STATUS.yaml et WORKLOG.md.

immediate_next_step:
  id: APPLY_RUN_AWARE_PIPELINE_AND_RUN_FIRST_EXECUTION
  description: >-
    Appliquer le remplacement run-aware du pipeline constitution, puis préparer et
    utiliser les répertoires `work/`, `reports/` et `outputs/` du premier run
    instancié sous `runs/<run_id>/...`.
