CORE:
  id: learnit_referentiel_core_candidate_v0_5
  core_type: REFERENTIEL
  authority: primary
  version: v0.5-core-candidate
  description: >
    Core candidat référentiel de Learn-it construit à partir du logical draft v0.5.
    Il centralise les paramètres opérationnels, seuils, bornes, tables et garde-fous
    ajustables dans les limites fixées par la Constitution v1.6. Il n'introduit pas
    de logique métier autonome au-delà des règles paramétriques nécessaires à
    l'opérationnalisation locale du moteur.

  TYPES:
    - id: type.referential_parameter_layer
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S1]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.msc_precision_threshold
        - type: governs
          target:
            id: param.msc_robustness_delay_short
        - type: governs
          target:
            id: param.msc_autonomy_success_count
      patchable: true
      parameterizable: true
      human_readable: Couche paramétrique référentielle alignée sur la Constitution.
      logic:
        trigger: Gouvernance du système
        condition: Paramètres opérationnels requis
        effect: Fournit seuils, bornes et tables sans modifier la logique constitutionnelle
        scope: governance

    - id: type.ku_calibration_format_table
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: instantiates
          target:
            id: param.calibration_units_max
      patchable: true
      parameterizable: true
      human_readable: Table des formats et durées de calibrage par type de KU.
      logic:
        trigger: Calibrage initial
        condition: Type de KU connu
        effect: Sélectionne le format diagnostique et la durée cible
        scope: runtime_calibration

    - id: type.temporal_multiplier_table
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.r_multiplier_declarative
        - type: governs
          target:
            id: param.r_multiplier_creative_fallback
      patchable: true
      parameterizable: true
      human_readable: Table des multiplicateurs temporels R par type de KU.
      logic:
        trigger: Calcul de robustesse temporelle
        condition: Type de KU identifié
        effect: Ajuste les délais de robustesse de référence
        scope: runtime_evaluation

    - id: type.adaptive_regime_matrix
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.adaptive_regime_target_states
      patchable: true
      parameterizable: true
      human_readable: Matrice des régimes adaptatifs 3×3 avec activation progressive.
      logic:
        trigger: Configuration du moteur
        condition: Profil adaptatif activé
        effect: Définit l'espace d'états et sa montée en complexité
        scope: runtime_state

    - id: type.signal_confidence_hierarchy
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: validates
          target:
            id: rule.signal_precedence_order
      patchable: true
      parameterizable: true
      human_readable: Hiérarchie de confiance des signaux apprentissage.
      logic:
        trigger: Résolution de signaux contradictoires
        condition: Plusieurs sources disponibles
        effect: Priorise AR-N1, puis AR-N2, puis proxys, puis tendances
        scope: runtime_state

    - id: type.ar_n2_configuration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3][S16]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.ar_n2_frequency_reference
        - type: governs
          target:
            id: param.ar_n2_max_items
      patchable: true
      parameterizable: true
      human_readable: Configuration du mini-sondage AR-N2 et de l'item VC optionnel.
      logic:
        trigger: Fin de session
        condition: AR-N2 activé
        effect: Cadre fréquence, contenu et simplification éventuelle
        scope: runtime_feedback

    - id: type.session_intention_configuration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.session_intention_frequency_reference
      patchable: true
      parameterizable: true
      human_readable: Paramètres de collecte de l'intention de session.
      logic:
        trigger: Préparation inter-session
        condition: Fonction activée
        effect: Propose un item léger et non bloquant
        scope: runtime_feedback

    - id: type.feedback_coverage_metric
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S4][S18]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: validates
          target:
            id: event.feedback_coverage_low
      patchable: true
      parameterizable: true
      human_readable: Métrique de couverture de la matrice de feedback.
      logic:
        trigger: Audit de design ou retour terrain
        condition: Couverture calculable
        effect: Qualifie le niveau de couverture et les signaux de révision
        scope: design_quality

    - id: type.patch_trigger_table
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[tables]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: event.patch_trigger_threshold_crossed
      patchable: true
      parameterizable: true
      human_readable: Table des déclencheurs paramétriques de patch.
      logic:
        trigger: Supervision du système
        condition: Un indicateur franchit son seuil
        effect: Rend le patch éligible selon le type de dérive
        scope: patch_governance

    - id: type.patch_scope_table
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[tables][S6]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: constrains
          target:
            id: constraint.patch_scope_must_remain_constitutionally_bounded
      patchable: true
      parameterizable: false
      human_readable: Table du périmètre autorisé et interdit des patchs.
      logic:
        trigger: Validation d'un patch
        condition: Type d'objet modifié identifié
        effect: Autorise ou interdit l'opération selon la zone impactée
        scope: patch_validation

    - id: type.vc_parameter_block
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S16]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.vc_low_persistence_sessions_reference
      patchable: true
      parameterizable: true
      human_readable: Bloc paramétrique Valeur-Coût perçue.
      logic:
        trigger: Axe VC activé
        condition: Item VC disponible
        effect: Détermine persistance, signalisation et escalade
        scope: runtime_state

    - id: type.ar_refractory_parameter_block
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S17]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: governs
          target:
            id: param.ar_refractory_sessions_reference
      patchable: true
      parameterizable: true
      human_readable: Bloc paramétrique du profil AR-réfractaire.
      logic:
        trigger: Non-réponse répétée AR-N1
        condition: Fenêtre de sessions disponible
        effect: Détecte le profil et borne la réaction système
        scope: runtime_feedback

    - id: type.graph_propagation_operational_note
      authority: derived
      core_type: REFERENTIEL
      source_anchor: '[S19]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: derives_from
          target:
            id: ref.constitution_v1_6
      patchable: false
      parameterizable: false
      human_readable: Note opérationnelle rappelant que la profondeur 1 saut est constitutionnelle.
      logic:
        trigger: Lecture du référentiel
        condition: Besoin d'opérationnalisation
        effect: Documente sans rendre modifiable le 1 saut de propagation
        scope: governance_note

  INVARIANTS:
    - id: invariant.constitutional_and_logic_not_modifiable_here
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: constrains
          target:
            id: param.msc_precision_threshold
      patchable: false
      parameterizable: false
      human_readable: La logique AND du MSC n'est pas modifiable par le Référentiel.
      logic:
        trigger: Révision du modèle MSC
        condition: Changement de logique d'agrégation demandé
        effect: Rejet, seuls les seuils sont ajustables
        scope: governance

    - id: invariant.graph_one_hop_not_modifiable_here
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S19]'
      depends_on:
        - ref.constitution_v1_6
      relations:
        - type: constrains
          target:
            id: type.graph_propagation_operational_note
      patchable: false
      parameterizable: false
      human_readable: La propagation graphe à 1 saut reste un invariant constitutionnel.
      logic:
        trigger: Révision de la propagation
        condition: Profondeur différente demandée
        effect: Interdiction côté Référentiel
        scope: governance

    - id: invariant.patch_quality_checklist_not_modifiable_here
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[tables][S6]'
      depends_on:
        - ref.constitution_v1_6
      relations: []
      patchable: false
      parameterizable: false
      human_readable: La checklist qualité pédagogique des patchs n'est pas modifiable ici.
      logic:
        trigger: Révision du contrôle qualité patch
        condition: Modification de la checklist demandée
        effect: Interdiction côté Référentiel
        scope: patch_governance

    - id: invariant.creative_r_fallback_is_x1
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations:
        - type: governs
          target:
            id: param.r_multiplier_creative_fallback
      patchable: false
      parameterizable: false
      human_readable: Le fallback de robustesse pour KU créative est ×1.
      logic:
        trigger: Calcul de R pour KU créative
        condition: Fallback requis
        effect: Multiplicateur fixé à ×1
        scope: runtime_evaluation

    - id: invariant.vc_unknown_means_no_inference
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S16]'
      depends_on:
        - type.vc_parameter_block
      relations: []
      patchable: false
      parameterizable: false
      human_readable: VC inconnue implique absence totale d'inférence.
      logic:
        trigger: Item VC non renseigné
        condition: Axe VC actif mais donnée absente
        effect: Axe traité comme absent
        scope: runtime_state

    - id: invariant_isolated_low_vc_means_no_action
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S16]'
      depends_on:
        - type.vc_parameter_block
      relations: []
      patchable: false
      parameterizable: false
      human_readable: Une VC basse isolée ne produit aucune action moteur.
      logic:
        trigger: Détection d'une session VC-Basse
        condition: Seuil de persistance non atteint
        effect: Aucune action moteur
        scope: runtime_state

    - id: invariant.session_intention_non_penalized
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - type.session_intention_configuration
      relations: []
      patchable: false
      parameterizable: false
      human_readable: L'intention de session n'est ni pénalisée ni bloquante.
      logic:
        trigger: Collecte ou absence d'intention de session
        condition: Item proposé
        effect: Usage informatif seulement
        scope: runtime_feedback

  RULES:
    - id: rule.signal_precedence_order
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - type.signal_confidence_hierarchy
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Ordre de résolution des signaux AR et proxys.
      logic:
        trigger: Signaux contradictoires
        condition: Plusieurs signaux simultanés
        effect: Priorité AR-N1 > AR-N2 > proxys > tendances
        scope: runtime_state

    - id: rule_interleaving_activation
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - param.interleaving_success_streak
        - param.interleaving_distinct_tasks_min
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Condition d'activation de l'interleaving.
      logic:
        trigger: Vérification de progression
        condition: Réussites consécutives et diversité de tâches suffisantes
        effect: Activation de l'interleaving
        scope: runtime_planning

    - id: rule_coverage_rebalancing_activation
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - param.coverage_rebalancing_delay_multiplier
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Rééquilibration de couverture après délai suffisant.
      logic:
        trigger: Planification de contenu
        condition: Temps depuis présentation ≥ multiplicateur × délai courant
        effect: Rééquilibrage de couverture
        scope: runtime_planning

    - id: rule_adaptive_regime_detection_min_proxies
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - param.adaptive_regime_proxy_min
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Le régime adaptatif requiert au moins 2 proxys franchissant leur seuil.
      logic:
        trigger: Détection de régime
        condition: Nombre de proxys franchissant leur seuil
        effect: Régime détecté sinon réponse conservatrice
        scope: runtime_state

    - id: rule_reduce_ar_n2_frequency_on_low_completion
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - param.ar_n2_completion_threshold
        - param.ar_n2_completion_window_sessions
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Réduction de fréquence AR-N2 en cas de faible complétion.
      logic:
        trigger: Audit de complétion AR-N2
        condition: Taux de complétion sous seuil sur fenêtre donnée
        effect: Réduire la fréquence AR-N2
        scope: runtime_feedback

    - id: rule_reduce_session_intention_frequency_on_low_completion
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on:
        - param.session_intention_completion_threshold
        - param.session_intention_completion_window
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Réduction de fréquence ou simplification du format de l'intention de session.
      logic:
        trigger: Audit de complétion intention
        condition: Taux de complétion sous seuil sur fenêtre donnée
        effect: Réduire fréquence ou simplifier format
        scope: runtime_feedback

    - id: rule_vc_persistence_triggers_relevance_patch
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S16]'
      depends_on:
        - param.vc_low_persistence_sessions_reference
      relations:
        - type: triggers
          target:
            id: event.vc_persistent_low_detected
      patchable: true
      parameterizable: true
      human_readable: Le seuil de persistance VC basse déclenche le patch relevance.
      logic:
        trigger: Agrégation de sessions VC-Basse
        condition: Seuil de persistance atteint
        effect: Flag vc-bas-persistant
        scope: runtime_state

    - id: rule_vc_patch_escalation_after_two_cycles
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S16]'
      depends_on:
        - param.vc_patch_cycles_before_analysis_escalation
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Escalade Analyse si le patch relevance n'améliore pas VC après 2 cycles.
      logic:
        trigger: Évaluation post-patch relevance
        condition: Amélioration absente après le nombre de cycles défini
        effect: Escalade vers révision de la phase Analyse
        scope: patch_governance

    - id: rule_ar_refractory_detection
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S17]'
      depends_on:
        - param.ar_refractory_sessions_reference
      relations:
        - type: triggers
          target:
            id: event.ar_refractory_profile_detected
      patchable: true
      parameterizable: true
      human_readable: Détection du profil AR-réfractaire sur fenêtre de sessions.
      logic:
        trigger: Audit de réponses AR-N1
        condition: Non-réponse sur fenêtre de sessions consécutives
        effect: Flag profil-ar-refractaire
        scope: runtime_feedback

    - id: rule_low_feedback_coverage_signals_revision
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S4][S18]'
      depends_on:
        - param.feedback_coverage_reference_threshold
      relations:
        - type: triggers
          target:
            id: event.feedback_coverage_low
      patchable: true
      parameterizable: true
      human_readable: Une couverture feedback basse signale une révision prioritaire.
      logic:
        trigger: Mesure de couverture feedback
        condition: Couverture sous seuil de référence
        effect: Signal de révision du design ou enrichissement matrice
        scope: design_quality

    - id: rule_unvalidated_gamification_probation
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S4]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Une gamification non validée reste en période probatoire.
      logic:
        trigger: Déploiement d'une mécanique gamifiée
        condition: Validation de non-nuisance absente
        effect: Statut probatoire
        scope: deployment

  PARAMETERS:
    - id: param.msc_precision_threshold
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Seuil de précision P de référence.
      logic:
        trigger: Évaluation P
        condition: Occurrences suffisantes
        effect: Valeur de référence 80%, fourchette 70–90%
        scope: runtime_evaluation

    - id: param.msc_precision_occurrences_min
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Nombre minimal d'occurrences pour P.
      logic:
        trigger: Évaluation P
        condition: Comptage des occurrences
        effect: Référence 5, fourchette 3–10
        scope: runtime_evaluation

    - id: param.msc_robustness_delay_short
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Délai court terme de robustesse R.
      logic:
        trigger: Évaluation R
        condition: Type KU compatible
        effect: Référence 3 jours, borne 1–14 jours
        scope: runtime_evaluation

    - id: param.msc_robustness_delay_medium
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Délai moyen terme de robustesse R.
      logic:
        trigger: Évaluation R
        condition: Type KU compatible
        effect: Référence 7 jours, borne 1–14 jours
        scope: runtime_evaluation

    - id: param.msc_autonomy_success_count
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Nombre de réussites consécutives sans aide pour A.
      logic:
        trigger: Évaluation A
        condition: Comptage de réussites sans aide
        effect: Référence 3, fourchette 2–5
        scope: runtime_evaluation

    - id: param.degradation_failure_count
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S2]'
      depends_on:
        - param.msc_robustness_delay_short
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Nombre d'échecs consécutifs pour révocation post-maîtrise.
      logic:
        trigger: Vérification de dégradation
        condition: Délai R atteint
        effect: Référence 2 échecs consécutifs
        scope: runtime_evaluation

    - id: param.calibration_units_max
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Longueur maximale du calibrage initial.
      logic:
        trigger: Initialisation
        condition: Séquence diagnostique planifiée
        effect: Référence ≤10 unités, fourchette 5–15
        scope: runtime_calibration

    - id: param.ku_calibration_declarative_duration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Durée diagnostique déclarative.
      logic:
        trigger: Calibrage type déclaratif
        condition: KU déclarative
        effect: 10–30 s
        scope: runtime_calibration

    - id: param.ku_calibration_formal_duration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Durée diagnostique formelle.
      logic:
        trigger: Calibrage type formel
        condition: KU formelle
        effect: 30–90 s
        scope: runtime_calibration

    - id: param.ku_calibration_procedural_duration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Durée diagnostique procédurale.
      logic:
        trigger: Calibrage type procédural
        condition: KU procédurale
        effect: 1–5 min
        scope: runtime_calibration

    - id: param.ku_calibration_perceptual_duration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Durée diagnostique perceptuelle.
      logic:
        trigger: Calibrage type perceptuel
        condition: KU perceptuelle
        effect: 10–20 s
        scope: runtime_calibration

    - id: param.ku_calibration_creative_duration
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Durée diagnostique créative.
      logic:
        trigger: Calibrage type créatif
        condition: KU créative
        effect: 5–15 min
        scope: runtime_calibration

    - id: param.interleaving_success_streak
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Réussites consécutives nécessaires à l'interleaving.
      logic:
        trigger: Vérification interleaving
        condition: Succès consécutifs comptés
        effect: Référence 2
        scope: runtime_planning

    - id: param.interleaving_distinct_tasks_min
      authority: primary
      core_type: REFERENTIEL
      source_anchor: '[S3]'
      depends_on: []
      relations: []
      patchable: true
      parameterizable: true
      human_readable: Nombre minimal de tâches distinctes pour interleaving.
      logic:
        trigger: Vérification interleaving
        condition: Diversité de tâches comptée
        effect: Référence 3
        scope: runtime_planning

    - id: param.coverage_rebalancing_delay_multiplier
