    Le champ bootstrap_contract est TBD dans l'architecture.
    Aucune application ne peut passer la validation complète tant que ce champ n'est pas défini.
  effect: Nouveau blocker PF_BLOCKER_BOOTSTRAP_CONTRACT_UNDEFINED ajouté dans PLATFORM_FACTORY_STATE.blockers.
  risk_avoided: Champ obligatoire TBD non tracé comme blocker passant inaperçu.
  section: PLATFORM_FACTORY_STATE.blockers
  granularity: list_item
  keys_to_update:
  - blocker_id
  - severity
  - impact
  - exit_condition
  operations:
  - op: add
    path: PLATFORM_FACTORY_STATE.blockers
    value:
      blocker_id: PF_BLOCKER_BOOTSTRAP_CONTRACT_UNDEFINED
      severity: high
      impact: >-
        Le champ bootstrap_contract dans runtime_entrypoint_contract est TBD.
