intent_metadata:
  patchset_id: PFPATCH_20260410_PPLX_STAGE03
  date: '2026-04-10'
  source_decision_record: docs/pipelines/platform_factory/work/02_arbitrage/platform_factory_arbitrage.md
  scope: >
    Correction des 14 points retenus dans l'arbitrage consolidé PFARB_CONSOLIDATION_20260410_PPLX_FINAL
    (CONS-01 à CONS-12 + COR-A à COR-I). Séquencement : COR-D (authority_rank),
    COR-A+A'+A'' (conformité constitutionnelle), COR-B+B' (usage_as_sole_context),
    COR-C+C'+C'' (conformance_matrix + validators), COR-E+F+G+H+I (state restant).
  notes:
  - Patchset V0.3→V0.3-patched. Aucune décision réouverte. Différés et hors-périmètre exclus.
  - 'Artefacts cibles : platform_factory_architecture.yaml + platform_factory_state.yaml.'
  - Produit via builder IA-friendly (STAGE_03 nominal).

patch_intents:

# ── SEQ 1 : COR-D authority_rank architecture
- id: PFPATCH_D1
  decision: CONS-04
  target: arch
  op_type: add
  change_type: metadata_enrichment
  sequence: 1
  priority: eleve
  rationale: >-
    CONS-04 : ajouter authority_rank: factory_layer dans metadata de l'architecture
    pour signaler que cet artefact n'est pas un canonique primaire et éviter
    la confusion d'autorité documentée par scénario adversarial.
  effect: Champ authority_rank: factory_layer ajouté dans PLATFORM_FACTORY_ARCHITECTURE.metadata.
  risk_avoided: Confusion d'autorité entre factory artifacts et canoniques primaires.
  section: PLATFORM_FACTORY_ARCHITECTURE.metadata
  granularity: field
  keys_to_update:
  - authority_rank
  operations:
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.metadata.authority_rank
    value: factory_layer

# ── SEQ 2 : COR-D authority_rank state
- id: PFPATCH_D2
  decision: CONS-04
  target: state
  op_type: add
  change_type: metadata_enrichment
  sequence: 2
  priority: eleve
  rationale: >-
    CONS-04 : ajouter authority_rank: factory_layer dans metadata du state
    pour la même raison que PFPATCH_D1.
  effect: Champ authority_rank: factory_layer ajouté dans PLATFORM_FACTORY_STATE.metadata.
  risk_avoided: Confusion d'autorité entre factory state et canoniques primaires.
  section: PLATFORM_FACTORY_STATE.metadata
  granularity: field
