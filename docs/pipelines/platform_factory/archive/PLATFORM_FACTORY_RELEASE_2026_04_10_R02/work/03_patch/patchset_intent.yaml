# ── SEQ 10 : COR-C'' validators description enrichment
- id: PFPATCH_C3
  decision: CONS-09
  target: state
  op_type: update
  change_type: state_description_enrichment
  sequence: 10
  priority: eleve
  rationale: >-
    CONS-09 : enrichir la description de PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED
    pour lier explicitement l'absence du validator au risque de dérive normative sur les projections dérivées.
  effect: >-
    Description mise à jour indiquant que validation_status: validated sur une projection dérivée
    est non déterministe tant que le validator n'est pas implémenté.
  risk_avoided: Projection taguée validated sans critère déterministe réel.
  section: PLATFORM_FACTORY_STATE.capabilities_absent
  granularity: list_item
  keys_to_update:
  - description
  operations:
  - op: list_replace_mapping
    path: PLATFORM_FACTORY_STATE.capabilities_absent
    match_key: capability_id
    match_value: PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED
    value:
      capability_id: PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED
      description: >-
        Validateurs dedies a la conformite des projections et du contrat minimal non encore implementes.
        L'absence de validator rend non deterministe tout validation_status: validated sur une projection derivee :
        aucune projection ne peut etre consideree comme validee de facon auditable
        tant que ce validator n'est pas implemente.

# ── SEQ 11 : COR-E PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
- id: PFPATCH_E1
  decision: CONS-08
  target: state
  op_type: update
  change_type: state_description_enrichment
  sequence: 11
  priority: eleve
  rationale: >-
    CONS-08 : renforcer la description de PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
    pour indiquer explicitement que c'est un blocker opérationnel.
  effect: >-
    Description mise à jour signalant l'impossibilité opérationnelle de tout travail
    multi-IA réel sans ce protocole.
  risk_avoided: Minimisation de l'impact conduisant à reporter un blocker opérationnel réel.
  section: PLATFORM_FACTORY_STATE.known_gaps
  granularity: list_item
  keys_to_update:
  - description
  operations:
  - op: list_replace_mapping
    path: PLATFORM_FACTORY_STATE.known_gaps
    match_key: gap_id
    match_value: PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
    value:
      gap_id: PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
      description: >-
        Blocker operationnel pour tout travail multi-IA reel —
        aucun protocole d'assemblage, de decomposition de tache ou de resolution de conflit n'existe ;
        l'usage parallele multi-IA sans ce protocole expose a des collisions
        et a des derivences normatives non detectees.

