# ── SEQ 3 : COR-A axes minimum_validation_contract
- id: PFPATCH_A1
  decision: CONS-01
  target: arch
  op_type: add
  change_type: contract_strengthening
  sequence: 3
  priority: critique
  rationale: >-
    CONS-01 : ajouter les axes constitutional_invariants_runtime_local et
    no_runtime_content_generation_proof dans minimum_validation_contract.minimum_axes
    pour rendre les invariants INV_RUNTIME_FULLY_LOCAL et
    INV_NO_RUNTIME_CONTENT_GENERATION explicitement vérifiables.
  effect: Deux axes ajoutés dans minimum_validation_contract.minimum_axes.
  risk_avoided: Impossibilité de prouver la conformité constitutionnelle d'une application produite.
  section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract
  granularity: list_item
  keys_to_update:
  - minimum_axes
  operations:
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract.minimum_axes
    value: constitutional_invariants_runtime_local
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract.minimum_axes
    value: no_runtime_content_generation_proof

# ── SEQ 4 : COR-A' runtime_policy_conformance definition
- id: PFPATCH_A2
  decision: CONS-05
  target: arch
  op_type: replace
  change_type: contract_content_definition
  sequence: 4
  priority: eleve
  rationale: >-
    CONS-05 DISC-01 Option A : remplacer l'axe runtime_policy_conformance dans minimum_axes
    par un bloc structuré définissant la liste minimale de 5 critères déterministes.
  effect: >-
    L'axe runtime_policy_conformance est remplacé par un bloc structuré avec 5 items déterministes.
  risk_avoided: Axe de validation creux sans critère déterministe.
  section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract
  granularity: block
  keys_to_update:
  - runtime_policy_conformance
  operations:
  - op: replace
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract.runtime_policy_conformance
    value:
      label: runtime_policy_conformance
      note: liste minimale non exhaustive, a completer lors de la definition du validator
      minimum_criteria:
      - absence de dependance reseau au runtime (verifiable statiquement)
      - absence de generation de contenu ou de feedback a la volee
      - conformite au regime d'autonomie declare dans le manifest de l'application
      - absence d'appel implicite a un modele de langage en usage
      - runtime entrypoint declare et tracable

# ── SEQ 5 : COR-A'' constitutional_invariants_checked observability
- id: PFPATCH_A3
  decision: CONS-01
  target: arch
  op_type: replace
  change_type: observability_strengthening
  sequence: 5
  priority: critique
  rationale: >-
    CONS-01 COR-A'' : rattacher constitutional_invariants_checked à une liste
    d'invariants + protocole dans minimum_observability_contract pour rendre ce signal auditable.
  effect: >-
    Le signal constitutional_invariants_checked dans minimum_observability_contract
    est remplacé par un bloc structuré listant les invariants constitutionnels
    obligatoires et le protocole de vérification.
  risk_avoided: Signal non auditable masquant une non-conformité constitutionnelle.
  section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_observability_contract
  granularity: block
  keys_to_update:
  - constitutional_invariants_checked
  operations:
  - op: replace
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_observability_contract.constitutional_invariants_checked
    value:
      label: constitutional_invariants_checked
      required_invariants:
      - INV_RUNTIME_FULLY_LOCAL
      - INV_NO_RUNTIME_CONTENT_GENERATION
      verification_protocol: >-
        chaque invariant doit etre explicitement verifie dans le rapport de validation
        de l'application ; l'absence d'un invariant dans le rapport invalide le signal

# ── SEQ 6 : COR-B usage_as_sole_context clarification
- id: PFPATCH_B1
  decision: CONS-02
  target: arch
  op_type: replace
  change_type: wording_clarification
  sequence: 6
  priority: eleve
  rationale: >-
    CONS-02 : résoudre la contradiction entre usage_as_sole_context: blocked
    et rule_of_use qui autorise le contexte unique si validé.
    Clarifier que rule_of_use décrit le régime cible.
    Ajouter usage_as_sole_context_unblock_conditions.
  effect: >-
    usage_as_sole_context reste blocked. rule_of_use est annoté comme regime_cible.
    usage_as_sole_context_unblock_conditions liste les prérequis de déblocage.
  risk_avoided: Ambiguïté d'interprétation exploitable pour contourner le blocage V0.
  section: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract
  granularity: block
  keys_to_update:
  - usage_as_sole_context
  - rule_of_use
  - usage_as_sole_context_unblock_conditions
  operations:
  - op: replace
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.usage_as_sole_context
    value: blocked_v0
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.usage_as_sole_context_status_note
    value: >-
      blocked_v0 : bloque jusqu'a maturite suffisante
      — voir usage_as_sole_context_unblock_conditions
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.rule_of_use_regime_note
    value: >-
      regime_cible : une projection derivee pourra etre l'unique artefact fourni
      a une IA pour un travail donne si elle est validee comme strictement fidele,
      sans divergence normative, pour le scope declare.
      Ce regime est actuellement bloque (V0).
  - op: add
    path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.usage_as_sole_context_unblock_conditions
    value:
    - validator de conformite des projections implemente et operationnel
    - regeneration deterministe des projections prouvee
    - constitutional_conformance_matrix.yaml presente et rattachee

# ── SEQ 7 : COR-B' state description PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
- id: PFPATCH_B2
  decision: CONS-11
  target: state
  op_type: update
  change_type: state_resync
  sequence: 7
  priority: eleve
  rationale: >-
    CONS-11 : mettre à jour la description de PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
    pour distinguer régime cible et politique V0 bloquée (lié CONS-02).
  effect: >-
    Description mise à jour indiquant que usage en contexte unique = régime cible,
    actuellement bloqué V0.
  risk_avoided: Confusion entre ce qui est décidé et ce qui est autorisé en V0.
  section: PLATFORM_FACTORY_STATE.capabilities_partial
  granularity: list_item
  keys_to_update:
  - description
  operations:
  - op: list_replace_mapping
    path: PLATFORM_FACTORY_STATE.capabilities_partial
    match_key: capability_id
    match_value: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
    value:
      capability_id: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
      description: >-
        Regle d'usage des projections derivees definie. Emplacement de stockage decide (ARB-04).
        Champs minimaux obligatoires inscrits dans l'architecture (ARB-05).
        Usage en contexte unique = regime cible, actuellement bloque (V0)
        — voir execution_projection_contract.usage_as_sole_context_unblock_conditions dans l'architecture.
        Restent absents : validator dedie, protocole de regeneration automatise.

# ── SEQ 8 : COR-C blocker PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT
- id: PFPATCH_C1
  decision: CONS-03
  target: state
  op_type: add
  change_type: blocker_registration
  sequence: 8
  priority: eleve
  rationale: >-
    CONS-03 : enregistrer PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT dans les blockers du state
    avec exit condition explicite. Le fichier constitutional_conformance_matrix.yaml est référencé mais absent.
  effect: Nouveau blocker PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT ajouté dans PLATFORM_FACTORY_STATE.blockers.
  risk_avoided: Référence non tracée à un fichier absent pouvant masquer une dépendance bloquante.
  section: PLATFORM_FACTORY_STATE.blockers
  granularity: list_item
  keys_to_update:
  - blocker_id
  - severity
  - impact
  - exit_condition
  operations:
  - op: add
    path: PLATFORM_FACTORY_STATE.blockers
    value:
      blocker_id: PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT
      severity: high
      impact: >-
        Le fichier docs/cores/platform_factory/constitutional_conformance_matrix.yaml
        est reference dans l'architecture (conformance_matrix_ref) mais absent.
        Aucune projection ne peut etre validee formellement tant que ce fichier n'existe pas.
      exit_condition: >-
        Creation et validation de docs/cores/platform_factory/constitutional_conformance_matrix.yaml
        dans une iteration dediee.

