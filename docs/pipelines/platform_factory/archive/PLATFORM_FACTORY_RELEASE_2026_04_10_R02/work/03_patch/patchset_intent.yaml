# ── SEQ 15 : COR-I PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION description
- id: PFPATCH_I1
  decision: CONS-10
  target: state
  op_type: update
  change_type: state_description_update
  sequence: 15
  priority: modere
  rationale: >-
    CONS-10 DISC-02 Option C : mettre à jour la description du blocker
    PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION pour refléter que la release
    PLATFORM_FACTORY_RELEASE_2026_04_10_R01 est déjà manifestée dans
    docs/cores/releases/ et que la fermeture attendue est STAGE_08 uniquement.
  effect: Description du blocker mise à jour avec statut réel de la release.
  risk_avoided: Description inexacte masquant l'avancement réel de la gouvernance release.
  section: PLATFORM_FACTORY_STATE.blockers
  granularity: list_item
  keys_to_update:
  - impact
  - exit_condition
  operations:
  - op: list_replace_mapping
    path: PLATFORM_FACTORY_STATE.blockers
    match_key: blocker_id
    match_value: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
    value:
      blocker_id: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
      severity: medium
      impact: >-
        Les artefacts platform_factory sont dans current mais hors manifest officiel actuel.
        La release PLATFORM_FACTORY_RELEASE_2026_04_10_R01 est manifestee dans
        docs/cores/releases/PLATFORM_FACTORY_RELEASE_2026_04_10_R01/manifest.yaml
        (statut RELEASE_CANDIDATE, promotion_candidate: true).
        Le risque residuel est uniquement la promotion vers current/, pas l'absence totale de manifest.
      exit_condition: >-
        Ce blocker est leve uniquement quand STAGE_08 complete sa premiere execution
        formelle avec mise a jour effective du manifest officiel.

exclusions:
- id: DIFF-01
  reason: >-
    Protocole multi-IA complet (assemblage, granularite, resolution de conflit)
    — spec dediee requise avant correction architecturale.
  note: Differe a iteration suivante avec spec dediee.
- id: DIFF-02
  reason: >-
    Verificabilite des reproducibility_fingerprints (derive silencieuse)
    — differe a l'iteration validators.
  note: Depend de l'implementation du validator.
- id: DIFF-03
  reason: >-
    Rappel INV_PATCH_ARTIFACTS_MUST_BE_PRECOMPUTED_OFF_SESSION dans chaine PF_CHAIN_03-05
    — depend de CONS-02 stabilise.
  note: A traiter apres stabilisation du patch CONS-02.
- id: HORS-SCOPE-RUNTIME
  reason: >-
    Comportement runtime detaille d'une application specifique — hors scope factory.
  note: Releve du futur pipeline d'instanciation.
- id: HORS-SCOPE-INV-GRAPH
  reason: >-
    INV_KNOWLEDGE_GRAPH_MUST_BE_ACYCLIC et invariants runtime domaine — hors scope factory.
  note: A annoter comme tel dans l'architecture si necessaire.
