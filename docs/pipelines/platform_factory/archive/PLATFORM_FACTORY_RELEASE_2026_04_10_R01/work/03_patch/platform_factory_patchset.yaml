PLATFORM_FACTORY_PATCHSET:
  metadata:
    patchset_id: PF_PATCHSET_20260410_V2
    date: "2026-04-10"
    source_decision_record: docs/pipelines/platform_factory/work/02_arbitrage/platform_factory_arbitrage.md
    scope: pre_apply_patch_validation
    target_artifacts:
      - docs/cores/current/platform_factory_architecture.yaml
      - docs/cores/current/platform_factory_state.yaml
    notes:
      - "Patchset V2 — correction DSL ops (list_remove_item, list_remove_mapping, list_replace_mapping)"
      - "9 patches architecture, 7 patches state"
      - "ARB-09 (pipeline.md), validators/tooling, release governance et différés exclus"

  patches:

    # --------------------------------------------------------
    # ARCH_01 — Statut architecture metadata
    # --------------------------------------------------------
    - patch_id: ARCH_01_STATUS_METADATA
      source_decision: ARB-06
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: replace
      change_type: semantic_correction
      rationale: >
        Le statut RELEASE_CANDIDATE est trompeur : les artefacts ne sont pas encore
        intégrés au manifest officiel. CURRENT_BASELINE_UNDER_GOVERNANCE reflète
        honnêtement la maturité réelle.
      effect: Statut metadata architecture passé de RELEASE_CANDIDATE à CURRENT_BASELINE_UNDER_GOVERNANCE.
      risk_avoided: Surinterprétation du degré de maturité par une IA lisant l'architecture.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.metadata
        granularity: field
        keys_to_update:
          - status
      operations:
        - op: replace
          path: metadata.status
          value: CURRENT_BASELINE_UNDER_GOVERNANCE
      validation_focus:
        - semantic_alignment_with_governance_posture
        - consistency_with_state_status

    # --------------------------------------------------------
    # ARCH_02 — Axe runtime_policy_conformance (critique)
    # --------------------------------------------------------
    - patch_id: ARCH_02_RUNTIME_POLICY_CONFORMANCE_AXIS
      source_decision: ARB-01
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: missing_constitutional_enforcement
      rationale: >
        Sans cet axe, une application peut passer toute la validation factory sans
        que ses invariants runtime constitutionnels aient été vérifiés.
        Consensus unanime 5/5 rapports.
      effect: Axe runtime_policy_conformance ajouté à minimum_validation_contract.minimum_axes.
      risk_avoided: Application produite non vérifiée sur les invariants runtime constitutionnels.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract
        granularity: list_item
        keys_to_update:
          - minimum_axes
      operations:
        - op: add
          path: contracts.produced_application_minimum_contract.minimum_validation_contract.minimum_axes
          value: runtime_policy_conformance
      validation_focus:
        - constitutional_invariant_coverage
        - no_validator_tooling_in_canonique

    # --------------------------------------------------------
    # ARCH_03 — Signal constitutional_invariants_checked (critique)
    # --------------------------------------------------------
    - patch_id: ARCH_03_CONSTITUTIONAL_INVARIANTS_SIGNAL
      source_decision: ARB-02
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: missing_observability_signal
      rationale: >
        Corollaire direct de ARCH_02. Sans signal d'observabilité correspondant,
        l'axe runtime_policy_conformance serait déclaré mais non observable à l'exécution.
      effect: Signal constitutional_invariants_checked ajouté à minimum_observability_contract.minimum_signals.
      risk_avoided: Axe de validation déclaré sans signal d'observabilité correspondant.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_observability_contract
        granularity: list_item
        keys_to_update:
          - minimum_signals
      operations:
        - op: add
          path: contracts.produced_application_minimum_contract.minimum_observability_contract.minimum_signals
          value: constitutional_invariants_checked
      validation_focus:
        - observability_completeness
        - consistency_with_ARCH_02

    # --------------------------------------------------------
    # ARCH_04 — Référence constitutional_conformance_matrix
    # --------------------------------------------------------
    - patch_id: ARCH_04_CONFORMANCE_MATRIX_REF
      source_decision: ARB-08
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: new_reference_to_dedicated_file
      rationale: >
        Fichier séparé référencé pour que les IAs d'audit puissent charger uniquement
        ce contexte ciblé. Décision humaine PC-2/A.
      effect: Champ constitutional_conformance_matrix_ref ajouté dans dependencies_to_constitution.
      risk_avoided: IAs d'audit sans accès ciblé à la matrice de preuves constitutionnelles.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.dependencies_to_constitution
        granularity: field
        keys_to_update:
          - constitutional_conformance_matrix_ref
      operations:
        - op: add
          path: dependencies_to_constitution.constitutional_conformance_matrix_ref
          value: docs/cores/platform_factory/constitutional_conformance_matrix.yaml
      validation_focus:
        - reference_coherence

    # --------------------------------------------------------
    # ARCH_05 — Résolution emplacement_policy projections
    # --------------------------------------------------------
    - patch_id: ARCH_05_PROJECTION_EMPLACEMENT_POLICY
      source_decision: ARB-04
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: replace
      change_type: tbd_resolution
      rationale: >
        Décision humaine PC-1 actée le 2026-04-10. Les projections sont des ressources
        de référence factory partagées.
      effect: >
        emplacement_policy passé de TBD à DECIDED avec location et règles explicites.
      risk_avoided: Projections déposées dans docs/cores/current/ ou dans work/ par défaut.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.generated_projection_rules.emplacement_policy
        granularity: block
        keys_to_update:
          - status
          - location
          - rule_positive
          - rule_negative
      operations:
        - op: replace
          path: generated_projection_rules.emplacement_policy
          value:
            status: DECIDED
            location: docs/cores/platform_factory/projections/
            rule_positive: >-
              Toutes les validated_derived_execution_projections doivent être stockées
              dans docs/cores/platform_factory/projections/. Cet emplacement est stable,
              partagé entre toutes les applications spécifiques futures, et accessible
              en lecture par tous les pipelines aval.
            rule_negative: >-
              Il est strictement interdit de déposer une projection dérivée dans
              docs/cores/current/. Cette zone est réservée aux canoniques primaires.
      validation_focus:
        - tbd_resolution_completeness
        - consistency_with_STATE_05
        - rule_negative_explicitly_inscribed

    # --------------------------------------------------------
    # ARCH_06 — Champs minimaux obligatoires d'une projection
    # --------------------------------------------------------
    - patch_id: ARCH_06_PROJECTION_MANDATORY_FIELDS
      source_decision: ARB-05
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: contract_strengthening
      rationale: >
        Ces champs rendent la déclaration minimale d'une projection contraignante
        et auditable. Consensus unanime 5/5 rapports.
      effect: Bloc mandatory_fields_per_projection ajouté dans execution_projection_contract.
      risk_avoided: Projections dérivées produites sans preuve de scope, source, version ou statut.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract
        granularity: block
        keys_to_update:
          - mandatory_fields_per_projection
      operations:
        - op: add
          path: contracts.execution_projection_contract.mandatory_fields_per_projection
          value:
            - field: scope
              description: Périmètre exact couvert par la projection.
            - field: sources_exact
              description: Liste exacte des artefacts canoniques sources.
            - field: version_fingerprint
              description: Empreinte canonique des artefacts sources permettant de détecter toute dérive.
            - field: validation_status
              description: "Statut de validation : validated | pending | invalidated."
            - field: promotion_to_canonical_forbidden
              value: true
              description: Une projection dérivée ne peut jamais être promu canonique primaire.
            - field: usage_policy
              description: "Usages autorisés : runtime, offsession, ou les deux."
            - field: conformance_matrix_ref
              description: Référence vers docs/cores/platform_factory/constitutional_conformance_matrix.yaml.
            - field: usage_as_sole_context
              value: blocked
              description: Bloqué jusqu'à maturité suffisante.
      validation_focus:
        - dependency_on_ARCH_05
        - no_validator_tooling_in_canonique

    # --------------------------------------------------------
    # ARCH_07 — Définition reproducibility_fingerprints
    # --------------------------------------------------------
    - patch_id: ARCH_07_REPRODUCIBILITY_FINGERPRINTS
      source_decision: ARB-03
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: undefined_term_definition
      rationale: >
        Terme imposé comme obligatoire sans définition. Définition minimale inscrite
        pour éviter l'improvisation IA.
      effect: Note de définition ajoutée pour reproducibility_fingerprints.
      risk_avoided: Improvisation IA sur la sémantique d'un terme obligatoire non défini.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.identity
        granularity: field_note
        keys_to_update:
          - reproducibility_fingerprints_definition
      operations:
        - op: add
          path: contracts.produced_application_minimum_contract.identity.reproducibility_fingerprints_definition
          value: >-
            Empreinte canonique des artefacts sources utilisés pour produire cette application :
            hash ou identifiant de version stable de chaque dépendance canonique
            (constitution, référentiel, link, architecture factory, projections utilisées).
            Permet de vérifier qu'une application peut être entièrement retracée
            et reproduite à partir des mêmes sources.
      validation_focus:
        - no_normative_addition
        - definition_minimal_and_bounded

    # --------------------------------------------------------
    # ARCH_08 — Bornage bootstrap_contract TBD
    # --------------------------------------------------------
    - patch_id: ARCH_08_BOOTSTRAP_CONTRACT_TBD
      source_decision: ARB-03
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: add
      change_type: undefined_term_bounded
      rationale: >
        Terme imposé comme obligatoire sans définition. Marqué TBD avec condition
        de déblocage.
      effect: Note TBD + condition de déblocage ajoutée pour bootstrap_contract.
      risk_avoided: Improvisation IA sur bootstrap_contract avant que la typologie runtime soit arrêtée.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.runtime_entrypoint_contract
        granularity: field_note
        keys_to_update:
          - bootstrap_contract_tbd_condition
      operations:
        - op: add
          path: contracts.produced_application_minimum_contract.runtime_entrypoint_contract.bootstrap_contract_tbd_condition
          value: >-
            TBD. Ce champ sera défini quand la typologie exacte des runtimes d'application
            Learn-it sera arrêtée. Il décrira le contrat de démarrage attendu pour
            chaque type de runtime (local, notebook, package, etc.).
      validation_focus:
        - no_normative_addition
        - tbd_condition_explicit

    # --------------------------------------------------------
    # ARCH_09 — Retirer open_point emplacement résolu
    # --------------------------------------------------------
    - patch_id: ARCH_09_REMOVE_OPEN_POINT_LOCATION
      source_decision: ARB-04
      target_artifact: docs/cores/current/platform_factory_architecture.yaml
      operation: remove
      change_type: resolved_open_point_removal
      rationale: >
        Le point ouvert exact_location_of_validated_derived_execution_projections est
        résolu par ARB-04 (décision PC-1).
      effect: Item exact_location_of_validated_derived_execution_projections retiré de open_points_for_challenge.
      risk_avoided: Point ouvert résolu ressortant comme non résolu lors du prochain challenge.
      location_hint:
        section: PLATFORM_FACTORY_ARCHITECTURE.open_points_for_challenge
        granularity: list_item
        keys_to_update:
          - exact_location_of_validated_derived_execution_projections
      operations:
        - op: list_remove_item
          path: open_points_for_challenge
          value: exact_location_of_validated_derived_execution_projections
      validation_focus:
        - consistency_with_ARCH_05
        - no_residual_tbd

    # --------------------------------------------------------
    # STATE_01 — Statut state metadata
    # --------------------------------------------------------
    - patch_id: STATE_01_STATUS_METADATA
      source_decision: ARB-06
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: replace
      change_type: semantic_correction
      rationale: Alignement avec ARCH_01. Cohérence entre architecture et state.
      effect: Statut metadata state passé de RELEASE_CANDIDATE à CURRENT_BASELINE_UNDER_GOVERNANCE.
      risk_avoided: Incohérence de statut entre les deux artefacts factory courants.
      location_hint:
        section: PLATFORM_FACTORY_STATE.metadata
        granularity: field
        keys_to_update:
          - status
      operations:
        - op: replace
          path: metadata.status
          value: CURRENT_BASELINE_UNDER_GOVERNANCE
      validation_focus:
        - consistency_with_ARCH_01

    # --------------------------------------------------------
    # STATE_02 — exit_condition blocker manifest
    # --------------------------------------------------------
    - patch_id: STATE_02_BLOCKER_MANIFEST_EXIT_CONDITION
      source_decision: ARB-06
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: add
      change_type: blocker_exit_condition
      rationale: >
        Sans condition de sortie explicite, le blocker reste indéfiniment ouvert.
      effect: Champ exit_condition ajouté au blocker PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION via list_replace_mapping.
      risk_avoided: Blocker ouvert indéfiniment sans critère de levée observable.
      location_hint:
        section: PLATFORM_FACTORY_STATE.blockers
        granularity: list_item
        keys_to_update:
          - exit_condition
      operations:
        - op: list_replace_mapping
          path: blockers
          match_key: blocker_id
          match_value: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
          value:
            blocker_id: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
            severity: medium
            impact: Les artefacts platform_factory sont dans current mais hors manifest officiel actuel.
            exit_condition: >-
              Ce blocker est levé uniquement quand STAGE_08 complète sa première
              exécution formelle avec mise à jour effective du manifest officiel
              (ou production de docs/cores/platform_factory/manifest.yaml si le
              schema officiel est encore insuffisant).
      validation_focus:
        - exit_condition_observable_and_linked_to_STAGE_08

    # --------------------------------------------------------
    # STATE_03 — DERIVED_PROJECTION_RULE_DEFINED -> partial
    # --------------------------------------------------------
    - patch_id: STATE_03_CAPABILITY_PROJECTION_RULE_TO_PARTIAL
      source_decision: ARB-07
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: reclassify
      change_type: capability_recalibration
      rationale: >
        La capacité était surdéclarée en present alors que le mécanisme complet
        est absent. Recalibrage honnête en partial.
      effect: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED déplacé de capabilities_present vers capabilities_partial.
      risk_avoided: Surdéclaration de capacité induisant une IA en erreur.
      location_hint:
        section: PLATFORM_FACTORY_STATE.capabilities_present
        granularity: list_item
        keys_to_update:
          - PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
      operations:
        - op: list_remove_mapping
          path: capabilities_present
          match_key: capability_id
          match_value: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
        - op: add
          path: capabilities_partial
          value:
            capability_id: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
            description: >-
              La règle d'usage des projections dérivées est définie. L'emplacement de
              stockage est désormais décidé (ARB-04). Les champs minimaux obligatoires
              sont inscrits dans l'architecture (ARB-05). Restent absents : validator
              dédié, protocole de régénération automatisé, usage comme contexte unique
              bloqué jusqu'à maturité suffisante.
      validation_focus:
        - honesty_of_capability_level
        - consistency_with_ARCH_05_and_ARCH_06

    # --------------------------------------------------------
    # STATE_04 — Wording FACTORY_PIPELINE_INTENT_DEFINED
    # --------------------------------------------------------
    - patch_id: STATE_04_CAPABILITY_PIPELINE_INTENT_WORDING
      source_decision: ARB-07
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: clarify_wording
      change_type: wording_precision
      rationale: >
        Aligner le wording du state avec la réalité déjà reconnue dans pipeline.md.
      effect: Description de PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED précisée.
      risk_avoided: IA surestimant le niveau d'outillage du pipeline factory.
      location_hint:
        section: PLATFORM_FACTORY_STATE.capabilities_present
        granularity: field
        keys_to_update:
          - PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED.description
      operations:
        - op: list_replace_mapping
          path: capabilities_present
          match_key: capability_id
          match_value: PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED
          value:
            capability_id: PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED
            description: >-
              L'intention de pipeline platform_factory est explicitement posée
              (intent only, not yet tooled execution framework). Les stages existent
              et les prompts de lancement sont définis, mais le pipeline n'est pas
              encore automatisé ni complètement outillé.
      validation_focus:
        - wording_honest_and_bounded

    # --------------------------------------------------------
    # STATE_05 — Blocker PROJECTION_LOCATION_PENDING -> résolu
    # --------------------------------------------------------
    - patch_id: STATE_05_BLOCKER_PROJECTION_LOCATION_RESOLVED
      source_decision: ARB-04
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: update
      change_type: blocker_resolution
      rationale: >
        Le blocker PF_BLOCKER_PROJECTION_LOCATION_PENDING est levé par la décision PC-1
        actée le 2026-04-10.
      effect: Blocker PF_BLOCKER_PROJECTION_LOCATION_PENDING mis à jour avec resolved, resolution et resolution_date.
      risk_avoided: Blocker résolu ressortant comme encore ouvert lors du prochain challenge.
      location_hint:
        section: PLATFORM_FACTORY_STATE.blockers
        granularity: list_item
        keys_to_update:
          - resolved
          - resolution
          - resolution_date
      operations:
        - op: list_replace_mapping
          path: blockers
          match_key: blocker_id
          match_value: PF_BLOCKER_PROJECTION_LOCATION_PENDING
          value:
            blocker_id: PF_BLOCKER_PROJECTION_LOCATION_PENDING
            severity: medium
            impact: Limite la mise en œuvre pratique des projections pour IA.
            resolved: true
            resolution: >-
              Emplacement décidé : docs/cores/platform_factory/projections/.
              Décision humaine PC-1 actée le 2026-04-10.
            resolution_date: "2026-04-10"
      validation_focus:
        - consistency_with_ARCH_05

    # --------------------------------------------------------
    # STATE_06 — PROJECTION_STORAGE_LOCATION_FINALIZED: absent -> partial
    # --------------------------------------------------------
    - patch_id: STATE_06_CAPABILITY_PROJECTION_STORAGE_RESOLVED
      source_decision: ARB-04
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: reclassify
      change_type: capability_recalibration
      rationale: >
        La décision d'emplacement est prise mais l'outillage reste absent.
        Passer en partial reflète l'état réel.
      effect: PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED déplacé de capabilities_absent vers capabilities_partial.
      risk_avoided: Emplacement décidé apparaissant encore comme absent dans le state.
      location_hint:
        section: PLATFORM_FACTORY_STATE.capabilities_absent
        granularity: list_item
        keys_to_update:
          - PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED
      operations:
        - op: list_remove_mapping
          path: capabilities_absent
          match_key: capability_id
          match_value: PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED
        - op: add
          path: capabilities_partial
          value:
            capability_id: PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED
            description: >-
              Emplacement décidé : docs/cores/platform_factory/projections/. Règle
              d'interdiction dans docs/cores/current/ inscrite. Outillage de génération
              et de validation des projections restent à implémenter.
      validation_focus:
        - consistency_with_STATE_05_and_ARCH_05

    # --------------------------------------------------------
    # STATE_07 — Delta cycle 2026-04-10
    # --------------------------------------------------------
    - patch_id: STATE_07_DELTA_RECORD
      source_decision: PFARB_FINAL_20260410_CONSOLIDATION
      target_artifact: docs/cores/current/platform_factory_state.yaml
      operation: add
      change_type: delta_traceability
      rationale: Tracer le cycle de patch 2026-04-10 dans le state.
      effect: Entrée de delta ajoutée dans delta_since_previous.changes.
      risk_avoided: Perte de traçabilité des changements effectués lors de ce cycle.
      location_hint:
        section: PLATFORM_FACTORY_STATE.delta_since_previous
        granularity: list_item
        keys_to_update:
          - changes
      operations:
        - op: add
          path: delta_since_previous.changes
          value: runtime_policy_conformance_axis_added_to_minimum_validation_contract
        - op: add
          path: delta_since_previous.changes
          value: constitutional_invariants_checked_signal_added_to_observability_contract
        - op: add
          path: delta_since_previous.changes
          value: constitutional_conformance_matrix_ref_added_to_architecture
        - op: add
          path: delta_since_previous.changes
          value: projection_emplacement_policy_decided_and_inscribed
        - op: add
          path: delta_since_previous.changes
          value: projection_mandatory_fields_defined
        - op: add
          path: delta_since_previous.changes
          value: status_corrected_to_current_baseline_under_governance
        - op: add
          path: delta_since_previous.changes
          value: capability_derived_projection_rule_recalibrated_to_partial
        - op: add
          path: delta_since_previous.changes
          value: blocker_projection_location_resolved
        - op: add
          path: delta_since_previous.changes
          value: blocker_manifest_exit_condition_added
        - op: add
          path: delta_since_previous.changes
          value: reproducibility_fingerprints_defined
        - op: add
          path: delta_since_previous.changes
          value: bootstrap_contract_tbd_bounded
      validation_focus:
        - completeness_of_delta_trace

  exclusions:
    items:
      - id: ARB-09_pipeline_STAGE04_STAGE06_prompt_priority
        reason: pipeline_work
        note: Correction à apporter à pipeline.md, hors périmètre des artefacts canoniques courants.
      - id: ARB-10_multi_ia_protocol
        reason: deferred
        note: Reporté à la première instance de travail multi-IA réel.
      - id: ARB-11_detailed_schemas
        reason: deferred
        note: Reporté à une décision de passage à une version de maturité suffisante.
      - id: ARB-12_factory_instantiation_boundary
        reason: deferred
        note: Reporté à la conception du premier pipeline d'instanciation domaine.
      - id: PC2B_filtered_matrix_in_projections
        reason: deferred
        note: Reporté à maturité suffisante.
      - id: validators_tooling_all
        reason: validator_or_tooling
        note: Tous les validators dédiés sont hors périmètre canonique pour ce cycle.
      - id: constitutional_conformance_matrix_content
        reason: deferred
        note: Contenu détaillé à produire après apply en STAGE_05/06.
      - id: PC3_pipeline_patches
        reason: pipeline_work
        note: Patches pipeline.md appliqués hors cycle le 2026-04-10 via tmp/.
