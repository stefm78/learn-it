PLATFORM_FACTORY_PATCHSET:

  metadata:
    patchset_id: PFPATCH_20260410_PPLX_FINAL
    date: '2026-04-10'
    target_artifacts:
    - docs/cores/current/platform_factory_architecture.yaml
    - docs/cores/current/platform_factory_state.yaml
    source_decision_record: docs/pipelines/platform_factory/work/02_arbitrage/platform_factory_arbitrage.md
    scope: >-
      Corrections post-arbitrage PFARB_CONSOLIDATION_20260410_PPLX_FINAL sur les
      artefacts V0.3 de la Platform Factory. Corrections de conformite constitutionnelle,
      de coherence architecture/state, de gouvernance projections et de tracabilite
      des blockers.
    notes:
    - Patchset produit en STAGE_03 du pipeline platform_factory.
    - 15 patches couvrant 2 corrections critiques, 11 elevees, 2 moderees.
    - 2 nouveaux blockers enregistres dans le state.
    - 3 sujets differes explicitement hors scope de ce patch.
    - Appliquer dans l'ordre de sequence (sequence 1 en premier).
    - v2 - sequences state reordonnees pour eviter corruption sandbox (list_replace_mapping avant add sur meme cle).

  patches:

  - patch_id: PFPATCH_A1
    source_decision: CONS-04
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: add
    change_type: metadata_enrichment
    sequence: 1
    priority: eleve
    rationale: >-
      Distinguer explicitement la factory des canoniques primaires. Risque de confusion
      d'autorite documente par scenario adversarial (CR-Nemotron Scenario D, CR-GPT54
      Risque D). Retenu dans ARB-PPLX-R7M4 (ARB-C1) et ARB-PPLX-M3F8 (CORR-ARB-04).
      ARB-GPT54 avait rejete - rejete en consolidation car risque documente justifie
      la correction minimale.
    effect: >-
      Ajoute le champ authority_rank avec la valeur factory_layer dans les metadonnees
      de l'architecture, signalant qu'il ne s'agit pas d'un canonique primaire.
    risk_avoided: >-
      Confusion d'autorite par une IA lisant l'artefact depuis docs/cores/current/
      sans distinguer canonique primaire et artefact factory.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.metadata
      granularity: field
      keys_to_update:
      - authority_rank
    operations:
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.metadata.authority_rank
      value: factory_layer

  - patch_id: PFPATCH_A2
    source_decision: CONS-04
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: add
    change_type: metadata_enrichment
    sequence: 1
    priority: eleve
    rationale: >-
      Symetrique de PFPATCH_A1. Meme justification CONS-04. Les deux artefacts factory
      sont dans docs/cores/current/ et doivent tous deux signaler leur rang d'autorite.
    effect: >-
      Ajoute le champ authority_rank avec la valeur factory_layer dans les metadonnees
      du state.
    risk_avoided: >-
      Confusion d'autorite identique a PFPATCH_A1 mais pour le state.
    location_hint:
      section: PLATFORM_FACTORY_STATE.metadata
      granularity: field
      keys_to_update:
      - authority_rank
    operations:
    - op: add
      path: PLATFORM_FACTORY_STATE.metadata.authority_rank
      value: factory_layer

  - patch_id: PFPATCH_B1
    source_decision: CONS-01
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: replace
    change_type: contract_strengthening
    sequence: 2
    priority: critique
    rationale: >-
      INV_RUNTIME_FULLY_LOCAL et INV_NO_RUNTIME_CONTENT_GENERATION ne sont pas captures
      dans le contrat minimal actuel. Consensus fort 3/3 challenge reports et 3/3
      arbitrage reports. Sans correction, la factory ne peut pas garantir qu'une
      application produite est constitutionnellement compatible.
    effect: >-
      Ajoute deux axes de validation constitutionnelle explicites dans minimum_axes:
      constitutional_invariants_runtime_local et no_runtime_content_generation_proof.
    risk_avoided: >-
      Application produite taguee conforme sans preuve que les invariants constitutionnels
      fondamentaux sont respectes.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract
      granularity: field
      keys_to_update:
      - minimum_axes
    operations:
    - op: replace
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract.minimum_axes
      value:
      - structure
      - minimum_contract_conformance
      - traceability
      - packaging
      - structure_and_state_alignment
      - runtime_policy_conformance
      - constitutional_invariants_runtime_local
      - no_runtime_content_generation_proof

  - patch_id: PFPATCH_B2
    source_decision: CONS-05
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: add
    change_type: contract_strengthening
    sequence: 3
    priority: eleve
    rationale: >-
      L'axe runtime_policy_conformance etait un label creux sans contenu deterministe.
      Decision humaine DISC-01 Option A retenue en arbitrage: liste minimale de 5
      items. Lie a CONS-01.
    effect: >-
      Ajoute le bloc runtime_policy_conformance_definition avec 5 items verifiables
      et une note indiquant que la liste est non exhaustive.
    risk_avoided: >-
      Axe de validation non deterministe rendant tout rapport de conformite runtime_policy
      non auditable.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract
      granularity: block
      keys_to_update:
      - runtime_policy_conformance_definition
    operations:
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_validation_contract.runtime_policy_conformance_definition
      value:
        scope: >-
          Verification que l'application produite respecte la politique d'execution
          locale et ne genere pas de contenu a la volee.
        items_to_verify:
        - item: no_network_dependency_at_runtime
          description: >-
            Absence de dependance reseau au runtime. Verifiable statiquement par
            inspection des imports, appels systeme et configuration.
          invariant_ref: INV_RUNTIME_FULLY_LOCAL
        - item: no_runtime_content_generation
          description: >-
            Absence de generation de contenu ou de feedback a la volee. Aucun appel
            LLM, aucune generation dynamique de contenu pedagogique au runtime.
          invariant_ref: INV_NO_RUNTIME_CONTENT_GENERATION
        - item: declared_autonomy_regime_respected
          description: >-
            L'application opere dans le regime d'autonomie declare dans son manifest.
        - item: no_implicit_llm_call
          description: >-
            Absence d'appel implicite a un modele de langage en usage runtime (ni
            direct, ni via API tierce).
        - item: runtime_entrypoint_declared_and_traceable
          description: >-
            Le point d'entree runtime est declare dans le manifest et tracable.
        note: >-
          Liste minimale non exhaustive. A completer lors de la definition du validator
          dedie (PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED).

  - patch_id: PFPATCH_B3
    source_decision: CONS-01
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: add
    change_type: contract_strengthening
    sequence: 4
    priority: critique
    rationale: >-
      Le signal constitutional_invariants_checked dans minimum_observability_contract
      etait non auditable (aucune liste d'invariants, aucun protocole). La chaine
      de preuve constitutionnelle ne peut pas etre fermee sans ce rattachement.
    effect: >-
      Ajoute un bloc note_on_constitutional_invariants_checked dans
      minimum_observability_contract specifiant les invariants minimaux couverts et
      le protocole d'emission du signal.
    risk_avoided: >-
      Signal d'observabilite constitutionnelle emis sans critere - chaine de preuve
      impossible a fermer.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_observability_contract
      granularity: field
      keys_to_update:
      - note_on_constitutional_invariants_checked
    operations:
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.produced_application_minimum_contract.minimum_observability_contract.note_on_constitutional_invariants_checked
      value: >-
        Le signal constitutional_invariants_checked doit etre rattache a une liste
        d'invariants verifies et a un protocole explicite. Invariants minimaux couverts:
        INV_RUNTIME_FULLY_LOCAL (via constitutional_invariants_runtime_local axis) et
        INV_NO_RUNTIME_CONTENT_GENERATION (via no_runtime_content_generation_proof
        axis). Protocole: ce signal ne peut etre emis qu'a PASS des deux axes dans le
        rapport de validation minimum_contract. Il est non auditable tant que
        PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED reste absent.

  - patch_id: PFPATCH_C1
    source_decision: CONS-02
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: add
    change_type: contradiction_resolution
    sequence: 5
    priority: eleve
    rationale: >-
      Deux enonces contradictoires coexistaient dans execution_projection_contract.
      rule_of_use autorisait l'usage en contexte unique, usage_as_sole_context le
      bloquait, sans clause de distinction. Consensus fort 3/3 rapports. Risque de
      derive normative silencieuse pour toute IA lisant l'architecture.
    effect: >-
      Ajoute usage_as_sole_context_regime et usage_as_sole_context_unblock_conditions
      dans execution_projection_contract. Met a jour rule_of_use pour distinguer
      regime cible vs politique V0.
    risk_avoided: >-
      IA appliquant rule_of_use au lieu de usage_as_sole_context blocked, produisant
      une projection utilisee comme contexte unique sans validation.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract
      granularity: block
      keys_to_update:
      - rule_of_use
      - usage_as_sole_context_regime
      - usage_as_sole_context_unblock_conditions
    operations:
    - op: replace
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.rule_of_use
      value: >-
        Une projection derivee peut etre l'unique artefact fourni a une IA pour un
        travail donne si elle est validee comme strictement fidele, sans divergence
        normative, pour le scope declare. Il s'agit du REGIME CIBLE de la factory.
        Ce regime est actuellement bloque (V0) - voir usage_as_sole_context et
        usage_as_sole_context_unblock_conditions.
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.usage_as_sole_context_regime
      value: >-
        POLITIQUE V0 ACTUELLE: l'usage d'une projection comme unique contexte est
        bloque jusqu'a satisfaction des conditions listees dans
        usage_as_sole_context_unblock_conditions. Le regime cible (usage autorise si
        valide) est decrit dans rule_of_use.
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.usage_as_sole_context_unblock_conditions
      value:
      - validator dedie implemente (PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED = present)
      - protocole de regeneration deterministe defini et operationnel
      - constitutional_conformance_matrix.yaml present et valide (PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT = resolved)

  - patch_id: PFPATCH_C2
    source_decision: CONS-12
    target_artifact: docs/cores/current/platform_factory_architecture.yaml
    operation: add
    change_type: annotation
    sequence: 6
    priority: eleve
    rationale: >-
      Le fichier constitutional_conformance_matrix.yaml est reference a deux endroits
      dans l'architecture mais absent du repo. References mortes dans un contrat
      released. Annotation minimale pour rendre l'absence visible. Consensus fort 3/3.
    effect: >-
      Ajoute des champs de statut pending_blocker sur les deux references
      conformance_matrix dans l'architecture.
    risk_avoided: >-
      IA ou pipeline supposant que le fichier existe et l'utilisant sans verification,
      produisant une conformite non auditable.
    location_hint:
      section: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract + PLATFORM_FACTORY_ARCHITECTURE.dependencies_to_constitution
      granularity: field
      keys_to_update:
      - mandatory_fields_per_projection_notes
      - constitutional_conformance_matrix_ref_status
    operations:
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.contracts.execution_projection_contract.mandatory_fields_per_projection_notes
      value: >-
        conformance_matrix_ref PENDING: PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT. Le
        fichier docs/cores/platform_factory/constitutional_conformance_matrix.yaml
        est reference mais absent. Ne pas supprimer la reference (design intent preserve).
    - op: add
      path: PLATFORM_FACTORY_ARCHITECTURE.dependencies_to_constitution.constitutional_conformance_matrix_ref_status
      value: >-
        PENDING PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT. Fichier absent, enregistre comme
        blocker dans platform_factory_state.yaml.

  # --- STATE PATCHES : ordre impose par les dependances de liste ---
  # Regle : les list_replace_mapping doivent passer AVANT tout add sur la meme liste.
  # Regle : les list_remove_mapping / list_remove_item doivent passer AVANT tout add
  #         sur la meme liste pour eviter que la liste soit convertie en dict.

  - patch_id: PFPATCH_E1
    source_decision: CONS-07
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: capability_reclassification
    sequence: 7
    priority: modere
    rationale: >-
      PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED est classe capabilities_present
      alors qu'il s'agit d'une intention non outillee (intent only, not yet tooled).
      Surdeclaration legere mais reelle. Retenu dans les 3 arbitrage reports.
    effect: >-
      Deplace PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED de capabilities_present
      vers capabilities_partial avec description mise a jour.
    risk_avoided: >-
      Surevaluation de la maturite du pipeline platform_factory, pouvant induire une
      IA a supposer un outillage operationnel inexistant.
    location_hint:
      section: PLATFORM_FACTORY_STATE.capabilities_present + PLATFORM_FACTORY_STATE.capabilities_partial
      granularity: list_item
      keys_to_update:
      - capability_id
      - description
    operations:
    - op: list_remove_mapping
      path: PLATFORM_FACTORY_STATE.capabilities_present
      match_key: capability_id
      match_value: PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED
    - op: add
      path: PLATFORM_FACTORY_STATE.capabilities_partial
      value:
        capability_id: PF_CAPABILITY_FACTORY_PIPELINE_INTENT_DEFINED
        description: >-
          Intent pose, prompts de lancement definis (STAGE_01 a STAGE_09), outillage
          d'execution absent. Le pipeline est gouverne et executable manuellement mais
          non automatise. Une intention non outillee n'est pas une capacite presente.

  - patch_id: PFPATCH_E2
    source_decision: CONS-07
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: state_resync
    sequence: 8
    priority: modere
    rationale: >-
      storage_location_decision figure encore dans derived_projection_conformity_status.missing
      alors que la decision ARB-04 l'a actee. exact_projection_storage_location figure
      encore dans assessed_scope.excludes alors que la decision est inscrite dans
      l'architecture. Desynchronisation factuelle.
    effect: >-
      Retire storage_location_decision de derived_projection_conformity_status.missing
      et exact_projection_storage_location de assessed_scope.excludes. Met a jour la
      description de PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED.
    risk_avoided: >-
      State incoherent avec la decision ARB-04 deja inscrite en architecture, creant
      une fausse impression que l'emplacement est encore indecis.
    location_hint:
      section: PLATFORM_FACTORY_STATE.derived_projection_conformity_status + PLATFORM_FACTORY_STATE.assessed_scope + PLATFORM_FACTORY_STATE.capabilities_partial
      granularity: list_item
      keys_to_update:
      - missing
      - excludes
      - description
    operations:
    - op: list_remove_item
      path: PLATFORM_FACTORY_STATE.derived_projection_conformity_status.missing
      value: storage_location_decision
    - op: list_remove_item
      path: PLATFORM_FACTORY_STATE.assessed_scope.excludes
      value: exact_projection_storage_location
    - op: list_replace_mapping
      path: PLATFORM_FACTORY_STATE.capabilities_partial
      match_key: capability_id
      match_value: PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED
      value:
        capability_id: PF_CAPABILITY_PROJECTION_STORAGE_LOCATION_FINALIZED
        description: >-
          Emplacement decide (ARB-04): docs/cores/platform_factory/projections/. Regle
          d'interdiction dans docs/cores/current/ inscrite dans l'architecture.
          Repertoire non encore cree physiquement. Aucune projection stockee. Outillage
          de generation et de validation absent. Capacite partielle: decision actee,
          operationnalisation a faire.

  - patch_id: PFPATCH_C3
    source_decision: CONS-11
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: state_resync
    sequence: 9
    priority: eleve
    rationale: >-
      Lie a PFPATCH_C1. Le state doit refleter la distinction regime cible / politique
      V0 apres correction de l'architecture.
    effect: >-
      Met a jour la description de PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED pour
      y indiquer explicitement le regime cible vs la politique V0 actuelle.
    risk_avoided: >-
      State incoherent avec l'architecture apres patch CONS-02.
    location_hint:
      section: PLATFORM_FACTORY_STATE.capabilities_partial
      granularity: list_item
      keys_to_update:
      - description
    operations:
    - op: list_replace_mapping
      path: PLATFORM_FACTORY_STATE.capabilities_partial
      match_key: capability_id
      match_value: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
      value:
        capability_id: PF_CAPABILITY_DERIVED_PROJECTION_RULE_DEFINED
        description: >-
          Regle d'usage des projections derivees definie. Emplacement de stockage
          decide (ARB-04). Champs minimaux obligatoires inscrits dans l'architecture
          (ARB-05). Regime cible: usage comme unique contexte si valide, decrit dans
          rule_of_use de l'architecture. Politique V0 actuelle: usage_as_sole_context
          blocked - voir usage_as_sole_context_unblock_conditions dans l'architecture.
          Restent absents: validator dedie, protocole de regeneration automatise.

  - patch_id: PFPATCH_C5
    source_decision: CONS-09
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: description_strengthening
    sequence: 10
    priority: eleve
    rationale: >-
      Le state ne liait pas explicitement l'absence du validator au risque de derive
      normative sur les projections.
    effect: >-
      Enrichit la description de PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED pour
      y indiquer que tout validation_status validated est non auditable tant que le
      validator n'est pas implemente.
    risk_avoided: >-
      Pipeline ou IA supposant qu'une projection taguee validated est reellement
      conforme, sans aucun validator sous-jacent.
    location_hint:
      section: PLATFORM_FACTORY_STATE.capabilities_absent
      granularity: list_item
      keys_to_update:
      - description
    operations:
    - op: list_replace_mapping
      path: PLATFORM_FACTORY_STATE.capabilities_absent
      match_key: capability_id
      match_value: PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED
      value:
        capability_id: PF_CAPABILITY_FACTORY_VALIDATORS_IMPLEMENTED
        description: >-
          Validateurs dedies a la conformite des projections et du contrat minimal non
          encore implementes. Consequence directe: tout tag validation_status validated
          sur une projection derivee est non deterministe et non auditable en l'etat.
          Aucune projection ne peut etre consideree comme validee de facon probante
          tant que ce validator n'est pas implemente. De meme, le signal
          constitutional_invariants_checked ne peut pas etre emis de facon auditable.

  - patch_id: PFPATCH_D1
    source_decision: CONS-08
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: description_strengthening
    sequence: 11
    priority: eleve
    rationale: >-
      La description de PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED minimisait l'impact.
      CR-Nemotron qualifie l'absence comme impossibilite operationnelle pour tout
      travail multi-IA reel, pas simple sous-optimalite. Consensus fort 3/3 rapports.
    effect: >-
      Met a jour la description du gap pour qualifier explicitement le blocker
      operationnel et ses consequences.
    risk_avoided: >-
      Sous-evaluation du risque multi-IA conduisant a un usage parallele sans protocole,
      avec collisions normatives et derivences silencieuses.
    location_hint:
      section: PLATFORM_FACTORY_STATE.known_gaps
      granularity: list_item
      keys_to_update:
      - description
    operations:
    - op: list_replace_mapping
      path: PLATFORM_FACTORY_STATE.known_gaps
      match_key: gap_id
      match_value: PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
      value:
        gap_id: PF_GAP_PARALLEL_AI_PROTOCOL_UNDEFINED
        description: >-
          BLOCKER OPERATIONNEL pour tout travail multi-IA reel. Le protocole fin
          d'assemblage entre sorties IA paralleles n'est pas defini. Aucun mecanisme
          de decomposition de tache, de granularite modulaire, d'assemblage de sorties
          ou de resolution de conflit n'existe. L'usage parallele multi-IA sans ce
          protocole expose a des collisions normatives et a des derivences silencieuses
          non detectees. Differe a une iteration dediee avec spec de protocole multi-IA.

  - patch_id: PFPATCH_E3
    source_decision: CONS-10
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: update
    change_type: blocker_description_update
    sequence: 12
    priority: modere
    rationale: >-
      La description de PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION ne refletait
      pas que la release PLATFORM_FACTORY_RELEASE_2026_04_10_R01 est deja manifestee
      dans docs/cores/releases/. Decision humaine DISC-02 Option C.
    effect: >-
      Met a jour impact et exit_condition du blocker pour refleter la realite de
      gouvernance (release manifestee, fenetre residuelle = promotion STAGE_08 uniquement).
    risk_avoided: >-
      Description inexacte donnant une fausse impression d'absence totale de manifest.
    location_hint:
      section: PLATFORM_FACTORY_STATE.blockers
      granularity: list_item
      keys_to_update:
      - impact
      - exit_condition
    operations:
    - op: list_replace_mapping
      path: PLATFORM_FACTORY_STATE.blockers
      match_key: blocker_id
      match_value: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
      value:
        blocker_id: PF_BLOCKER_CURRENT_MANIFEST_SCHEMA_LIMITATION
        severity: medium
        impact: >-
          Les artefacts platform_factory sont dans docs/cores/current/ mais hors
          manifest officiel de current/. La release PLATFORM_FACTORY_RELEASE_2026_04_10_R01
          est manifestee dans docs/cores/releases/PLATFORM_FACTORY_RELEASE_2026_04_10_R01/manifest.yaml
          (statut RELEASE_CANDIDATE, promotion_candidate: true). La fenetre residuelle
          concerne uniquement la promotion vers docs/cores/current/ via STAGE_08. Aucun
          nouveau fichier manifest cree par ce patch (decision humaine DISC-02 Option C).
        exit_condition: >-
          Ce blocker est leve quand STAGE_08 complete sa premiere execution formelle
          avec promotion effective vers docs/cores/current/ et mise a jour du manifest
          officiel de current/.

  - patch_id: PFPATCH_C4
    source_decision: CONS-03
    target_artifact: docs/cores/current/platform_factory_state.yaml
    operation: add
    change_type: blocker_registration
    sequence: 13
    priority: eleve
    rationale: >-
      Le fichier constitutional_conformance_matrix.yaml est reference a deux endroits
      dans l'architecture mais absent. Non liste comme blocker dans le state. Consensus
      fort 3/3 rapports.
    effect: >-
      Enregistre PF_BLOCKER_CONFORMANCE_MATRIX_ABSENT dans la liste des blockers du
      state avec impact et exit_condition explicites.
    risk_avoided: >-
      Absence non tracee d'un artefact obligatoire, creant une fausse impression de
      completude du contrat de projection.
    location_hint:
      section: PLATFORM_FACTORY_STATE.blockers
      granularity: list_item
      keys_to_update:
      - blocker_id
      - severity
      - impact
      - exit_condition
    operations:
    - op: add
