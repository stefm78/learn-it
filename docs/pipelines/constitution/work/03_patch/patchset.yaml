            patchable: false
            parameterizable: true
            human_readable: >
              Divergence persistante détectée entre MSC calculé (P×R×A validés) et
              état perçu AR-N1 (blocage total signalé persistant) sur le nombre de
              sessions défini dans PARAM_REFERENTIEL_MSC_PERCEPTION_DIVERGENCE_THRESHOLD.
            logic:
              trigger: >
                MSC de base atteint (P, R, A validés) ET AR-N1 signale un blocage
                total persistant sur PARAM_REFERENTIEL_MSC_PERCEPTION_DIVERGENCE_THRESHOLD
                sessions consécutives.
              condition: Divergence entre MSC calculé et état perçu sur le seuil défini.
              effect: >
                Déclenchement du protocole de résolution :
                retour en phase diagnostique ciblée en priorité ;
                si persistance après diagnostique, escalade vers révision du design
                du contenu.
              scope: runtime_evaluation

        - op: append
          target:
            section: RULES
          value:
            id: RULE_MSC_PERCEPTION_DIVERGENCE_PROTOCOL
            authority: primary
            core_type: CONSTITUTION
            source_anchor: "[ARBITRAGE_2026_04_01][DIVMSC-01]"
            depends_on:
