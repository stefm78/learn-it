              déclenchée (notification externe).
            logic:
              trigger: EVENT_MSC_PERCEPTION_DIVERGENCE_DETECTED
              condition: Divergence MSC calculé vs perçu persistante.
              effect: >
                Étape 1 : retour obligatoire en phase diagnostique ciblée sur la
                KU concernée.
                Étape 2 (si divergence persiste après diagnostique) : escalade vers
                révision du design du contenu — notification externe obligatoire.
              scope: runtime_evaluation

