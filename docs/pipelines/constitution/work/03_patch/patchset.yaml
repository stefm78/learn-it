PATCH_SET:
  id: CONSTITUTION_STAGE_03_PATCH_SYNTHESIS_2026_04_01
  patch_dsl_version: "4.0"
  atomic: true
  description: >-
    STAGE_03 patch synthesis for the constitution pipeline. This patchset translates
    the consolidated arbitrage into a minimal executable patch across Constitution,
    Référentiel and LINK: fail-safe on delegated thresholds, unknown-state fallback,
    closure of open loops, off-session escalation constraints, systemic investigation
    lifecycle, activation-distress persistence escalation, probation closure, and
    targeted normalization of LINK core_ref bindings.
  federation:
    REF_CORE_LEARNIT_REFERENTIEL_V1_0_IN_CONSTITUTION:
      file: docs/cores/current/referentiel.yaml
      expected_core_id: CORE_LEARNIT_REFERENTIEL_V1_0
    REF_CORE_LEARNIT_CONSTITUTION_V1_9_IN_REFERENTIEL:
      file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V1_9
    LINK_REF_CORE_LEARNIT_CONSTITUTION_V1_9:
      file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V1_9
    LINK_REF_CORE_LEARNIT_REFERENTIEL_V1_0:
      file: docs/cores/current/referentiel.yaml
      expected_core_id: CORE_LEARNIT_REFERENTIEL_V1_0
  files:
    - file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V1_9
      operations:
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_KNOWLEDGE_GRAPH_MUST_BE_ACYCLIC
            field: human_readable
          value: Le graphe des KU doit rester acyclique au chargement initial comme après tout patch ou rechargement incrémental.
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_KNOWLEDGE_GRAPH_MUST_BE_ACYCLIC
            field: logic.trigger
          value: Validation design, chargement du graphe ou revalidation post-patch.
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_KNOWLEDGE_GRAPH_MUST_BE_ACYCLIC
            field: logic.effect
          value: État interdit ; déploiement bloqué, chargement refusé ou patch rejeté tant que l’acyclicité n’est pas rétablie.

        - op: replace_field
          target:
            section: RULES
            id: RULE_MSC_PERCEPTION_DIVERGENCE_PROTOCOL
            field: human_readable
          value: À la détection d'une divergence MSC calculé vs perçu, le moteur déclenche d'abord une phase diagnostique ciblée ; si la divergence persiste, seule une escalade hors session vers révision du design du contenu est autorisée.
        - op: replace_field
          target:
            section: RULES
            id: RULE_MSC_PERCEPTION_DIVERGENCE_PROTOCOL
            field: logic.effect
          value: Étape 1 : retour obligatoire en phase diagnostique ciblée sur la KU concernée. Étape 2 si la divergence persiste après diagnostique : ouverture d’une escalade hors session vers révision du design du contenu ; aucune notification externe en session active n’est autorisée.

