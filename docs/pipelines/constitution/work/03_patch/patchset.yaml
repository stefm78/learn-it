PATCH_SET:
  id: PATCH_CONSTITUTION_PIPELINE_STAGE03_MINIMALISTE_RENFORCEE_2026_03_26
  patch_dsl_version: "4.0"
  atomic: true
  description: >
    Patch de fermeture inter-Core minimaliste renforcée.
    Priorité au LINK pour expliciter les bindings critiques manquants ;
    micro-renfort Constitution pour expliciter qu'un axe d'état peut rester unknown/absent
    plutôt qu'être forcé en présence de sources absentes ou non autorisées.

  federation:
    LINK_REF_CORE_LEARNIT_CONSTITUTION_V1_7:
      file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V1_7
    LINK_REF_CORE_LEARNIT_REFERENTIEL_V0_6:
      file: docs/cores/current/referentiel.yaml
      expected_core_id: CORE_LEARNIT_REFERENTIEL_V0_6

  files:
    - file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V1_7
      operations:
        - op: assert_meta
          target:
            field: core_type
          value: CONSTITUTION

        - op: assert_meta
          target:
            field: version
          value: V1_7_FINAL

        - op: ensure_absent
          target:
            section: RULES
            id: RULE_LEARNER_STATE_AXIS_UNKNOWN_ALLOWED

        - op: append
          target:
            section: RULES
          value:
            id: RULE_LEARNER_STATE_AXIS_UNKNOWN_ALLOWED
            authority: primary
            core_type: CONSTITUTION
            source_anchor: "[S7][S11][PATCH_V1_7__STAGE03]"
            depends_on:
              - TYPE_LEARNER_STATE_MODEL
              - TYPE_STATE_AXIS_ACTIVATION
              - TYPE_STATE_AXIS_VALUE_COST
              - TYPE_SELF_REPORT_AR_N1
              - TYPE_SELF_REPORT_AR_N2
            relations:
              - type: constrains
                target:
                  id: TYPE_LEARNER_STATE_MODEL
            patchable: false
            parameterizable: false
            human_readable: >
              Un axe d'état apprenant peut rester unknown, absent ou non-observable
              plutôt qu'être forcé quand la source autorisée manque ou n'est pas exploitable.
            logic:
              trigger: Mise à jour de l'état apprenant
              condition: Source autorisée absente, non renseignée ou non exploitable selon la gouvernance active.
              effect: >
                L'axe concerné reste unknown/absent/non-observable ; aucune valeur n'est forcée
                par simple complétion implicite au niveau constitutionnel.
              scope: runtime_state

