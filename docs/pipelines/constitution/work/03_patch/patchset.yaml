              - PARAM_REFERENTIEL_CONSOLIDATION_SATISFACTORY_SESSION_CRITERION
              - PARAM_REFERENTIEL_OSCILLATION_MAX_CYCLES_BEFORE_ESCALATION
            relations: []
            patchable: true
            parameterizable: true
            human_readable: Le régime oscillatoire Consolidation ↔ Exploration doit avoir un critère de session satisfaisante, une borne de cycles et une sortie explicite.
            logic:
              trigger: Activation du régime oscillatoire.
              condition: Conflit Consolidation ↔ Exploration confirmé.
              effect: Utiliser le critère déterministe de session satisfaisante pour autoriser l’alternance, sortir quand R atteint, ou ouvrir une escalade explicite si le nombre maximal de cycles est dépassé.
              scope: runtime_state

