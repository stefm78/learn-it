        - op: replace_field
          target:
            section: RULES
            id: RULE_REFERENTIEL_ADAPTIVE_REGIME_CONFLICT_RESOLUTION
            field: human_readable
          value: Table de priorité par paire de conflits pour les cellules de frontière de la matrice des régimes adaptatifs. Règle synthétique : (1) Détresse l'emporte toujours. (2) Conservateur l'emporte sur Exploration et Consolidation tant que sa fenêtre référentielle de sortie n'est pas atteinte. (3) Consolidation l'emporte sur Sous-défi sauf si R est déjà atteint. (4) Exploration l'emporte sur Sous-défi. (5) Consolidation vs Exploration ouvre un régime oscillatoire piloté par R et borné par un nombre maximal de cycles explicite.
        - op: replace_field
          target:
            section: RULES
            id: RULE_REFERENTIEL_ADAPTIVE_REGIME_CONFLICT_RESOLUTION
            field: logic.effect
          value: |-
            Application de la table de priorité :
            - Détresse + tout autre : Détresse prime.
            - Conservateur + Sous-défi : Conservateur tant que la fenêtre référentielle de sortie n’est pas atteinte.
            - Conservateur + Exploration : Conservateur.
            - Conservateur + Consolidation : Conservateur.
            - Consolidation + Sous-défi : Sous-défi si R atteint, sinon Consolidation.
            - Consolidation + Exploration : régime oscillatoire borné ; alternance 1 session de consolidation satisfaisante puis 1 session d’exploration, avec sortie quand R atteint ou quand le nombre maximal de cycles est dépassé.
            - Trois régimes actifs ou plus : appliquer d’abord la priorité Détresse, puis la hiérarchie d’escalade explicite ; si l’état reste ambigu, ouvrir une investigation systémique.

        - op: ensure_exists
          target:
            section: RULES
            id: RULE_REFERENTIEL_OSCILLATION_EXIT_AND_ESCALATION
          value:
            id: RULE_REFERENTIEL_OSCILLATION_EXIT_AND_ESCALATION
            authority: primary
            core_type: REFERENTIEL
            source_anchor: '[ARBITRAGE_2026_04_01][OSC-03]'
