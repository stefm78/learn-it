              reliant les axes constitutionnels et auto-rapports aux règles référentielles
              de précédence, reweighting et non-inférence.
            logic:
              trigger: Résolution d'un état apprenant multi-sources
              condition: Les Core Constitution et Référentiel sont fédérés dans le même système.
              effect: >
                La Constitution déclare les axes, sources autorisées et statuts admissibles ;
                le Référentiel borne l'ordre de résolution, le reweighting et les interdits d'inférence.
              scope: intercore_binding

