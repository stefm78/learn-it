            relations:
              - type: constrains
                target:
                  id: TYPE_MASTERY_MODEL
            patchable: false
            parameterizable: false
            human_readable: Aucune évaluation constitutionnelle dépendant d’un seuil délégué n’est autorisée sans Référentiel valide et compatible.
            logic:
              trigger: Évaluation runtime d’une règle ou composante dépendant d’un seuil délégué.
              condition: Référentiel absent, invalide ou incompatible avec la Constitution active.
              effect: Déploiement bloqué ou fallback conservateur explicite ; aucune résolution implicite de seuil n’est permise.
              scope: runtime_safety

        - op: ensure_exists
