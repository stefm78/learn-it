PATCH_VALIDATION:
  schema_version: 0.1
  pipeline_id: constitution
  stage_id: STAGE_04_PATCH_VALIDATION
  run_id: CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01
  mode: bounded_local_run
  status: BLOCKED
  execution_evidence:
    validate_patchset_command_emitted_or_executed: emitted_only
    real_execution_evidence_declared: false
    validate_patchset_executed: false
    patch_validation_yaml_present: true
    command_emitted: >-
      python docs/patcher/shared/validate_patchset.py
      --patch docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01/work/03_patch/patchset.yaml
      --output docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01/work/04_patch_validation/patch_validation.yaml
    note: >-
      Le contrat stable du stage 04 exige l'exécution réelle de validate_patchset.py
      avant toute conclusion PASS ou FAIL. Cette exécution n'a pas été réalisée dans
      la présente exécution ; le stage reste donc BLOCKED. Ce fichier matérialise
      explicitement l'absence de preuve réelle et ne remplace pas la sortie du script.
  structural_validation_summary:
    status: not_executed
    source_of_truth: docs/patcher/shared/validate_patchset.py
    result_interpretation: unavailable_pending_real_execution
    note: >-
      Aucune preuve matérielle d'exécution réelle du validateur DSL n'est disponible.
      La validation structurelle déterministe obligatoire reste à produire.
  logical_review_summary:
    status: pending_real_execution
    scope_and_perimeter_compliance:
      preliminary_read: >-
        Le patch cible uniquement docs/cores/current/constitution.yaml, ce qui est
        compatible avec le writable_perimeter déclaré pour ce run.
    minimality:
      preliminary_read: >-
        Le patchset se présente comme borné aux trois corrections arbitrées R1-R3,
        avec R4 maintenu en no_change/note-only.
    governance_safety:
      preliminary_read: >-
        Aucun write explicite vers referentiel.yaml ou link.yaml n'est déclaré dans
        le patchset lu.
    reference_integrity:
      preliminary_read: >-
        Une revue logique finale sur l'intégrité des références et la conformité DSL
        dépend du résultat réel de validate_patchset.py et n'est pas substituable par
        cette lecture statique.
    apply_readiness:
      status: not_assessable_yet
      note: >-
        L'apply-readiness ne peut pas être conclue avant preuve PASS du validateur
        structurel obligatoire.
  anomalies_and_warnings:
    anomalies:
      - code: MISSING_REAL_EXECUTION_EVIDENCE
        severity: blocking
        message: >-
          validate_patchset.py n'a pas été exécuté réellement ou sa preuve matérielle
          n'est pas disponible dans le livrable attendu du stage 04.
    warnings:
      - code: PRELIMINARY_LOGICAL_REVIEW_ONLY
        severity: non_blocking
        message: >-
          La revue logique ci-dessus est strictement préliminaire et ne peut en aucun
          cas être utilisée comme substitut à la validation structurelle obligatoire.
      - code: STALE_NEIGHBOR_INPUT_REMAINS_VISIBLE
        severity: non_blocking
        message: >-
          L'anomalie R4 issue des inputs bornés reste visible dans impact_bundle /
          neighbor_extract, mais le patchset la maintient explicitement hors patch local.
  corrections_required_if_any:
    required_now:
      - step: 1
        type: execute_required_script
        action: >-
          Exécuter réellement validate_patchset.py avec la commande émise ci-dessus
          afin de matérialiser la preuve structurelle du stage.
      - step: 2
        type: rerun_same_stage
        action: >-
          Relancer STAGE_04_PATCH_VALIDATION après matérialisation réelle de
          patch_validation.yaml par le script obligatoire.
    corrections_if_fail_after_execution:
      - step: 3
        type: return_to_stage_03_if_needed
        action: >-
          Si validate_patchset.py retourne FAIL ou si la revue logique post-exécution
          identifie un problème bloquant, réviser le patchset en STAGE_03 avant toute
          nouvelle tentative.
  human_actions_to_execute:
    on_blocked:
      mandatory: true
      command: >-
        python docs/patcher/shared/validate_patchset.py
        --patch docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01/work/03_patch/patchset.yaml
        --output docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01/work/04_patch_validation/patch_validation.yaml
      relaunch_prompt: >-
        Reprends STAGE_04_PATCH_VALIDATION pour CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01 —
        validate_patchset.py a été exécuté et patch_validation.yaml est présent.
      note: >-
        Tant que cette exécution réelle n'a pas été produite, le stage 04 ne peut pas
        conclure PASS ou FAIL et ne doit pas avancer vers STAGE_05_APPLY.
