PATCH_SET:
  id: PATCHSET_CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01_STAGE_03
  patch_dsl_version: "4.0"
  atomic: true
  description: >-
    Patchset minimal de STAGE_03_PATCH_SYNTHESIS pour le run
    CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01.
    Traduit l'arbitrage canonique du run en corrections locales bornées sur
    constitution.yaml, sans modification inter-Core ni extension de scope.
  patch_scope:
    run_id: CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01
    pipeline_id: constitution
    stage_id: STAGE_03_PATCH_SYNTHESIS
    mode: bounded_local_run
    writable_files:
      - docs/cores/current/constitution.yaml
    writable_ids:
      - INV_RUNTIME_FULLY_LOCAL
      - INV_NO_RUNTIME_CONTENT_GENERATION
      - INV_RUNTIME_QUALIFICATION_SIGNALS_MUST_BE_EXPLICIT_OR_OFFSESSION
      - INV_CONSTITUTION_REFERENTIAL_SEPARATION
      - TYPE_AUTONOMY_REGIME
      - CONSTRAINT_NO_CHANGE_TO_AND_LOGIC
      - CONSTRAINT_NO_CHANGE_TO_GRAPH_PROPAGATION_RULE
      - RULE_GF08_UNCOVERED_CONFLICT_CONSERVATIVE_RESPONSE
      - RULE_UNVERIFIED_GAMIFICATION_PROBATION
      - RULE_GAMIFICATION_PROBATION_MUST_CLOSE
      - EVENT_GF08_UNCOVERED_CONFLICT
      - EVENT_GAMIFICATION_PROBATION_MAX_DURATION_REACHED
      - ACTION_INFORM_LEARNER
    non_patchable_now:
      - challenge_finding_id: R4
        decision: necessite_extension_scope
        reason: >-
          Décalage entre l'ancre voisine matérialisée dans les inputs du run
          (V2.0) et l'ancre inter-Core canonique courante (V3.0) ; sujet de
          génération d'inputs / partition, non patchable localement dans ce run.
  arbitrage_to_patch_mapping:
    - challenge_finding_id: R1
      decision: corriger_maintenant
      scope_status: in_scope
      gate_checks:
        - WP_01
      operations:
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: INVARIANTS
            id: INV_RUNTIME_FULLY_LOCAL
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: INVARIANTS
            id: INV_NO_RUNTIME_CONTENT_GENERATION
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: INVARIANTS
            id: INV_RUNTIME_QUALIFICATION_SIGNALS_MUST_BE_EXPLICIT_OR_OFFSESSION
            field: logic.effect
    - challenge_finding_id: R2
      decision: corriger_maintenant
      scope_status: in_scope
      gate_checks:
        - WP_02
        - WP_03
        - WP_05
      operations:
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: TYPES
            id: TYPE_AUTONOMY_REGIME
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: INVARIANTS
            id: INV_CONSTITUTION_REFERENTIAL_SEPARATION
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: no_change
          target:
            section: CONSTRAINTS
            id: CONSTRAINT_NO_CHANGE_TO_AND_LOGIC
          reason: >-
            La contrainte est déjà explicite et conforme ; aucun patch local
            supplémentaire requis dans ce run.
        - file: docs/cores/current/constitution.yaml
          op: no_change
          target:
            section: CONSTRAINTS
            id: CONSTRAINT_NO_CHANGE_TO_GRAPH_PROPAGATION_RULE
          reason: >-
            La contrainte est déjà explicite et conforme ; aucun patch local
            supplémentaire requis dans ce run.
    - challenge_finding_id: R3
      decision: corriger_maintenant
      scope_status: in_scope
      gate_checks:
        - WP_04
      operations:
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: RULES
            id: RULE_GF08_UNCOVERED_CONFLICT_CONSERVATIVE_RESPONSE
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: replace_field
          target:
            section: RULES
            id: RULE_GAMIFICATION_PROBATION_MUST_CLOSE
            field: logic.effect
        - file: docs/cores/current/constitution.yaml
          op: no_change
          target:
            section: RULES
            id: RULE_UNVERIFIED_GAMIFICATION_PROBATION
          reason: >-
            Le rôle de mise en mode probatoire est déjà borné ; la clarification
            requise porte sur la frontière avec patch/promotion, couverte par les
            règles GF-08 et de clôture explicite.
    - challenge_finding_id: R4
      decision: necessite_extension_scope
      scope_status: needs_scope_extension
      gate_checks:
        - WP_02
        - FORBIDDEN_OPS_ENFORCEMENT
      operations:
        - file: docs/cores/current/constitution.yaml
          op: no_change
          target:
            section: TYPES
            id: REF_CORE_LEARNIT_REFERENTIEL_V3_0_IN_CONSTITUTION
          reason: >-
            Aucun patch local dans ce run : l'ancre canonique V3.0 est déjà en
            place côté Constitution ; l'anomalie réside dans les inputs bornés du run.
        - file: docs/cores/current/constitution.yaml
          op: note
          value:
            id: NOTE_R4_SCOPE_EXTENSION_REQUIRED
            challenge_finding_id: R4
            classification: scope_gap
            message: >-
              Rejouer la génération de partition / scope catalog / inputs bornés
              pour aligner impact_bundle et neighbor_extract sur
              REF_CORE_LEARNIT_REFERENTIEL_V3_0_IN_CONSTITUTION.
  fallback_reads_used_if_any:
    used: true
    rationale: >-
      neighbor_extract.yaml signale l'ID manquant
      REF_CORE_LEARNIT_REFERENTIEL_V2_0_IN_CONSTITUTION ; le fallback autorisé a
      été utilisé pour localiser l'ancre canonique courante et qualifier R4 comme
      anomalie d'inputs plutôt que comme correction locale de contenu.
    files:
      - docs/cores/current/constitution.yaml
      - docs/cores/current/referentiel.yaml
  human_actions_to_execute:
    on_done:
      mandatory: true
      command: >-
        python docs/patcher/shared/update_run_tracking.py
        --pipeline constitution
        --run-id CONSTITUTION_RUN_2026_04_16_DEPLOYMENT_GOVERNANCE_R01
        --stage-id STAGE_03_PATCH_SYNTHESIS
        --stage-status done
        --run-status active
        --next-stage STAGE_04_PATCH_VALIDATION
        --summary "Patchset synthesized; ready for deterministic validation."
      next_step: >-
        Exécuter ensuite STAGE_04_PATCH_VALIDATION, qui rejoue réellement
        validate_patchset.py selon le contrat du stage suivant.
  files:
    - file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V3_0
      operations:
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_RUNTIME_FULLY_LOCAL
            field: logic.effect
          value: >-
            Aucun appel réseau temps réel n’est autorisé. Cette contrainte borne
            l’architecture d’exécution locale uniquement et ne vaut jamais règle
            pédagogique autonome, ni base d’inférence adaptative implicite.
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_NO_RUNTIME_CONTENT_GENERATION
            field: logic.effect
          value: >-
            Le moteur sélectionne uniquement des artefacts préexistants. Cette
            contrainte borne le runtime et n’autorise aucune logique pédagogique
            implicite par génération, réécriture ou interprétation autonome du contenu.
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_RUNTIME_QUALIFICATION_SIGNALS_MUST_BE_EXPLICIT_OR_OFFSESSION
            field: logic.effect
          value: >-
            Interdiction ; seuls les artefacts précomputés hors session ou les
            indicateurs explicites déterministes sont autorisés en usage local.
            Cette exigence borne la qualification des signaux de runtime et ne vaut
            pas règle pédagogique autonome ni adaptation interprétative implicite.
        - op: replace_field
          target:
            section: TYPES
            id: TYPE_AUTONOMY_REGIME
            field: logic.effect
          value: >-
            Régime d’autonomie applicable comme configuration de déploiement gouvernée.
            Ce régime ne constitue jamais une règle adaptative implicite et n’autorise
            ni dérive décisionnelle autonome ni réallocation silencieuse entre Core.
        - op: replace_field
          target:
            section: INVARIANTS
            id: INV_CONSTITUTION_REFERENTIAL_SEPARATION
            field: logic.effect
          value: >-
            La Constitution fixe le quoi/pourquoi ; le Référentiel borne le
            combien/comment. Aucun patch local ne peut transformer cette frontière
            d’autorité, ni confondre invariant constitutionnel et paramètre référentiel.
        - op: no_change
          target:
            section: CONSTRAINTS
            id: CONSTRAINT_NO_CHANGE_TO_AND_LOGIC
          reason: >-
            Déjà explicite et conforme à l'arbitrage R2 ; aucune modification locale
            requise dans ce patchset.
        - op: no_change
          target:
            section: CONSTRAINTS
            id: CONSTRAINT_NO_CHANGE_TO_GRAPH_PROPAGATION_RULE
          reason: >-
            Déjà explicite et conforme à l'arbitrage R2 ; aucune modification locale
            requise dans ce patchset.
        - op: replace_field
          target:
            section: RULES
            id: RULE_GF08_UNCOVERED_CONFLICT_CONSERVATIVE_RESPONSE
            field: logic.effect
          value: >-
            Réponse conservatrice + log pour futur patch. Cette règle n’autorise
            jamais un patch implicite, une promotion implicite, ni un changement
            structurel ou inter-Core silencieux.
        - op: replace_field
          target:
            section: RULES
            id: RULE_GAMIFICATION_PROBATION_MUST_CLOSE
            field: logic.effect
          value: >-
            Sortie explicite du mode probatoire par validation, suspension ou retrait
            ; l’apprenant est informé si un changement visible intervient. Cette
            clôture explicite ne vaut ni validation de patch, ni promotion, ni
            autorisation de changement structurel implicite.
        - op: no_change
          target:
            section: RULES
            id: RULE_UNVERIFIED_GAMIFICATION_PROBATION
          reason: >-
            Le placement en mode probatoire est déjà explicite ; la frontière avec
            patch/promotion est clarifiée par les règles corrigées sans élargir le patch.
        - op: no_change
          target:
            section: TYPES
            id: REF_CORE_LEARNIT_REFERENTIEL_V3_0_IN_CONSTITUTION
          reason: >-
            Aucun patch local pour R4 : la référence canonique courante est déjà
            correcte dans la Constitution ; l'écart est dans les inputs du run.
        - op: note
          value:
            id: NOTE_R4_SCOPE_EXTENSION_REQUIRED
            challenge_finding_id: R4
            classification: scope_gap
            message: >-
              Sujet à traiter hors de ce patch local par réalignement de la
              génération des inputs bornés sur l'ancre
              REF_CORE_LEARNIT_REFERENTIEL_V3_0_IN_CONSTITUTION.
