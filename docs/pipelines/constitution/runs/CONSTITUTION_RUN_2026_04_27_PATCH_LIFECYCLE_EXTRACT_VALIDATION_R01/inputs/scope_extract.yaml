  - _source_core: constitution
    _source_section: INVARIANTS
    _matched_id: INV_PERSISTENT_DRIFT_REQUIRES_ESCALATION_IF_PATCH_BLOCKED
    entry:
      id: INV_PERSISTENT_DRIFT_REQUIRES_ESCALATION_IF_PATCH_BLOCKED
      authority: primary
      core_type: CONSTITUTION
      source_anchor: '[S14][PATCH_V4_0]'
      depends_on:
      - TYPE_PATCH_ARTIFACT
      - INV_INVALID_PATCH_REJECTED
      relations: []
      patchable: false
      parameterizable: false
      human_readable: Une dérive persistante non corrigeable par patch localement valide doit être escaladée.
      logic:
        trigger: Répétition d'un besoin de correction sur plusieurs cycles
        condition: 'Condition primaire : le signal de dérive persiste alors que le patch requis reste
          rejeté ou impossible (borne d''escalade atteinte). Condition complémentaire (boucle inefficacité)
          : N patches successifs du même type ont été appliqués sans disparition du signal de dérive,
          où N est un paramètre délégué au Référentiel (PARAM_REFERENTIEL_MAX_PATCH_ITERATIONS_BEFORE_ESCALATION).
          Les deux conditions déclenchent indépendamment l''obligation d''escalade.

          '
        effect: 'Escalade obligatoire hors session vers la chaîne d''analyse/correction. L''escalade s''applique
          que le patch soit rejeté/impossible (condition primaire) ou que le signal persiste malgré N
          applications valides successives (condition complémentaire). Aucun maintien implicite dans un
          état de dérive non traité n''est autorisé dans les deux cas.

          '
        scope: patch_governance
