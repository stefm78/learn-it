        condition: 'Application incomplète ou validation échouée. La partialité est détectée comme toute
          interruption intervenant avant le commit atomique complet de l''ensemble des opérations du patch.

          '
        effect: 'Retour à l''état identique au snapshot pré-application. Méthode obligatoire : un snapshot
          de l''état des fichiers cibles doit être capturé avant toute écriture ; en cas de détection
          de partialité, le snapshot est restauré intégralement. Aucune écriture partielle ne doit subsister
          après rollback. Le rollback doit être traçable dans le rapport d''exécution.

          '
        scope: patch_layer
