  - _source_core: constitution
    _source_section: RULES
    _matched_id: RULE_PATCH_SERIALIZATION
    entry:
      id: RULE_PATCH_SERIALIZATION
      authority: primary
      core_type: CONSTITUTION
      source_anchor: '[PATCH_LIFECYCLE_R01][C01]'
      depends_on:
      - TYPE_PATCH_ARTIFACT
      - ACTION_TRIGGER_RELEVANCE_PATCH
      - ACTION_TRIGGER_AR_SOLLICITATION_PATCH
      relations:
      - type: constrains
        target:
          id: TYPE_PATCH_ARTIFACT
      patchable: false
      parameterizable: false
      human_readable: 'Un seul patch actif par apprenant à un instant donné ; tout déclenchement concurrent
        est sérialisé en file d''attente FIFO.

        '
      logic:
        trigger: Déclenchement simultané de plusieurs actions de patch
        condition: 'Plusieurs actions de patch (ACTION_TRIGGER_RELEVANCE_PATCH, ACTION_TRIGGER_AR_SOLLICITATION_PATCH
          ou toute future action TYPE_PATCH_ARTIFACT) sont déclenchées pour le même apprenant avant qu''un
          patch actif soit terminé (appliqué, rejeté ou rollbacké).

          '
        effect: 'Un seul patch est traité à la fois par apprenant. Les déclenchements concurrents sont
          placés en file d''attente FIFO. Aucun patch concurrent ne peut démarrer tant que le patch actif
          n''est pas dans un état terminal (appliqué, rejeté ou rollbacké). L''état apprenant ne peut
          être modifié que par un seul patch actif à la fois, garantissant le déterminisme de l''état
          résultant.

          '
        scope: patch_governance
