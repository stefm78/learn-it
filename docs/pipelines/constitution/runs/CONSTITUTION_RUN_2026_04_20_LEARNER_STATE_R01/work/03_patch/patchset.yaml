PATCH_SET:
  id: PATCHSET_CONSTITUTION_RUN_2026_04_20_LEARNER_STATE_R01_STAGE_03
  patch_dsl_version: "4.0"
  atomic: true
  description: >-
    Patchset minimal et traçable pour le run learner_state. Aucun changement core
    local n'est requis sur constitution.yaml pour les objets du scope learner_state :
    la Constitution courante est déjà alignée sur REF_CORE_LEARNIT_REFERENTIEL_V4_0_IN_CONSTITUTION.
    Les écarts restants relèvent soit d'artefacts de run générés (impact_bundle / neighbor_extract),
    soit d'un backlog de redécoupage de scope confirmé par arbitrage humain.

  patch_scope:
    run_id: CONSTITUTION_RUN_2026_04_20_LEARNER_STATE_R01
    scope_key: learner_state
    mode: bounded_local_run
    writable_files:
      - docs/cores/current/constitution.yaml
    writable_ids_in_scope:
      - ACTION_APPLY_LIGHT_REVERSIBLE_SCAFFOLDING
      - ACTION_LOG_AR_PROXY_DISCORDANCE
      - EVENT_ACTIVATION_DISTRESS_PERSISTENCE_ESCALATION
      - EVENT_CONSERVATIVE_SCAFFOLDING_ESCALATION
      - EVENT_LONG_INTERRUPTION
      - INV_AR_N2_SHORT_FORM_REQUIRES_EXPLICIT_PRIORITY
      - INV_CONSERVATIVE_RULE_WITHOUT_AR_N1
      - INV_DISTRESS_REGIME_PRIORITY_CANNOT_BE_OVERRIDDEN
      - INV_VC_NOT_GENERAL_MOTIVATION_PROXY
      - PARAM_AR_N1_INTERACTION_BUDGET
      - PARAM_AR_N2_INTERACTION_BUDGET
      - PARAM_AR_N3_INTERACTION_BUDGET
      - RULE_ACTIVATION_DISTRESS_PERSISTENCE_ESCALATION_OFFSESSION
      - RULE_AR_N1_OVERRIDES_PROXY
      - RULE_CONSERVATIVE_SCAFFOLDING_ESCALATION_REQUIRES_OFFSESSION_REVIEW
      - RULE_LEARNER_STATE_AXIS_UNKNOWN_ALLOWED
      - RULE_LONG_INTERRUPTION_REQUIRES_DIAGNOSTIC_RESUME
      - RULE_MULTI_AXIS_UNKNOWN_OR_UNOBSERVABLE_SAFE_ENTRY
      - RULE_SESSION_INTENTION_NON_BLOCKING
      - TYPE_LEARNER_STATE_MODEL
      - TYPE_SELF_REPORT_AR_N1
      - TYPE_SELF_REPORT_AR_N2
      - TYPE_SELF_REPORT_AR_N3
      - TYPE_STATE_AXIS_ACTIVATION
      - TYPE_STATE_AXIS_CALIBRATION
      - TYPE_STATE_AXIS_VALUE_COST

  arbitrage_to_patch_mapping:
    - source_finding_id: R1
      source_patch_decision_id: DP1
      arbitrage_decision: corriger_maintenant
      patch_status: no_change_now
      rationale: >-
        La Constitution courante ne contient déjà plus la référence V2_0 visée par le run.
        Elle utilise REF_CORE_LEARNIT_REFERENTIEL_V4_0_IN_CONSTITUTION. Un réalignement
        supplémentaire vers une autre convention exigerait une réécriture large hors
        périmètre learner_state, donc non admissible dans ce run borné.
    - source_finding_id: R2
      arbitrage_decision: necessite_extension_scope
      patch_status: note_only
      rationale: >-
        Les dépendances cross-scope et actions hors périmètre doivent rester en backlog
        / redécoupage de scope, sans patch local.
    - source_finding_id: R3
      source_patch_decision_id: DP2
      arbitrage_decision: corriger_maintenant
      patch_status: note_only
      rationale: >-
        L'écart observé porte sur des artefacts de run générés (impact_bundle / neighbor_extract)
        et non sur un objet localisable à corriger maintenant dans docs/cores/current/constitution.yaml.

  fallback_reads_used_if_any:
    - file: docs/cores/current/constitution.yaml
      reason: >-
        Vérifier si la référence learner_state à réaligner existait encore réellement dans le Core courant.
      result: >-
        La Constitution courante référence déjà REF_CORE_LEARNIT_REFERENTIEL_V4_0_IN_CONSTITUTION.

  human_actions_to_execute:
    - step: 1
      label: Tracer STAGE_03 done et passer à STAGE_04_PATCH_VALIDATION
      command: >-
        python docs/patcher/shared/update_run_tracking.py
        --pipeline constitution
        --run-id CONSTITUTION_RUN_2026_04_20_LEARNER_STATE_R01
        --stage-id STAGE_03_PATCH_SYNTHESIS
        --stage-status done
        --run-status active
        --next-stage STAGE_04_PATCH_VALIDATION
        --summary "Patchset synthesized; ready for deterministic validation."
      note: >-
        Ensuite seulement, enchaîner sur STAGE_04 avec validate_patchset.py.

  files:
    - file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V4_0
      operations:
        - op: assert
          target:
            section: TYPES
            id: REF_CORE_LEARNIT_REFERENTIEL_V4_0_IN_CONSTITUTION

        - op: no_change
          reason: >-
            R1 / DP1 — aucun changement local sûr à appliquer maintenant : la Constitution
            courante est déjà alignée sur REF_CORE_LEARNIT_REFERENTIEL_V4_0_IN_CONSTITUTION,
            et une réécriture vers une autre convention toucherait des objets hors périmètre learner_state.

        - op: note
          value:
            id: NOTE_R2_SCOPE_EXTENSION_BACKLOG_ONLY
            finding_id: R2
            scope_status: needs_scope_extension
            disposition: backlog_only
            message: >-
              Les actions ACTION_PLAN_SHORT_DIAGNOSTIC_TASK et
              ACTION_ESCALATE_PERSISTENT_DRIFT_OFFSESSION restent hors patch local.
              Préserver le backlog candidate de STAGE_02 pour export canonique en STAGE_09.

        - op: note
          value:
            id: NOTE_R3_RUN_GENERATED_NEIGHBOR_MISMATCH
            finding_id: R3
            scope_status: in_scope
            disposition: note_only
            message: >-
              Le voisin REF_CORE_LEARNIT_REFERENTIEL_V2_0_IN_CONSTITUTION signalé par le run
              provient d'artefacts générés du run et non d'un objet encore présent dans
              docs/cores/current/constitution.yaml. Aucun patch core local n'est produit ici.
