PATCH_SET:
  id: PATCHSET_CONSTITUTION_RUN_2026_04_20_DEPLOYMENT_GOVERNANCE_R01
  patch_dsl_version: "4.0"
  atomic: true
  description: >-
    STAGE_03 patchset for CONSTITUTION_RUN_2026_04_20_DEPLOYMENT_GOVERNANCE_R01.
    Arbitrage validated that no local in-scope correction must be applied now.
    The inter-core reference drift is preserved as governance backlog candidate
    and not converted into a local patch.
  files:
    - file: docs/cores/current/constitution.yaml
      expected_core_id: CORE_LEARNIT_CONSTITUTION_V4_0
      operations:
        - op: assert_meta
          target:
            field: id
          equals: CORE_LEARNIT_CONSTITUTION_V4_0
        - op: no_change
          reason: >-
            Arbitrage finding A1 / challenge finding R1 was classified as
            necessite_extension_scope and blocked_by_scope_extension. No direct
            local patch is authorized on constitution.yaml in this run.
        - op: note
          reason: >-
            Governance backlog candidate preserved upstream:
            GBC_DEPLOYMENT_GOVERNANCE_INTERCORE_REF_ALIGNMENT_2026_04_20.
            Any alignment of REF_CORE_LEARNIT_REFERENTIEL_V2_0_IN_CONSTITUTION
            versus the active V4.0 reference must be handled through governed
            scope/policy regeneration, not through a silent local patch.
    - file: docs/cores/current/referentiel.yaml
      expected_core_id: CORE_LEARNIT_REFERENTIEL_V2_0
      operations:
        - op: assert_meta
          target:
            field: id
          equals: CORE_LEARNIT_REFERENTIEL_V2_0
        - op: no_change
          reason: >-
            No arbitrated in-scope correction targets the Referentiel for this
            run. Reading extension from impact_bundle does not grant write rights.
    - file: docs/cores/current/link.yaml
      expected_core_id: CORE_LINK_LEARNIT_CONSTITUTION_V4_0__REFERENTIEL_V2_0
      operations:
        - op: assert_meta
          target:
            field: id
          equals: CORE_LINK_LEARNIT_CONSTITUTION_V4_0__REFERENTIEL_V2_0
        - op: no_change
          reason: >-
            No arbitrated in-scope correction targets the Link core for this run.
            Inter-core alignment concerns were explicitly retained as governance
            backlog candidate rather than local patch material.
