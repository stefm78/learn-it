CORE_VALIDATION:
  run_id: CONSTITUTION_RUN_2026_04_20_KNOWLEDGE_AND_DESIGN_R02
  stage_id: STAGE_06_CORE_VALIDATION
  mode: bounded_local_run
  validation_status: FAIL
  validation_scope:
    patch_execution_report_read: true
    sandbox_reads:
      constitution_yaml: present
      referentiel_yaml: missing
      link_yaml: missing
    fallback_reads_used:
      - docs/cores/current/referentiel.yaml
      - docs/cores/current/link.yaml
  logical_validation_summary: >-
    Le Core Constitution patché en sandbox est lisible et son réalignement vers la
    référence référentielle v3.0 est logiquement cohérent avec les Core canoniques
    actuels. Cependant, la sandbox matérialisée par STAGE_05 est incomplète pour une
    validation Core bornée et propre: seuls les artefacts Constitution patchés sont
    présents, tandis que referentiel.yaml et link.yaml sont absents de la sandbox.
    La validation ne peut donc pas conclure à un PASS sur l'état complet réellement
    matérialisé par STAGE_05_APPLY.
  anomalies_and_corrections:
    blocking_issues:
      - id: SANDBOX_MISSING_REFERENTIEL
        summary: >-
          docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_20_KNOWLEDGE_AND_DESIGN_R02/work/05_apply/sandbox/docs/cores/current/referentiel.yaml
          est absent.
        correction: >-
          Rejouer STAGE_05_APPLY avec une sandbox matérialisant aussi le Référentiel
          courant avant validation Core.
      - id: SANDBOX_MISSING_LINK
        summary: >-
          docs/pipelines/constitution/runs/CONSTITUTION_RUN_2026_04_20_KNOWLEDGE_AND_DESIGN_R02/work/05_apply/sandbox/docs/cores/current/link.yaml
          est absent.
        correction: >-
          Rejouer STAGE_05_APPLY avec une sandbox matérialisant aussi le LINK courant
          avant validation Core.
    non_blocking_findings:
      - id: INTERCORE_ALIGNMENT_LOOKS_CONSISTENT
        summary: >-
          Le renommage vers REF_CORE_LEARNIT_REFERENTIEL_v3.0_IN_CONSTITUTION dans la
          Constitution patchée paraît cohérent avec docs/cores/current/referentiel.yaml
          et docs/cores/current/link.yaml lus en fallback.
  fallback_reads_used_if_any:
    declared: true
    rationale: >-
      Utilisés uniquement pour qualifier la cohérence inter-Core potentielle face à une
      sandbox incomplète, sans remplacer l'obligation de valider l'état réellement
      matérialisé par STAGE_05_APPLY.
  downstream_decision:
    decision: return_upstream_for_correction
    target_stage: STAGE_05_APPLY
    rationale: >-
      La validation Core échoue faute de sandbox complète. Le retour amont porte sur la
      matérialisation et l'application en sandbox, pas sur le patchset logique lui-même.
  human_actions_to_execute:
    - step: 1
      action: >-
        Repréparer la sandbox de STAGE_05_APPLY en y copiant constitution.yaml,
        referentiel.yaml et link.yaml depuis docs/cores/current/ avant de rejouer
        apply_patch.py.
    - step: 2
      action: >-
        Rejouer STAGE_05_APPLY puis relancer STAGE_06_CORE_VALIDATION sur la sandbox
        complète.
