ai_protocol_cleanup:
  schema_version: 0.1
  protocol_id: CONSTITUTION_AI_PROTOCOL_V1
  primary_ai_entrypoint: docs/pipelines/constitution/AI_PROTOCOL.yaml

  pipeline_md_policy:
    required_note: true
    desired_statement: >-
      For AI startup and run resolution, use docs/pipelines/constitution/AI_PROTOCOL.yaml
      as the authoritative entrypoint. Historical RUN_*.md documents are deprecated.

  delete_now:
    - docs/pipelines/constitution/RUN_STARTUP_PROTOCOL.md
    - docs/pipelines/constitution/RUN_ENTRY_DECISION_PROTOCOL.md
    - docs/pipelines/constitution/RUN_ENTRY_GATE.md
    - docs/pipelines/constitution/RUN_ENTRY_ZERO_SEARCH_PROTOCOL.md
    - docs/pipelines/constitution/RUN_LAUNCH_PROTOCOL.md
    - docs/pipelines/constitution/RUN_LAYOUT_RESOLUTION.md
    - docs/pipelines/constitution/RUN_STAGE_CLOSEOUT_PROTOCOL.md
    - docs/pipelines/constitution/RUN_TRACKING_BOOTSTRAP_USAGE.md
    - docs/pipelines/constitution/STATE_ARTIFACTS_PRIORITY.md
    - docs/pipelines/constitution/RUN_EXECUTION_PROMPT_TEMPLATE.md
    - docs/pipelines/constitution/RUN_ENTRY_PROMPT_TEMPLATE.md
    - docs/pipelines/constitution/RUN_ENTRY_ZERO_SEARCH_PROMPT.md
    - docs/pipelines/constitution/RUN_ENTRY_HARDENING_NOTES.md
    - docs/pipelines/constitution/RUN_LAUNCH_HARDENING_NOTES.md
    - docs/pipelines/constitution/RUN_ENTRY_HARDENING_NOTES.md
    - docs/pipelines/constitution/RUN_TRACKING_BOOTSTRAP_USAGE.md
    - docs/pipelines/constitution/PIPELINE_PROTOCOL_INTEGRATION_NOTES.md

  keep:
    - docs/pipelines/constitution/AI_PROTOCOL.yaml
    - docs/pipelines/constitution/AI_PROTOCOL_DEPRECATIONS.yaml
    - docs/pipelines/constitution/pipeline.md
    - docs/pipelines/constitution/STAGE_07_RELEASE_MATERIALIZATION.md
    - docs/pipelines/constitution/STAGE_08_PROMOTE_CURRENT.md

  notes:
    - >-
      After cleanup, pipeline.md should mention AI_PROTOCOL.yaml explicitly so an AI
      sees a single authoritative startup source.
