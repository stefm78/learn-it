stage_skill:
  schema_version: 0.1
  pipeline_id: constitution
  stage_id: STAGE_09_CLOSEOUT_AND_ARCHIVE
  skill_id: run_closeout_supervisor
  stage_kind: hybrid
  closure_level: high
  authoritative_role: stable_stage_contract

mission: >-
  Superviser la clôture finale après promotion validée, soit au niveau d'un
  run unique, soit au niveau pipeline-level après consolidation, avec
  exécution réelle du script de closeout et vérification de la cohérence
  des artefacts finaux. Ce stage termine proprement le cycle opératoire
  sans réécrire les Core métier eux-mêmes, et exporte les candidats de backlog
  de gouvernance du run vers le backlog inter-runs canonique lorsque de tels
  candidats existent.

model_requirements:
  reasoning_level: advanced
  justification: >-
    Ce stage clôt un cycle opératoire déjà promu, soit au niveau d'un run,
    soit au niveau pipeline-level. Le modèle doit vérifier que les artefacts
    de promotion sont cohérents, que le closeout scripté a bien été exécuté,
    que les candidats de backlog ont été exportés ou explicitement déclarés
    absents, et que la clôture est propre et sans ambiguïté dans le mode courant.
  recommended_models:
    - o3
    - claude-opus-4
    - gemini-2.5-pro
  minimum_acceptable: tout modèle avec extended thinking ou chain-of-thought activable

runtime_binding:
  expected_mode_values:
    - bounded_local_run
    - parallel_consolidation
    - nominal_global
    - bounded_transition
  run_context_role: >-
    En mode bounded_local_run, run_context.yaml doit être lu en premier.
    En mode parallel_consolidation, nominal_global ou bounded_transition,
    les artefacts pipeline-level font autorité.
    Il ne remplace pas la preuve d'exécution réelle du closeout.
  execution_evidence_role: >-
    closeout_pipeline_run.py doit être réellement exécuté. L'IA ne doit jamais
    simuler la clôture matérielle du run ni l'export de backlog.
  artifact_ownership_rule: >-
    Les artefacts bruts produits par script (closeout_report.yaml,
    final_run_summary.md, archive de run et éventuelle mise à jour de
    governance_backlog.yaml) restent les sources de vérité du stage. L'IA ne
    doit pas inventer de flags CLI inexistants ni réécrire un artefact brut
    produit par script.
  tracking_closure_rule: >-
    En bounded_local_run, le closeout scripté ne ferme pas à lui seul le tracking
    du run. Après un PASS du stage, l'humain doit exécuter update_run_tracking.py
    pour passer le run à status=closed et vider next_stage. En modes
    parallel_consolidation, nominal_global et bounded_transition, aucun tracking
    run-level supplémentaire n'est requis : le stage est convergent dès que les
    artefacts pipeline-level de closeout sont validés.

backlog_export_rule:
  canonical_backlog_path: docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  source_resolution:
    bounded_local_run:
      default_arbitrage_dir: docs/pipelines/constitution/runs/<run_id>/work/02_arbitrage
      file_pattern: arbitrage*.md
    pipeline_level_modes:
      default_arbitrage_dir: docs/pipelines/constitution/work/02_arbitrage
      file_pattern: arbitrage*.md
  rule: >-
    If one or more STAGE_02 arbitration reports contain a fenced YAML block rooted
    at governance_backlog_candidates, STAGE_09 must export those candidates to the
    canonical inter-run governance backlog before closing the run. STAGE_09 must
    not resolve, arbitrate, patch or mark addressed those entries. It only preserves
    them with status=open unless they already exist by entry_id.
  multi_file_rule: >-
    STAGE_09 must support multiple arbitration reports. It must not assume that the
    report is named arbitrage.md. It must resolve all arbitrage*.md files in the
    stage arbitration directory, in deterministic lexical order, and the exported
    entries must preserve source_arbitrage_path for traceability.
  absence_rule: >-
    If no arbitrage*.md file exists, or if arbitration reports contain no backlog
    candidates, the closeout report must still expose governance_backlog_entries_exported
    as 0 when backlog export was requested.
  forbidden:
    - direct_manual_edit_to_governance_backlog_by_ai
    - resolving_backlog_entries_in_stage_09
    - silently_omitting_backlog_candidates
    - assuming_single_arbitrage_report_name

primary_reads:
  bounded_local_run:
    - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
    - docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/02_arbitrage/arbitrage*.md
    - docs/cores/current/manifest.yaml
    - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  parallel_consolidation:
    - docs/pipelines/constitution/reports/promotion_report.yaml
    - docs/pipelines/constitution/work/02_arbitrage/arbitrage*.md
    - docs/cores/current/manifest.yaml
    - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  nominal_global:
    - docs/pipelines/constitution/reports/promotion_report.yaml
    - docs/pipelines/constitution/work/02_arbitrage/arbitrage*.md
    - docs/cores/current/manifest.yaml
    - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  bounded_transition:
    - docs/pipelines/constitution/reports/promotion_report.yaml
    - docs/pipelines/constitution/work/02_arbitrage/arbitrage*.md
    - docs/cores/current/manifest.yaml
    - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml

required_scripts:
  mandatory_closeout:
    - docs/patcher/shared/closeout_pipeline_run.py
  note: >-
    Si l'IA ne peut pas exécuter le script elle-même, elle doit émettre la
    commande exacte, déclarer le stage BLOCKED, et attendre les artefacts.
    L'interface réelle actuelle est :
    closeout_pipeline_run.py <promotion_report.yaml> <current_manifest.yaml> [options]
    Le script ne supporte pas les flags --pipeline décrits dans les versions
    antérieures du skill. Pour l'export backlog, il supporte --export-backlog-entries,
    --arbitrage-path, --backlog-path, --run-id, --scope-key et --current-stage.

script_execution_contract:
  required_before_pass_or_fail:
    - closeout_pipeline_run_executed_for_real
    - closeout_report_materialized
    - final_run_summary_materialized
    - backlog_candidates_exported_or_absence_declared
  blocked_if_missing_evidence: true
  blocked_status_value: BLOCKED
  pass_requires:
    - closeout_chain_passed
    - no_blocking_final_consistency_issue
    - governance_backlog_export_performed_or_no_candidates_found
  fail_requires:
    - closeout_script_failed
    - or_blocking_final_consistency_issue_after_real_execution
    - or_backlog_candidates_detected_but_not_exported

deterministic_command_templates:
  bounded_local_run:
    closeout: >-
      python docs/patcher/shared/closeout_pipeline_run.py
      docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
      docs/cores/current/manifest.yaml
      --closeout-report docs/pipelines/constitution/runs/<run_id>/reports/closeout_report.yaml
      --final-summary docs/pipelines/constitution/runs/<run_id>/outputs/final_run_summary.md
      --work-root docs/pipelines/constitution/runs/<run_id>/work
      --reports-root docs/pipelines/constitution/runs/<run_id>/reports
      --outputs-root docs/pipelines/constitution/runs/<run_id>/outputs
      --export-backlog-entries
      --arbitrage-path docs/pipelines/constitution/runs/<run_id>/work/02_arbitrage
      --backlog-path docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
      --run-id <RUN_ID>
      --scope-key <scope_key>
      --current-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
    close_tracking: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_09_CLOSEOUT_AND_ARCHIVE
      --stage-status done
      --run-status closed
      --summary "Run closeout completed with archive, final summary and governance backlog export; pipeline run is closed."
      --close-run
  parallel_consolidation:
    closeout: >-
      python docs/patcher/shared/closeout_pipeline_run.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      docs/cores/current/manifest.yaml
      --closeout-report docs/pipelines/constitution/reports/closeout_report.yaml
      --final-summary docs/pipelines/constitution/outputs/final_run_summary.md
      --export-backlog-entries
      --arbitrage-path docs/pipelines/constitution/work/02_arbitrage
      --backlog-path docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
      --current-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
  nominal_global:
    closeout: >-
      python docs/patcher/shared/closeout_pipeline_run.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      docs/cores/current/manifest.yaml
      --closeout-report docs/pipelines/constitution/reports/closeout_report.yaml
      --final-summary docs/pipelines/constitution/outputs/final_run_summary.md
      --export-backlog-entries
      --arbitrage-path docs/pipelines/constitution/work/02_arbitrage
      --backlog-path docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
      --current-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
  bounded_transition:
    closeout: >-
      python docs/patcher/shared/closeout_pipeline_run.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      docs/cores/current/manifest.yaml
      --closeout-report docs/pipelines/constitution/reports/closeout_report.yaml
      --final-summary docs/pipelines/constitution/outputs/final_run_summary.md
      --export-backlog-entries
      --arbitrage-path docs/pipelines/constitution/work/02_arbitrage
      --backlog-path docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
      --current-stage STAGE_09_CLOSEOUT_AND_ARCHIVE

required_output_sections:
  - execution_evidence
  - closeout_summary
  - final_consistency_findings
  - follow_up_actions
  - human_actions_to_execute

expected_outputs:
  bounded_local_run:
    primary_output_path_pattern: docs/pipelines/constitution/runs/<run_id>/reports/closeout_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/runs/<run_id>/outputs/final_run_summary.md
    conditional_raw_artifacts_if_backlog_candidates_exist:
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  parallel_consolidation:
    primary_output_path_pattern: docs/pipelines/constitution/reports/closeout_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/outputs/final_run_summary.md
    conditional_raw_artifacts_if_backlog_candidates_exist:
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  nominal_global:
    primary_output_path_pattern: docs/pipelines/constitution/reports/closeout_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/outputs/final_run_summary.md
    conditional_raw_artifacts_if_backlog_candidates_exist:
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
  bounded_transition:
    primary_output_path_pattern: docs/pipelines/constitution/reports/closeout_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/outputs/final_run_summary.md
    conditional_raw_artifacts_if_backlog_candidates_exist:
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml

completion_evidence:
  required:
    - closeout_command_emitted_or_executed
    - real_execution_evidence_declared
    - closeout_report_materialized
    - final_run_summary_materialized
    - governance_backlog_export_performed_or_absence_declared
    - final_status_is_pass_fail_or_blocked
    - human_actions_explicitly_stated_in_output
  not_sufficient:
    - informal_chat_summary_only
    - closeout_reasoning_without_script_evidence
    - pass_without_materialized_closeout_artifacts
    - pass_without_backlog_export_status
    - simulated_script_execution

status_values:
  - PASS
  - FAIL
  - BLOCKED

human_actions_required:
  description: >-
    Si le script n'a pas été exécuté réellement, l'humain doit lancer la
    commande émise puis relancer l'IA sur ce stage. En bounded_local_run,
    une fois la clôture validée, le tracking du run doit encore être fermé
    explicitement via update_run_tracking.py. En modes pipeline-level,
    aucune fermeture de tracking run-level supplémentaire n'est requise.
  on_blocked:
    step: 1
    label: Exécuter le closeout avec export backlog puis relancer ce stage
    mandatory: true
  on_pass:
    step: 1
    label: Finaliser la clôture avec action humaine adaptée au mode
    mandatory: true
    command_bounded_local_run: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_09_CLOSEOUT_AND_ARCHIVE
      --stage-status done
      --run-status closed
      --summary "Run closeout completed with archive, final summary and governance backlog export; pipeline run is closed."
      --close-run
    note_pipeline_level_modes: >-
      En modes parallel_consolidation, nominal_global et bounded_transition,
      aucun close tracking run-level n'est requis ici.
      Le closeout pipeline-level est convergent dès que les artefacts de closeout
      sont validés. Le prochain point d'entrée redevient la résolution d'entrée du pipeline.
    note: >-
      Aucun stage supplémentaire n'est requis après cette clôture. Les entrées open
      exportées dans governance_backlog.yaml seront relues par STAGE_00 / phase de
      re-scoping ultérieure ; STAGE_09 ne les résout pas.
  on_fail:
    step: 1
    label: Corriger les anomalies finales avant nouvelle tentative
    mandatory: true

allowed_transitions:
  on_pass:
    next_stage: ENTRY_RESOLUTION
    precondition: >-
      En bounded_local_run, human must confirm update_run_tracking.py execution.
      En parallel_consolidation, nominal_global et bounded_transition,
      aucun tracking run-level supplémentaire n'est requis.
  on_fail:
    next_stage: STAGE_08_PROMOTE_CURRENT
  on_blocked:
    next_action: execute_closeout_and_retry_same_stage

forbidden_actions:
  - simulated_closeout_execution
  - simulated_backlog_export
  - pass_without_real_execution_evidence
  - pass_without_backlog_export_status
  - reopening_pipeline_state_silently
  - omitting_human_actions_from_output
  - using_nonexistent_closeout_cli_flags
  - assuming_single_arbitrage_report_name
  - resolving_or_marking_backlog_entries_addressed_in_stage_09

migration_note: >-
  Premier skill STAGE_09 pour le pipeline constitution.
  Consolide en YAML machine-readable les règles de closeout final du run.
  Mise à jour: STAGE_09 devient le point d'export canonique des candidats de
  backlog de gouvernance vers docs/pipelines/constitution/scope_catalog/governance_backlog.yaml,
  avec support explicite de plusieurs fichiers arbitrage*.md.
