stage_skill:
  schema_version: 0.1
  pipeline_id: constitution
  stage_id: STAGE_08_PROMOTE_CURRENT
  skill_id: current_promotion_supervisor
  stage_kind: hybrid
  closure_level: high
  authoritative_role: stable_stage_contract

mission: >-
  Superviser la promotion explicite d'une release matérialisée vers
  docs/cores/current, avec validation réelle du current manifest et du
  promotion report. Ce stage est le seul autorisé à modifier current.
  Il exige l'exécution réelle des scripts de promotion puis une revue IA
  finale de cohérence avant closeout.

model_requirements:
  reasoning_level: advanced
  justification: >-
    Ce stage est à fort impact car il modifie l'état courant du repo. Le modèle
    doit interpréter correctement les artefacts de promotion, vérifier la
    cohérence entre release source, current manifest et promotion report,
    et distinguer nettement preuve scriptée et revue complémentaire.
  recommended_models:
    - o3
    - claude-opus-4
    - gemini-2.5-pro
  minimum_acceptable: tout modèle avec extended thinking ou chain-of-thought activable

runtime_binding:
  expected_mode_values:
    - bounded_local_run
    - parallel_consolidation
    - nominal_global
    - bounded_transition
  run_context_role: >-
    En mode bounded_local_run, run_context.yaml doit être lu en premier.
    En mode consolidation, les artefacts pipeline-level font autorité.
  execution_evidence_role: >-
    promote_current.py, validate_current_manifest.py et
    validate_promotion_report.py doivent être réellement exécutés.

primary_reads:
  bounded_local_run:
    - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  parallel_consolidation:
    - docs/pipelines/constitution/work/consolidation/release_plan.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  nominal_global:
    - docs/pipelines/constitution/work/07_release/release_plan.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  bounded_transition:
    - docs/pipelines/constitution/work/07_release/release_plan.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/

required_scripts:
  mandatory_promotion_chain:
    - docs/patcher/shared/promote_current.py
    - docs/patcher/shared/validate_current_manifest.py
    - docs/patcher/shared/validate_promotion_report.py
  note: >-
    Si l'IA ne peut pas exécuter les scripts elle-même, elle doit émettre les
    commandes exactes, déclarer le stage BLOCKED, et attendre les artefacts.

script_execution_contract:
  required_before_pass_or_fail:
    - promote_current_executed_for_real
    - validate_current_manifest_executed_for_real
    - validate_promotion_report_executed_for_real
    - current_manifest_materialized
    - promotion_report_materialized
  blocked_if_missing_evidence: true
  blocked_status_value: BLOCKED
  pass_requires:
    - promotion_chain_all_passed
    - no_blocking_current_coherence_issue
  fail_requires:
    - any_promotion_script_failed
    - or_blocking_current_coherence_issue_after_real_execution

deterministic_command_templates:
  bounded_local_run:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      --pipeline constitution
      --run-id <RUN_ID>
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      --manifest docs/cores/current/manifest.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      --report docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
  parallel_consolidation:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      --pipeline constitution
      --workspace docs/pipelines/constitution/work/consolidation
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      --manifest docs/cores/current/manifest.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      --report docs/pipelines/constitution/reports/promotion_report.yaml

required_output_sections:
  - execution_evidence
  - promotion_summary
  - current_manifest_summary
  - coherence_findings
  - follow_up_actions
  - human_actions_to_execute

expected_outputs:
  bounded_local_run:
    report_path_pattern: docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
  parallel_consolidation:
    report_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml
  nominal_global:
    report_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml
  bounded_transition:
    report_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml

completion_evidence:
  required:
    - promotion_commands_emitted_or_executed
    - real_execution_evidence_declared
    - current_manifest_materialized
    - promotion_report_materialized
    - final_status_is_pass_fail_or_blocked
    - human_actions_explicitly_stated_in_output
  not_sufficient:
    - informal_chat_summary_only
    - promotion_reasoning_without_script_evidence
    - pass_without_materialized_current_artifacts
    - simulated_script_execution

status_values:
  - PASS
  - FAIL
  - BLOCKED

human_actions_required:
  description: >-
    Si les scripts n'ont pas été exécutés réellement, l'humain doit lancer les
    commandes émises puis relancer l'IA sur ce stage. Une fois la promotion
    validée, l'humain peut poursuivre vers STAGE_09_CLOSEOUT_AND_ARCHIVE.
  on_blocked:
    step: 1
    label: Exécuter la chaîne de promotion puis relancer ce stage
    mandatory: true
  on_pass:
    step: 1
    label: Mettre à jour le tracking et poursuivre vers STAGE_09_CLOSEOUT_AND_ARCHIVE
    mandatory: true
    command: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_08_PROMOTE_CURRENT
      --stage-status done
      --run-status active
      --next-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
      --summary "Promotion to current completed with validated manifests; ready for closeout."
  on_fail:
    step: 1
    label: Corriger les anomalies de promotion avant reprise
    mandatory: true

allowed_transitions:
  on_pass:
    next_stage: STAGE_09_CLOSEOUT_AND_ARCHIVE
    precondition: human must confirm update_run_tracking.py execution
  on_fail:
    next_stage: STAGE_07_RELEASE_MATERIALIZATION
  on_blocked:
    next_action: execute_promotion_chain_and_retry_same_stage

forbidden_actions:
  - simulated_promotion_chain_execution
  - pass_without_real_execution_evidence
  - direct_closeout_without_stage_09
  - omitting_human_actions_from_output

migration_note: >-
  Premier skill STAGE_08 pour le pipeline constitution.
  Consolide en YAML machine-readable les règles de promotion current du pipeline.
