stage_skill:
  schema_version: 0.1
  pipeline_id: constitution
  stage_id: STAGE_08_PROMOTE_CURRENT
  skill_id: current_promotion_supervisor
  stage_kind: hybrid
  closure_level: high
  authoritative_role: stable_stage_contract

mission: >-
  Superviser la promotion explicite d'une release matérialisée vers
  docs/cores/current, avec validation réelle du current manifest et du
  promotion report. Ce stage est le seul autorisé à modifier current.
  Il exige l'exécution réelle des scripts de promotion puis une revue IA
  finale de cohérence avant closeout.
  Ce stage n'est applicable que si STAGE_07 a réellement matérialisé une
  release promotable. Si STAGE_07 a conclu à un NOOP canonique
  (release_required=false, manifest_written=false), STAGE_08 ne doit pas être
  démarré : le pipeline doit aller directement vers STAGE_09_CLOSEOUT_AND_ARCHIVE.

model_requirements:
  reasoning_level: advanced
  justification: >-
    Ce stage est à fort impact car il modifie l'état courant du repo. Le modèle
    doit interpréter correctement les artefacts de promotion, vérifier la
    cohérence entre release source, current manifest et promotion report,
    distinguer nettement preuve scriptée et revue complémentaire, et refuser
    proprement une entrée misroutée si aucun bundle de release n'existe.
  recommended_models:
    - o3
    - claude-opus-4
    - gemini-2.5-pro
  minimum_acceptable: tout modèle avec extended thinking ou chain-of-thought activable

runtime_binding:
  expected_mode_values:
    - bounded_local_run
    - parallel_consolidation
    - nominal_global
    - bounded_transition
  run_context_role: >-
    En mode bounded_local_run, run_context.yaml doit être lu en premier.
    En mode consolidation, les artefacts pipeline-level font autorité.
  execution_evidence_role: >-
    promote_current.py, validate_current_manifest.py et
    validate_promotion_report.py doivent être réellement exécutés lorsqu'une
    release matérialisée existe. Aucun de ces scripts ne doit être exécuté si
    l'amont confirme un NOOP canonique de release.
  artifact_ownership_rule: >-
    Les artefacts bruts produits par script (promotion_report.yaml,
    docs/cores/current/manifest.yaml et validations associées) restent les
    sources de vérité du stage. L'IA ne doit pas inventer de flags CLI
    inexistants ni réécrire un artefact brut produit par script.

upstream_preconditions:
  materialized_release_required:
    - release_plan.RELEASE_PLAN.release_required == true
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.status == PASS
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.manifest_written == true
  noop_misroute_detection:
    - release_plan.RELEASE_PLAN.release_required == false
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.status == PASS
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.manifest_written == false
  consequence_on_noop_misroute: >-
    Ne pas exécuter la chaîne de promotion. Déclarer le stage BLOCKED avec
    motif de mauvais routage aval et demander une correction de tracking vers
    STAGE_09_CLOSEOUT_AND_ARCHIVE.

primary_reads:
  bounded_local_run:
    - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
    - docs/pipelines/constitution/runs/<run_id>/reports/release_materialization_report.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  parallel_consolidation:
    - docs/pipelines/constitution/work/consolidation/release_plan.yaml
    - docs/pipelines/constitution/reports/release_materialization_report.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  nominal_global:
    - docs/pipelines/constitution/work/07_release/release_plan.yaml
    - docs/pipelines/constitution/reports/release_materialization_report.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/
  bounded_transition:
    - docs/pipelines/constitution/work/07_release/release_plan.yaml
    - docs/pipelines/constitution/reports/release_materialization_report.yaml
    - docs/prompts/shared/Make07CoreRelease.md
    - docs/cores/releases/

required_scripts:
  mandatory_promotion_chain:
    - docs/patcher/shared/promote_current.py
    - docs/patcher/shared/validate_current_manifest.py
    - docs/patcher/shared/validate_promotion_report.py
  note: >-
    Si l'IA ne peut pas exécuter les scripts elle-même, elle doit émettre les
    commandes exactes, déclarer le stage BLOCKED, et attendre les artefacts.
    Les interfaces réelles actuelles sont positionnelles :
    - promote_current.py <release_plan.yaml> <release_materialization_report.yaml> [promotion_report.yaml]
    - validate_current_manifest.py <current_manifest.yaml> [schema.yaml]
    - validate_promotion_report.py <promotion_report.yaml> [schema.yaml]
    Aucune de ces commandes ne supporte les flags --pipeline, --run-id,
    --manifest ou --report décrits dans les versions antérieures du skill.
    Ces scripts ne doivent être appelés que si une release matérialisée existe.

script_execution_contract:
  required_before_pass_or_fail:
    - promote_current_executed_for_real
    - validate_current_manifest_executed_for_real
    - validate_promotion_report_executed_for_real
    - current_manifest_materialized
    - promotion_report_materialized
    - current_manifest_validation_materialized
    - promotion_report_validation_materialized
  blocked_if_missing_evidence: true
  blocked_status_value: BLOCKED
  pass_requires:
    - promotion_chain_all_passed
    - no_blocking_current_coherence_issue
  fail_requires:
    - any_promotion_script_failed
    - or_blocking_current_coherence_issue_after_real_execution
  blocked_on_noop_misroute_requires:
    - no_promotion_script_execution_started
    - explicit_tracking_correction_requested

deterministic_command_templates:
  bounded_local_run:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
      docs/pipelines/constitution/runs/<run_id>/reports/release_materialization_report.yaml
      docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      docs/cores/current/manifest.yaml
      > docs/pipelines/constitution/runs/<run_id>/reports/current_manifest_validation.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
      > docs/pipelines/constitution/runs/<run_id>/reports/promotion_report_validation.yaml
  parallel_consolidation:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      docs/pipelines/constitution/work/consolidation/release_plan.yaml
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/promotion_report.yaml
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      docs/cores/current/manifest.yaml
      > docs/pipelines/constitution/reports/current_manifest_validation.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      > docs/pipelines/constitution/reports/promotion_report_validation.yaml
  nominal_global:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/promotion_report.yaml
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      docs/cores/current/manifest.yaml
      > docs/pipelines/constitution/reports/current_manifest_validation.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      > docs/pipelines/constitution/reports/promotion_report_validation.yaml
  bounded_transition:
    promote_current: >-
      python docs/patcher/shared/promote_current.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/promotion_report.yaml
    validate_current_manifest: >-
      python docs/patcher/shared/validate_current_manifest.py
      docs/cores/current/manifest.yaml
      > docs/pipelines/constitution/reports/current_manifest_validation.yaml
    validate_promotion_report: >-
      python docs/patcher/shared/validate_promotion_report.py
      docs/pipelines/constitution/reports/promotion_report.yaml
      > docs/pipelines/constitution/reports/promotion_report_validation.yaml

required_output_sections:
  - execution_evidence
  - promotion_summary
  - current_manifest_summary
  - coherence_findings
  - follow_up_actions
  - human_actions_to_execute

expected_outputs:
  bounded_local_run:
    primary_output_path_pattern: docs/pipelines/constitution/runs/<run_id>/reports/promotion_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/runs/<run_id>/reports/current_manifest_validation.yaml
      - docs/pipelines/constitution/runs/<run_id>/reports/promotion_report_validation.yaml
  parallel_consolidation:
    primary_output_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/current_manifest_validation.yaml
      - docs/pipelines/constitution/reports/promotion_report_validation.yaml
  nominal_global:
    primary_output_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/current_manifest_validation.yaml
      - docs/pipelines/constitution/reports/promotion_report_validation.yaml
  bounded_transition:
    primary_output_path_pattern: docs/pipelines/constitution/reports/promotion_report.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/current_manifest_validation.yaml
      - docs/pipelines/constitution/reports/promotion_report_validation.yaml

completion_evidence:
  required:
    - promotion_commands_emitted_or_executed
    - real_execution_evidence_declared
    - current_manifest_materialized
    - promotion_report_materialized
    - current_manifest_validation_materialized
    - promotion_report_validation_materialized
    - final_status_is_pass_fail_or_blocked
    - human_actions_explicitly_stated_in_output
  not_sufficient:
    - informal_chat_summary_only
    - promotion_reasoning_without_script_evidence
    - pass_without_materialized_current_artifacts
    - pass_without_validation_artifacts
    - simulated_script_execution
    - entering_stage_08_on_noop_upstream_without_explicit_block

status_values:
  - PASS
  - FAIL
  - BLOCKED

human_actions_required:
  description: >-
    Si les scripts n'ont pas été exécutés réellement, l'humain doit lancer les
    commandes émises puis relancer l'IA sur ce stage. Une fois la promotion
    validée, l'humain peut poursuivre vers STAGE_09_CLOSEOUT_AND_ARCHIVE.
    Si l'entrée sur STAGE_08 est invalide parce que STAGE_07 était un NOOP,
    l'humain doit corriger le tracking pour pointer directement vers STAGE_09.
  on_blocked:
    step: 1
    label: Exécuter la chaîne de promotion puis relancer ce stage
    mandatory: true
  on_blocked_noop_misroute:
    step: 1
    label: Corriger le tracking vers STAGE_09_CLOSEOUT_AND_ARCHIVE sans exécuter la promotion
    mandatory: true
    command_bounded_local_run: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_08_PROMOTE_CURRENT
      --stage-status blocked
      --run-status active
      --next-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
      --summary "STAGE_08 skipped: upstream STAGE_07 confirmed canonical no-op release; no promote current required."
  on_pass:
    step: 1
    label: Poursuivre vers STAGE_09_CLOSEOUT_AND_ARCHIVE avec action humaine adaptée au mode
    mandatory: true
    command_bounded_local_run: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_08_PROMOTE_CURRENT
      --stage-status done
      --run-status active
      --next-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
      --summary "Promotion to current completed with validated manifests; ready for closeout."
    note_pipeline_level_modes: >-
      En modes parallel_consolidation, nominal_global et bounded_transition,
      aucun update_run_tracking.py run-level ne doit être émis ici.
      La suite consiste à démarrer explicitement STAGE_09_CLOSEOUT_AND_ARCHIVE
      sur les artefacts pipeline-level de promotion validés.
  on_fail:
    step: 1
    label: Corriger les anomalies de promotion avant reprise
    mandatory: true

allowed_transitions:
  on_pass:
    next_stage: STAGE_09_CLOSEOUT_AND_ARCHIVE
    precondition: >-
      En bounded_local_run, human must confirm update_run_tracking.py execution.
      En parallel_consolidation, nominal_global et bounded_transition,
      la transition est pipeline-level et ne dépend pas d'un run_id unique.
  on_fail:
    next_stage: STAGE_07_RELEASE_MATERIALIZATION
  on_blocked:
    next_action: execute_promotion_chain_and_retry_same_stage
  on_blocked_noop_misroute:
    next_stage: STAGE_09_CLOSEOUT_AND_ARCHIVE
    precondition: >-
      Cette branche s'applique uniquement si STAGE_07 a explicitement confirmé
      un NOOP canonique de release et qu'aucune promotion current n'est requise.

forbidden_actions:
  - simulated_promotion_chain_execution
  - pass_without_real_execution_evidence
  - direct_closeout_without_stage_09
  - entering_stage_08_after_confirmed_noop_release_and_executing_promote_current
  - omitting_human_actions_from_output
  - using_nonexistent_promotion_cli_flags

migration_note: >-
  Premier skill STAGE_08 pour le pipeline constitution.
  Consolide en YAML machine-readable les règles de promotion current du pipeline.
  Ajusté pour expliciter qu'il ne s'applique qu'à une release réellement
  matérialisée, et qu'un NOOP canonique de STAGE_07 doit bypasser STAGE_08
  au profit d'un closeout direct.
