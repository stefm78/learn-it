stage_skill:
  schema_version: 0.1
  pipeline_id: constitution
  stage_id: STAGE_07_RELEASE_MATERIALIZATION
  skill_id: core_release_materialization_supervisor
  stage_kind: hybrid
  closure_level: high
  authoritative_role: stable_stage_contract

mission: >-
  Superviser la préparation matérielle de la release des Core validés,
  à partir soit d'un run, soit d'un workspace de consolidation.
  Ce stage ne promeut pas current. Il exige l'exécution réelle des scripts
  de release puis une revue IA de cohérence du résultat.
  Lorsque la chaîne réelle conclut qu'aucune release n'est requise
  (release_required=false), le stage peut se conclure sans bundle matérialisé,
  sans manifest de release écrit, et sans validation de manifest, à condition
  que ce NOOP soit explicitement confirmé par les artefacts bruts de release.
  Dans ce cas NOOP canonique, il n'y a rien à promouvoir vers current :
  le stage aval direct devient STAGE_09_CLOSEOUT_AND_ARCHIVE.

model_requirements:
  reasoning_level: advanced
  justification: >-
    Ce stage combine plusieurs artefacts déterministes de release avec une
    revue logique de cohérence inter-Core. Le modèle doit interpréter un
    release_plan réel et, selon le cas, soit un release manifest réel, soit
    un NOOP réel explicitement confirmé, avant toute conclusion et avant de
    choisir correctement la branche aval : promotion réelle ou closeout direct.
  recommended_models:
    - o3
    - claude-opus-4
    - gemini-2.5-pro
  minimum_acceptable: tout modèle avec extended thinking ou chain-of-thought activable

runtime_binding:
  expected_mode_values:
    - bounded_local_run
    - parallel_consolidation
    - nominal_global
    - bounded_transition
  run_context_role: >-
    En mode bounded_local_run, run_context.yaml doit être lu en premier.
    En mode consolidation, le workspace pipeline-level fait autorité.
  execution_evidence_role: >-
    build_release_plan.py, validate_release_plan.py et materialize_release.py
    doivent être réellement exécutés dans tous les cas. validate_release_manifest.py
    devient obligatoire uniquement si une release est effectivement matérialisée
    et qu'un manifest.yaml existe.
  artifact_ownership_rule: >-
    Les artefacts bruts produits par script (release_plan.yaml, validations,
    release_materialization_report, manifest.yaml quand il existe) restent les
    sources de vérité du stage. L'IA ne doit pas inventer de flags CLI
    inexistants ni écraser un artefact brut produit par script.

primary_reads:
  bounded_local_run:
    - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/06_core_validation/core_validation.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/05_apply/sandbox/docs/cores/current/constitution.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/05_apply/sandbox/docs/cores/current/referentiel.yaml
    - docs/pipelines/constitution/runs/<run_id>/work/05_apply/sandbox/docs/cores/current/link.yaml
    - docs/prompts/shared/Make07CoreRelease.md
  parallel_consolidation:
    - docs/pipelines/constitution/work/consolidation/
    - docs/prompts/shared/Make07CoreRelease.md
  nominal_global:
    - docs/pipelines/constitution/work/06_core_validation/core_validation.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/constitution.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/referentiel.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/link.yaml
    - docs/prompts/shared/Make07CoreRelease.md
  bounded_transition:
    - docs/pipelines/constitution/work/06_core_validation/core_validation.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/constitution.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/referentiel.yaml
    - docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current/link.yaml
    - docs/prompts/shared/Make07CoreRelease.md

required_scripts:
  mandatory_release_chain:
    - docs/patcher/shared/build_release_plan.py
    - docs/patcher/shared/validate_release_plan.py
    - docs/patcher/shared/materialize_release.py
  conditional_release_chain_if_materialized_release:
    - docs/patcher/shared/validate_release_manifest.py
  note: >-
    Si l'IA ne peut pas exécuter les scripts elle-même, elle doit émettre les
    commandes exactes, déclarer le stage BLOCKED, et attendre les artefacts.
    Les interfaces réelles actuelles sont positionnelles :
    - build_release_plan.py <patched_dir> <current_dir> <core_validation.yaml> <patch_execution_report.yaml> <output_release_plan.yaml>
    - validate_release_plan.py <release_plan.yaml> [schema.yaml]
    - materialize_release.py <release_plan.yaml> <patched_dir> [report.yaml] [release_candidate_notes.md]
    - validate_release_manifest.py <manifest.yaml> [schema.yaml]
    Aucune de ces commandes ne supporte les flags --pipeline, --run-id,
    --plan ou --manifest décrits dans les versions antérieures du skill.
    validate_release_manifest.py n'est requis que si la chaîne a réellement
    matérialisé une release avec manifest.yaml.

noop_release_rules:
  enabled: true
  detection_signals:
    - release_plan.RELEASE_PLAN.release_required == false
    - release_plan.RELEASE_PLAN.status == PASS
    - release_plan_validation.RELEASE_PLAN_VALIDATION.status == PASS
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.status == PASS
    - release_materialization_report.RELEASE_MATERIALIZATION_REPORT.manifest_written == false
  consequences:
    - no_release_bundle_materialized_is_allowed
    - validate_release_manifest_py_not_required
    - release_manifest_validation_yaml_not_required
    - promote_current_stage_not_required
    - direct_closeout_allowed
    - stage_may_pass_if_no_blocking_release_coherence_issue

script_execution_contract:
  required_before_pass_or_fail:
    - build_release_plan_executed_for_real
    - validate_release_plan_executed_for_real
    - materialize_release_executed_for_real
    - release_plan_yaml_materialized
    - release_plan_validation_yaml_materialized
    - release_materialization_report_yaml_materialized
  blocked_if_missing_evidence: true
  blocked_status_value: BLOCKED
  noop_pass_when:
    - release_plan_status_is_pass
    - release_required_is_false
    - release_plan_validation_status_is_pass
    - release_materialization_report_status_is_pass
    - release_materialization_report_manifest_written_is_false
  materialized_release_pass_requires:
    - release_required_is_true
    - validate_release_manifest_executed_for_real
    - release_manifest_yaml_materialized
    - release_manifest_validation_yaml_materialized
    - release_manifest_validation_status_is_pass
  pass_requires:
    - noop_release_confirmed_or_materialized_release_validated
    - no_blocking_release_coherence_issue
  fail_requires:
    - any_release_script_failed
    - or_blocking_release_coherence_issue_after_real_execution

execution_paths:
  bounded_local_run:
    release_work_dir: docs/pipelines/constitution/runs/<run_id>/work/07_release/
    release_reports_dir: docs/pipelines/constitution/runs/<run_id>/reports/
  parallel_consolidation:
    release_work_dir: docs/pipelines/constitution/work/consolidation/
    release_reports_dir: docs/pipelines/constitution/reports/
  nominal_global:
    release_work_dir: docs/pipelines/constitution/work/07_release/
    release_reports_dir: docs/pipelines/constitution/reports/
  bounded_transition:
    release_work_dir: docs/pipelines/constitution/work/07_release/
    release_reports_dir: docs/pipelines/constitution/reports/

deterministic_command_templates:
  bounded_local_run:
    prepare_release_workspace: >-
      mkdir -p docs/pipelines/constitution/runs/<run_id>/work/07_release
      && mkdir -p docs/pipelines/constitution/runs/<run_id>/reports
    build_release_plan: >-
      python docs/patcher/shared/build_release_plan.py
      docs/pipelines/constitution/runs/<run_id>/work/05_apply/sandbox
      .
      docs/pipelines/constitution/runs/<run_id>/work/06_core_validation/core_validation.yaml
      docs/pipelines/constitution/runs/<run_id>/reports/patch_execution_report.yaml
      docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
    validate_release_plan: >-
      python docs/patcher/shared/validate_release_plan.py
      docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
      > docs/pipelines/constitution/runs/<run_id>/reports/release_plan_validation.yaml
    materialize_release: >-
      python docs/patcher/shared/materialize_release.py
      docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
      docs/pipelines/constitution/runs/<run_id>/work/05_apply/sandbox/docs/cores/current
      docs/pipelines/constitution/runs/<run_id>/reports/release_materialization_report.yaml
      docs/pipelines/constitution/runs/<run_id>/reports/release_candidate_notes.md
    resolve_manifest_path_note: >-
      Après build_release_plan.py et materialize_release.py, l'IA ne doit demander
      l'extraction du release_path réel depuis release_plan.yaml que si
      release_required=true ou si release_materialization_report.yaml indique
      manifest_written=true.
    validate_release_manifest: >-
      python docs/patcher/shared/validate_release_manifest.py
      docs/cores/releases/<release_id>/manifest.yaml
      > docs/pipelines/constitution/runs/<run_id>/reports/release_manifest_validation.yaml
  parallel_consolidation:
    prepare_release_workspace: >-
      mkdir -p docs/pipelines/constitution/work/consolidation
      && mkdir -p docs/pipelines/constitution/reports
    build_release_plan: >-
      python docs/patcher/shared/build_release_plan.py
      docs/pipelines/constitution/work/consolidation
      .
      docs/pipelines/constitution/work/06_core_validation/core_validation.yaml
      docs/pipelines/constitution/reports/patch_execution_report.yaml
      docs/pipelines/constitution/work/consolidation/release_plan.yaml
    validate_release_plan: >-
      python docs/patcher/shared/validate_release_plan.py
      docs/pipelines/constitution/work/consolidation/release_plan.yaml
      > docs/pipelines/constitution/reports/release_plan_validation.yaml
    materialize_release: >-
      python docs/patcher/shared/materialize_release.py
      docs/pipelines/constitution/work/consolidation/release_plan.yaml
      docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/release_candidate_notes.md
    validate_release_manifest: >-
      python docs/patcher/shared/validate_release_manifest.py
      docs/cores/releases/<release_id>/manifest.yaml
      > docs/pipelines/constitution/reports/release_manifest_validation.yaml
  nominal_global:
    prepare_release_workspace: >-
      mkdir -p docs/pipelines/constitution/work/07_release
      && mkdir -p docs/pipelines/constitution/reports
    build_release_plan: >-
      python docs/patcher/shared/build_release_plan.py
      docs/pipelines/constitution/work/05_apply/sandbox
      .
      docs/pipelines/constitution/work/06_core_validation/core_validation.yaml
      docs/pipelines/constitution/reports/patch_execution_report.yaml
      docs/pipelines/constitution/work/07_release/release_plan.yaml
    validate_release_plan: >-
      python docs/patcher/shared/validate_release_plan.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      > docs/pipelines/constitution/reports/release_plan_validation.yaml
    materialize_release: >-
      python docs/patcher/shared/materialize_release.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/release_candidate_notes.md
    validate_release_manifest: >-
      python docs/patcher/shared/validate_release_manifest.py
      docs/cores/releases/<release_id>/manifest.yaml
      > docs/pipelines/constitution/reports/release_manifest_validation.yaml
  bounded_transition:
    prepare_release_workspace: >-
      mkdir -p docs/pipelines/constitution/work/07_release
      && mkdir -p docs/pipelines/constitution/reports
    build_release_plan: >-
      python docs/patcher/shared/build_release_plan.py
      docs/pipelines/constitution/work/05_apply/sandbox
      .
      docs/pipelines/constitution/work/06_core_validation/core_validation.yaml
      docs/pipelines/constitution/reports/patch_execution_report.yaml
      docs/pipelines/constitution/work/07_release/release_plan.yaml
    validate_release_plan: >-
      python docs/patcher/shared/validate_release_plan.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      > docs/pipelines/constitution/reports/release_plan_validation.yaml
    materialize_release: >-
      python docs/patcher/shared/materialize_release.py
      docs/pipelines/constitution/work/07_release/release_plan.yaml
      docs/pipelines/constitution/work/05_apply/sandbox/docs/cores/current
      docs/pipelines/constitution/reports/release_materialization_report.yaml
      docs/pipelines/constitution/reports/release_candidate_notes.md
    validate_release_manifest: >-
      python docs/patcher/shared/validate_release_manifest.py
      docs/cores/releases/<release_id>/manifest.yaml
      > docs/pipelines/constitution/reports/release_manifest_validation.yaml

required_output_sections:
  - execution_evidence
  - release_plan_summary
  - materialized_release_summary
  - coherence_findings
  - follow_up_actions
  - human_actions_to_execute

expected_outputs:
  bounded_local_run:
    primary_output_path_pattern: docs/pipelines/constitution/runs/<run_id>/work/07_release/release_plan.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/runs/<run_id>/reports/release_plan_validation.yaml
      - docs/pipelines/constitution/runs/<run_id>/reports/release_materialization_report.yaml
    conditional_raw_artifacts_if_release_required_true:
      - docs/pipelines/constitution/runs/<run_id>/reports/release_manifest_validation.yaml
    noop_note: >-
      Si release_required=false est confirmé par release_plan.yaml et
      release_materialization_report.yaml, l'absence de manifest et de
      release_manifest_validation.yaml n'est pas bloquante.
  parallel_consolidation:
    primary_output_path_pattern: docs/pipelines/constitution/work/consolidation/release_plan.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/release_plan_validation.yaml
      - docs/pipelines/constitution/reports/release_materialization_report.yaml
    conditional_raw_artifacts_if_release_required_true:
      - docs/pipelines/constitution/reports/release_manifest_validation.yaml
  nominal_global:
    primary_output_path_pattern: docs/pipelines/constitution/work/07_release/release_plan.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/release_plan_validation.yaml
      - docs/pipelines/constitution/reports/release_materialization_report.yaml
    conditional_raw_artifacts_if_release_required_true:
      - docs/pipelines/constitution/reports/release_manifest_validation.yaml
  bounded_transition:
    primary_output_path_pattern: docs/pipelines/constitution/work/07_release/release_plan.yaml
    required_raw_artifacts:
      - docs/pipelines/constitution/reports/release_plan_validation.yaml
      - docs/pipelines/constitution/reports/release_materialization_report.yaml
    conditional_raw_artifacts_if_release_required_true:
      - docs/pipelines/constitution/reports/release_manifest_validation.yaml

completion_evidence:
  required:
    - release_commands_emitted_or_executed
    - real_execution_evidence_declared
    - release_plan_materialized
    - release_plan_validation_materialized
    - release_materialization_report_materialized
    - noop_or_materialized_release_path_explicitly_classified
    - final_status_is_pass_fail_or_blocked
    - human_actions_explicitly_stated_in_output
  not_sufficient:
    - informal_chat_summary_only
    - release_reasoning_without_script_evidence
    - pass_without_materialized_release_artifacts
    - pass_without_noop_confirmation_when_release_required_false
    - pass_without_release_manifest_validation_when_release_required_true
    - simulated_script_execution

status_values:
  - PASS
  - FAIL
  - BLOCKED

human_actions_required:
  description: >-
    Si les scripts n'ont pas été exécutés réellement, l'humain doit lancer les
    commandes émises puis relancer l'IA sur ce stage. Une fois la release
    matérialisée et validée, ou le NOOP de release explicitement confirmé,
    l'humain poursuit soit vers STAGE_08_PROMOTE_CURRENT soit directement vers
    STAGE_09_CLOSEOUT_AND_ARCHIVE selon la branche aval décidée par les artefacts.
  on_blocked:
    step: 1
    label: Exécuter la chaîne de release puis relancer ce stage
    mandatory: true
    note: >-
      Si le workspace de release n'existe pas encore, l'IA doit fournir d'abord
      les commandes Git Bash exactes de préparation. Si <release_id> n'est pas
      encore connu, l'IA ne doit demander son extraction depuis release_plan.yaml
      que si une release réelle a été matérialisée. En cas de NOOP explicite
      (release_required=false, manifest_written=false), validate_release_manifest.py
      n'est pas attendu.
  on_pass_materialized_release:
    step: 1
    label: Poursuivre vers STAGE_08_PROMOTE_CURRENT
    mandatory: true
    command_bounded_local_run: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_07_RELEASE_MATERIALIZATION
      --stage-status done
      --run-status active
      --next-stage STAGE_08_PROMOTE_CURRENT
      --summary "Release materialization completed with validated artifacts; ready for promote current."
    note_pipeline_level_modes: >-
      En modes parallel_consolidation, nominal_global et bounded_transition,
      aucun update_run_tracking.py run-level ne doit être émis ici.
      La suite consiste à démarrer explicitement STAGE_08_PROMOTE_CURRENT
      sur les artefacts pipeline-level matérialisés.
  on_pass_noop_release:
    step: 1
    label: Clore directement vers STAGE_09_CLOSEOUT_AND_ARCHIVE
    mandatory: true
    command_bounded_local_run: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id STAGE_07_RELEASE_MATERIALIZATION
      --stage-status done
      --run-status active
      --next-stage STAGE_09_CLOSEOUT_AND_ARCHIVE
      --summary "Release chain concluded no release required; current already aligned, ready for closeout."
    note_pipeline_level_modes: >-
      En modes parallel_consolidation, nominal_global et bounded_transition,
      aucun promote_current n'est attendu si le NOOP de release est confirmé.
      La suite consiste à démarrer explicitement STAGE_09_CLOSEOUT_AND_ARCHIVE
      sur les artefacts pipeline-level de NOOP validés.
  on_fail:
    step: 1
    label: Corriger les anomalies de release avant reprise
    mandatory: true

allowed_transitions:
  on_pass_materialized_release:
    next_stage: STAGE_08_PROMOTE_CURRENT
    precondition: >-
      En bounded_local_run, human must confirm update_run_tracking.py execution.
      En parallel_consolidation, nominal_global et bounded_transition,
      la transition est pipeline-level et ne dépend pas d'un run_id unique.
      Cette branche ne s'applique que si release_required=true et qu'une release
      a réellement été matérialisée.
  on_pass_noop_release:
    next_stage: STAGE_09_CLOSEOUT_AND_ARCHIVE
    precondition: >-
      En bounded_local_run, human must confirm update_run_tracking.py execution.
      En parallel_consolidation, nominal_global et bounded_transition,
      la transition est pipeline-level et ne dépend pas d'un run_id unique.
      Cette branche s'applique uniquement si le NOOP de release est confirmé
      par les artefacts réels de STAGE_07.
  on_fail:
    next_stage: STAGE_06_CORE_VALIDATION_or_STAGE_06B_CONSOLIDATION
  on_blocked:
    next_action: execute_release_chain_and_retry_same_stage

forbidden_actions:
  - simulated_release_chain_execution
  - pass_without_real_execution_evidence
  - pass_without_noop_evidence_when_release_required_false
  - pass_without_release_manifest_validation_when_release_required_true
  - direct_current_promotion
  - current_alias_update_without_stage_08
  - omitting_human_actions_from_output
  - using_nonexistent_release_cli_flags

migration_note: >-
  Premier skill STAGE_07 pour le pipeline constitution.
  Consolide en YAML machine-readable les règles de release du pipeline.
  Ajusté pour reconnaître explicitement le cas canonique de release NOOP
  (release_required=false) sans exiger artificiellement un manifest absent,
  et pour bypasser STAGE_08 lorsque rien n'est à promouvoir vers current.
