scope_generation_policy:
  schema_version: 0.1
  policy_id: CONSTITUTION_SCOPE_GENERATION_POLICY_V1
  status: active
  pipeline_id: constitution
  source_state:
    constitution_ref: docs/cores/current/constitution.yaml
    referentiel_ref: docs/cores/current/referentiel.yaml
    link_ref: docs/cores/current/link.yaml
    source_fingerprint: TO_BE_FILLED
  output_contract:
    catalog_manifest_path: docs/pipelines/constitution/scope_catalog/manifest.yaml
    scope_definitions_dir: docs/pipelines/constitution/scope_catalog/scope_definitions
    catalog_id: CONSTITUTION_SCOPE_CATALOG_V1
    catalog_status: generated
  generation_mode:
    scope_definitions_are_generated_outputs: true
    canonical_source_of_truth_remains_current_cores: true
    regenerate_after_canonical_change: true
  shared_defaults:
    provenance:
      source_pipeline: constitution
      extraction_mode: deterministic_governed
      source_artifacts:
      - docs/cores/current/constitution.yaml
      - docs/cores/current/referentiel.yaml
      - docs/cores/current/link.yaml
    target:
      artifact_family: constitution
    governance:
      default_allowed_operations:
      - challenge
      - arbitrage
      - patch
      - local_validation
      default_forbidden_operations:
      - direct_current_promotion
      - silent_out_of_scope_modification
      - implicit_cross_core_reallocation
      scope_extension_policy:
        explicit_decision_required: true
    maturity:
      scoring_model_ref: docs/transformations/core_modularization/CONSTITUTION_SCOPE_MATURITY_MODEL.md
    read_surface:
      mode: ids_first_with_explicit_file_fallback
      fallback_files:
      - docs/cores/current/constitution.yaml
      - docs/cores/current/referentiel.yaml
      - docs/cores/current/link.yaml
      fallback_trigger_conditions:
      - unresolved_ambiguity
      - unresolved_cross_core_dependency
      - collision_detected
      - integration_gate_requires_wider_reread
  declared_scopes:
  - scope_key: deployment_governance
    scope_id: CONSTITUTION_SCOPE_DEPLOYMENT_GOVERNANCE
    publication_status: published_generated
    target_files:
    - docs/cores/current/constitution.yaml
    target_modules:
    - deployment
    - runtime_architecture
    - runtime_governance
    - governance
    - initialization
    - system
    neighbor_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    watchpoints:
    - Vérifier que les contraintes d'architecture locale (INV_RUNTIME_FULLY_LOCAL) ne glissent pas vers des règles pédagogiques.
    - Vérifier que la séparation Constitution/Référentiel reste inviolable et explicitement tracée.
    - Vérifier que les régimes d'autonomie restent des configurations, pas des règles adaptatives.
    - Vérifier que les règles de gouvernance top-level (GF-08, gamification) n'empiètent pas sur patch_lifecycle.
    - Ne pas confondre contraintes constitutionnelles invariantes et paramètres référentiels.
    maturity:
      axes:
        clarity_of_scope: 4
        internal_coherence: 2
        inter_scope_boundaries: 2
        dependency_explicitness: 4
        bounded_run_executability: 4
        inter_release_stability: 2
      score_total: 18
      level: L3_operational
      rationale:
      - Périmètre bien borné sur les contraintes architecturales et de gouvernance invariantes.
      - Forte stabilité inter-release, ces règles ne varient pas au fil des sessions.
      - Frontières claires avec learner_state et patch_lifecycle.
      - Maturity synchronized from docs/pipelines/constitution/reports/scope_maturity_scoring_report.yaml by PHASE_17 computed-score
        authority migration. Scope=deployment_governance; scoring_status=WARN; blocking_finding_count=0.
    notes:
    - Scope généré deployment_governance. Couvre l'architecture runtime locale, les régimes d'autonomie, la gouvernance top-level,
      la séparation Constitution/Référentiel et l'initialisation conservative.
  - scope_key: knowledge_and_design
    scope_id: CONSTITUTION_SCOPE_KNOWLEDGE_AND_DESIGN
    publication_status: published_generated
    target_files:
    - docs/cores/current/constitution.yaml
    target_modules:
    - knowledge_model
    - analysis
    - analysis_design
    - analysis_runtime_graph
    - design
    - design_governance
    - design_runtime
    neighbor_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    watchpoints:
    - Vérifier la frontière entre structure du graphe (topologie, acyclicité) et règles d'évaluation runtime.
    - Vérifier que INV_EXPLICIT_DEPENDENCY_EDGES_REQUIRED reste associé à ce scope et non à mastery_evaluation.
    - Vérifier que le contexte authentique est bien une contrainte de design, pas une règle runtime.
    - Ne pas dériver de règles adaptatives depuis les invariants de structure de graphe.
    - Vérifier que les règles de misconception restent dans la phase design et ne glissent pas vers learner_state.
    maturity:
      axes:
        clarity_of_scope: 4
        internal_coherence: 3
        inter_scope_boundaries: 4
        dependency_explicitness: 4
        bounded_run_executability: 4
        inter_release_stability: 3
      score_total: 22
      level: L4_strong
      rationale:
      - Scope couvrant la totalité de la phase Analyse/Design du domaine.
      - Consolidation de knowledge_model et content_design en un scope cohérent de pré-déploiement.
      - Frontières à surveiller avec mastery_evaluation sur les règles de propagation graphe.
      - Maturity synchronized from docs/pipelines/constitution/reports/scope_maturity_scoring_report.yaml by PHASE_17 computed-score
        authority migration. Scope=knowledge_and_design; scoring_status=WARN; blocking_finding_count=0.
    notes:
    - Scope généré knowledge_and_design. Couvre la structure du domaine (graphe, KU, acyclicité, contexte authentique, Bloom),
      la matrice de feedback et les règles de design pédagogique (misconception, modal, créativité). Phase Analyse/Design
      pure, aucune exécution runtime.
  - scope_key: learner_state
    scope_id: CONSTITUTION_SCOPE_LEARNER_STATE
    publication_status: published_generated
    target_files:
    - docs/cores/current/constitution.yaml
    target_modules:
    - runtime_state
    - runtime_feedback
    - runtime_observability
    - runtime_transparency
    - runtime_resume
    neighbor_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    watchpoints:
    - Ne pas transformer un seuil référentiel en règle constitutionnelle implicite.
    - Ne pas déduire une inférence psychologique plus forte que le cadre autorisé.
    - Vérifier les frontières entre état unknown, détresse, conservatisme et escalade.
    - Vérifier que les liens au Référentiel restent explicites et non silencieux.
    - Vérifier que runtime_resume reste bien dans ce scope (lien état > lien MSC).
    - Ne pas confondre les AR comme sources d'état (ce scope) et comme déclencheurs de patch (patch_lifecycle).
    maturity:
      axes:
        clarity_of_scope: 4
        internal_coherence: 3
        inter_scope_boundaries: 2
        dependency_explicitness: 4
        bounded_run_executability: 4
        inter_release_stability: 2
      score_total: 19
      level: L3_operational
      rationale:
      - Périmètre élargi par rapport à l'ancienne version pour couvrir feedback AR et reprise.
      - Frontières encore perfectibles avec mastery_evaluation et patch_lifecycle.
      - Suffisamment stable et exécutable pour un pilote borné prudent.
      - Maturity synchronized from docs/pipelines/constitution/reports/scope_maturity_scoring_report.yaml by PHASE_17 computed-score
        authority migration. Scope=learner_state; scoring_status=WARN; blocking_finding_count=0.
    notes:
    - Scope généré learner_state (périmètre élargi). Couvre l'état apprenant 3 axes, les auto-rapports AR-N1/N2/N3, la détresse,
      la VC, le scaffolding conservateur, la reprise diagnostique et la transparence apprenant.
  - scope_key: mastery_evaluation
    scope_id: CONSTITUTION_SCOPE_MASTERY_EVALUATION
    publication_status: published_generated
    target_files:
    - docs/cores/current/constitution.yaml
    target_modules:
    - runtime_evaluation
    - runtime_graph
    - runtime_integrity
    - runtime_safety
    neighbor_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    watchpoints:
    - Ne pas diluer la logique MSC AND strict dans des simplifications de score.
    - Préserver la séparation entre maîtrise de base (P+R+A) et transférabilité (T).
    - Vérifier les frontières entre évaluation locale, propagation graphe et dépendances référentielles.
    - Vérifier qu'une composante non calculable reste deferred et ne tombe jamais implicitement à false.
    - Vérifier que INV_GRAPH_PROPAGATION_ONE_HOP reste dans ce scope et non dans knowledge_and_design.
    - Ne pas laisser les règles d'intégrité session (SIS, NC_MSC) glisser vers learner_state.
    maturity:
      axes:
        clarity_of_scope: 4
        internal_coherence: 3
        inter_scope_boundaries: 4
        dependency_explicitness: 4
        bounded_run_executability: 4
        inter_release_stability: 3
      score_total: 22
      level: L4_strong
      rationale:
      - Scope très cohérent autour du cycle complet d'évaluation de maîtrise.
      - Intègre intégrité session et sécurité runtime liée à l'évaluation.
      - Dépendances explicites mais frontières à surveiller avec knowledge_and_design et learner_state.
      - Maturity synchronized from docs/pipelines/constitution/reports/scope_maturity_scoring_report.yaml by PHASE_17 computed-score
        authority migration. Scope=mastery_evaluation; scoring_status=WARN; blocking_finding_count=0.
    notes:
    - Scope généré mastery_evaluation (ex mastery_model élargi). Couvre le modèle MSC (P/R/A/T), la propagation graphe, l'intégrité
      de session, la sécurité runtime liée à l'évaluation et les investigations systémiques.
  - scope_key: patch_lifecycle
    scope_id: CONSTITUTION_SCOPE_PATCH_LIFECYCLE
    publication_status: published_generated
    target_files:
    - docs/cores/current/constitution.yaml
    target_modules:
    - patch_layer
    - patch_validation
    - patch_architecture
    - patch_governance
    neighbor_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    watchpoints:
    - Vérifier que la validation locale reste strictement déterministe (INV_PATCH_LOCAL_VALIDATION_MUST_BE_DETERMINISTIC).
    - Vérifier que les artefacts patch sont toujours précomputés hors session avant application.
    - Ne pas laisser les déclencheurs de patch gouvernés glisser vers des mécanismes d'adaptation runtime directe.
    - Vérifier la frontière entre patch relevance/AR (déclencheurs ici) et l'état qui les génère (learner_state).
    - Ne pas confondre escalade hors session (patch_lifecycle) et escalade d'état (learner_state).
    maturity:
      axes:
        clarity_of_scope: 4
        internal_coherence: 3
        inter_scope_boundaries: 1
        dependency_explicitness: 4
        bounded_run_executability: 3
        inter_release_stability: 2
      score_total: 17
      level: L3_operational
      rationale:
      - Scope bien défini conceptuellement mais encore en rodage opérationnel.
      - Frontières à surveiller avec learner_state sur les déclencheurs AR/VC.
      - Architecture off-session solide mais exécutabilité bornée encore à valider.
      - Maturity synchronized from docs/pipelines/constitution/reports/scope_maturity_scoring_report.yaml by PHASE_17 computed-score
        authority migration. Scope=patch_lifecycle; scoring_status=WARN; blocking_finding_count=0.
    notes:
    - 'Scope généré patch_lifecycle. Couvre le cycle complet de vie des patches : structure, validation déterministe, architecture
      off-session, déclencheurs gouvernés (VC, AR-réfractaire) et escalade dérive persistante.'
  serialization_policy:
    stable_sort_required: true
    scope_sort_key:
    - scope_key
    - scope_id
    id_sort_mode: lexical
    yaml_style: block
  core_role_classification:
    owned_core_family: constitution
    owned_core_files:
    - docs/cores/current/constitution.yaml
    external_read_only_core_files:
    - docs/cores/current/referentiel.yaml
    - docs/cores/current/link.yaml
    default_cross_core_write_policy: forbidden_without_explicit_cross_core_run_contract
    rationale: Constitution scope generation owns Constitution IDs. Referentiel and Link are readable external cores for Constitution
      bounded runs and must not be patched without an explicit cross-core governed run contract.
  id_classification_contract:
    constitution_owned:
      description: ID owned by exactly one published Constitution scope.
      requires_unique_owner: true
      blocking_if_missing_owner: true
    external_read_only_referentiel:
      description: Referentiel ID readable by Constitution runs but not owned by them.
      requires_unique_constitution_owner: false
      allowed_source_files:
      - docs/cores/current/referentiel.yaml
    external_read_only_link:
      description: Link ID readable by Constitution runs but not owned by them.
      requires_unique_constitution_owner: false
      allowed_source_files:
      - docs/cores/current/link.yaml
    shared_or_global:
      description: Explicitly governed shared/global ID classification.
      requires_explicit_decision: true
    missing_or_invalid:
      description: Referenced ID absent from canonical sources or not classified.
      blocking: true
  diagnostic_subclusters:
    status: scope_lab_only_until_promoted
    allowed_use:
    - explain cluster structure
    - guide neighbor review
    - guide future scope redesign
    forbidden_use:
    - direct ownership reassignment
    - generated catalog mutation without explicit decisions
    promotion_rule: A diagnostic subcluster may influence scope_generation decisions only after human arbitration. It is not
      itself an ownership boundary.
