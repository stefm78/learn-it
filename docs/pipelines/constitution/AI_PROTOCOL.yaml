ai_protocol:
  schema_version: 0.5
  protocol_id: CONSTITUTION_AI_PROTOCOL_V2
  authoritative_for_ai: true
  primary_entrypoint:
    - docs/pipelines/constitution/AI_PROTOCOL.yaml
    - docs/pipelines/constitution/pipeline.md

  state_chain:
    - docs/pipelines/constitution/runs/index.yaml
    - docs/pipelines/constitution/runs/<run_id>/run_manifest.yaml
    - docs/pipelines/constitution/runs/<run_id>/inputs/scope_manifest.yaml
    - docs/pipelines/constitution/runs/<run_id>/inputs/impact_bundle.yaml
    - docs/pipelines/constitution/runs/<run_id>/inputs/integration_gate.yaml

  run_manifest_schema:
    description: >
      Structure canonique obligatoire du run_manifest.yaml.
      Tout run ouvert par l'IA doit produire ces champs exactement.
    required_top_level_fields:
      - run_id
      - pipeline_id
      - mode
      - status
      - scope_key        # OBLIGATOIRE à la racine — requis par materialize_run_inputs.py et pipeline_launcher.py
      - scope_binding
      - source_state
      - materialized_inputs
      - execution_paths
      - current_stage
      - overrides
      - execution_state
      - scope_tracking
    scope_key_rule: >
      scope_key DOIT être présent au niveau run_manifest.scope_key (racine du bloc).
      Il DOIT aussi être dupliqué dans scope_binding.scope_key.
      Les scripts (materialize_run_inputs.py, pipeline_launcher.py) lisent
      exclusivement run_manifest.scope_key en source primaire.
      scope_binding.scope_key est conservé comme fallback de robustesse uniquement.

  # ---------------------------------------------------------------------------
  # RÈGLE CRITIQUE : fichiers de tracking interdits en écriture directe par l'IA
  # ---------------------------------------------------------------------------
  forbidden_direct_writes:
    description: >
      L'IA ne doit JAMAIS pousser directement les fichiers de tracking d'un run.
      Ces fichiers sont produits EXCLUSIVEMENT par les scripts déterministes dédiés.
      Un push direct bypass la logique interne, casse la cohérence entre fichiers
      canoniques, et compromet la traçabilité déterministe du pipeline.
    forbidden_files:
      - pattern: "runs/<run_id>/inputs/run_context.yaml"
        owner_script: "docs/patcher/shared/build_run_context.py"
        reason: >
          run_context.yaml est reconstruit déterministiquement par build_run_context.py
          à partir de run_manifest.yaml, scope_extract.yaml et neighbor_extract.yaml.
          Un push manuel produit un fichier incohérent avec les sources canoniques.
      - pattern: "runs/<run_id>/run_manifest.yaml"
        owner_script: "docs/patcher/shared/update_run_tracking.py"
        reason: >
          run_manifest.yaml est mis à jour exclusivement par update_run_tracking.py.
          Toute modification directe bypass l'audit trail et les validations du script.
      - pattern: "runs/<run_id>/run_tracking.yaml"
        owner_script: "docs/patcher/shared/update_run_tracking.py"
        reason: >
          run_tracking.yaml est produit et maintenu exclusivement par update_run_tracking.py.
      - pattern: "runs/index.yaml"
        owner_script: "docs/patcher/shared/update_run_tracking.py"
        reason: >
          index.yaml est mis à jour par update_run_tracking.py (--close-run notamment).
          Un push direct casse la synchronisation avec run_manifest.
    recovery_procedure: >
      Si l'IA a pushé directement un de ces fichiers par erreur :
      1. Signaler immédiatement à l'humain.
      2. Exécuter update_run_tracking.py avec les bons paramètres — cela écrase
         la version incorrecte par la version déterministe.
      3. Exécuter build_run_context.py pour reconstruire run_context.yaml.
      Le push manuel est alors neutralisé par la version canonique.
    enforcement: >
      Cette règle est une obligation absolue, pas une recommandation.
      Elle s'applique même si l'IA juge que le contenu qu'elle produirait
      serait identique au résultat du script.

  no_run_id_mode:
    mode: entry_gate_zero_search
    allowed_reads:
      - docs/pipelines/constitution/AI_PROTOCOL.yaml
      - docs/pipelines/constitution/pipeline.md
      - docs/pipelines/constitution/runs/index.yaml
      - docs/pipelines/constitution/scope_catalog/manifest.yaml
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
    forbidden_before_entry_decision:
      - any_search
      - compare_commits
      - docs/cores/current/constitution.yaml
      - docs/cores/current/referentiel.yaml
      - docs/cores/current/link.yaml
      - docs/prompts/shared/Challenge_constitution.md
      - docs/prompts/shared/Make04ConstitutionArbitrage.md
      - docs/pipelines/constitution/inputs/*
      - docs/pipelines/constitution/work/*
      - docs/pipelines/constitution/reports/*
    decision_algorithm:
      if_active_runs_count_eq_0: propose_create_new_run_or_partition_refresh
      if_active_runs_count_eq_1: ask_continue_existing_or_open_new_on_other_scope
      if_active_runs_count_gt_1: ask_disambiguation_with_shortlist
    decision_output_requirements:
      must_offer:
        - continue_active_run
        - open_new_run
        - review_scope_partition_if_no_active_run
      should_include_if_available:
        - active_run_id
        - active_scope_key
        - active_current_stage
        - shortlist_of_other_scope_keys
        - governance_backlog_open_count   # signaler si entrées open dans le backlog
    stop_after_decision: true

  run_id_mode:
    # Ordre de lecture optimal (ids-first, contexte minimal):
    #   1. run_context.yaml        <- fichier synthétique: run_id, stage, scope_ids, neighbor_ids
    #   2. scope_extract.yaml      <- entrées Core du scope uniquement
    #   3. neighbor_extract.yaml   <- entrées Core du voisinage uniquement
    # Les fichiers ci-dessous restent autorisés mais ne sont plus nécessaires
    # si run_context.yaml est présent et à jour.
    optimal_read_sequence:
      - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/scope_extract.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/neighbor_extract.yaml
    allowed_reads:
      - docs/pipelines/constitution/AI_PROTOCOL.yaml
      - docs/pipelines/constitution/pipeline.md
      - docs/pipelines/constitution/runs/index.yaml
      - docs/pipelines/constitution/runs/<run_id>/run_manifest.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/run_context.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/scope_manifest.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/impact_bundle.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/integration_gate.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/scope_extract.yaml
      - docs/pipelines/constitution/runs/<run_id>/inputs/neighbor_extract.yaml
    forbidden_before_run_resolution:
      - any_search
      - compare_commits
      - docs/cores/current/constitution.yaml
      - docs/cores/current/referentiel.yaml
      - docs/cores/current/link.yaml
      - docs/pipelines/constitution/inputs/*
    if_run_exists: resume_existing_run
    if_run_missing: emit_next_best_action_only
    ids_first_rule: >
      Si run_context.yaml est présent, l'IA DOIT le lire en premier et utiliser
      scope_extract.yaml + neighbor_extract.yaml comme source principale des entrées Core.
      Les Core complets (constitution.yaml, referentiel.yaml, link.yaml) ne doivent être
      lus que si missing_ids est non vide dans les extraits.

  partition_refresh_mode:
    precondition:
      no_active_runs_required: true
    allowed_reads:
      - docs/pipelines/constitution/AI_PROTOCOL.yaml
      - docs/pipelines/constitution/pipeline.md
      - docs/pipelines/constitution/runs/index.yaml
      - docs/pipelines/constitution/STAGE_00_SCOPE_PARTITION_REVIEW_AND_REGEN.md
      - docs/pipelines/constitution/policies/scope_generation/policy.yaml
      - docs/pipelines/constitution/policies/scope_generation/decisions.yaml
      - docs/pipelines/constitution/scope_catalog/manifest.yaml
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
    forbidden_if_active_runs: true
    mandatory_script:
      - docs/patcher/shared/analyze_constitution_scope_partition.py
    mandatory_reads_before_semantic_analysis:
      - docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
    publication_rule:
      - semantic_review_is_advisory_only_until_policy_and_decisions_are_updated_and_generate_constitution_scopes_py_is_executed

  governance_backlog_rule:
    backlog_path: docs/pipelines/constitution/scope_catalog/governance_backlog.yaml
    populated_by: closeout_pipeline_run.py --export-backlog-entries
    read_mandatory_at:
      - STAGE_00
    signal_at_launcher_if_open_entries_for_scope: true
    stage_00_completion_gate: >
      Le STAGE_00 ne peut pas être déclaré done si des entrées open n'ont pas été
      explicitement addressed ou wont_fix avec justification.
    run_note_rule: >
      Pendant un run, les notes de gouvernance sont capturées dans arbitrage.md (local run).
      L'export canonique vers governance_backlog.yaml se fait uniquement en clôture (STAGE_09)
      via closeout_pipeline_run.py --export-backlog-entries.

  deterministic_script_policy:
    mandatory_behavior: true
    rules:
      - any_stage_that_declares_a_deterministic_validation_or_execution_script_as_required_must_not_be_considered_complete_until_that_script_has_been_actually_executed
      - the_ai_must_never_simulate_or_assume_execution_of_a_required_script
      - if_the_ai_cannot_execute_the_script_itself_it_must_provide_the_exact_command_to_the_user_and_keep_the_stage_status_non_final_until_real_execution_feedback_is_available
      - logical_review_or_document_reading_may_complement_a_required_script_execution_but_must_never_replace_it
      - the_ai_must_never_directly_push_files_owned_by_a_deterministic_script_see_forbidden_direct_writes
    examples:
      - stage_01_challenge_requires_materialize_run_inputs_py_execution_before_start_in_bounded_mode
      - stage_04_patch_validation_requires_validate_patchset_py_execution_before_done
      - stage_05_apply_requires_real_apply_patch_py_execution_before_done
      - run_tracking_update_requires_update_run_tracking_py_not_direct_file_push

  tracking:
    # Arguments EXACTS de update_run_tracking.py — ne pas abréger ni renommer.
    # Erreurs connues à éviter absolument :
    #   --stage         → INVALIDE  (ambigu entre --stage-id et --stage-status)
    #   --status        → INVALIDE  (n'existe pas)
    #   --pipeline omis → INVALIDE  (argument obligatoire)
    #   --run-status omis → INVALIDE (argument obligatoire)
    required_args:
      - --pipeline constitution
      - --run-id <RUN_ID>
      - --stage-id <STAGE_ID>
      - --stage-status <done|in_progress|blocked|failed|skipped>
      - --run-status <bootstrap_open|active|blocked|failed|closed>
    optional_args:
      - --next-stage <NEXT_STAGE_ID>
      - --scope-status <SCOPE_STATUS>
      - --summary '<SUMMARY>'
      - --close-run
    bootstrap_command_template: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id <STAGE_ID>
      --stage-status in_progress
      --run-status active
      --next-stage <STAGE_ID>
      --scope-status <SCOPE_STATUS>
      --summary "<ENTRY_DECISION_SUMMARY>"
    closeout_command_template: >-
      python docs/patcher/shared/update_run_tracking.py
      --pipeline constitution
      --run-id <RUN_ID>
      --stage-id <STAGE_ID>
      --stage-status <done|blocked|failed>
      --run-status <active|blocked|failed|closed>
      --next-stage <NEXT_STAGE_ID>
      --scope-status <SCOPE_STATUS>
      --summary "<STAGE_SUMMARY>"

  anti_patterns:
    - deep_read_before_entry_decision
    - repo_wide_search_for_entry_resolution
    - compare_commits_for_entry_resolution
    - reading_flat_layout_when_run_layout_exists
    - implicit_resume_when_user_did_not_provide_run_id
    - simulating_required_script_execution
    - declaring_stage_done_without_required_deterministic_script_evidence
    - opening_run_without_scope_key_at_top_level_of_run_manifest
    - reading_full_core_when_extract_is_available_and_complete
    - ignoring_open_governance_backlog_entries_at_stage_00
    - using_abbreviated_args_for_update_run_tracking_py  # --stage / --status / omitting --pipeline ou --run-status
    - direct_push_of_run_context_yaml_bypassing_build_run_context_py
    - direct_push_of_run_manifest_yaml_bypassing_update_run_tracking_py
    - direct_push_of_run_tracking_yaml_bypassing_update_run_tracking_py
    - direct_push_of_index_yaml_bypassing_update_run_tracking_py

  responses:
    single_active_run: "Je vois un run actif: <RUN_ID> sur <SCOPE_KEY>, actuellement sur <CURRENT_STAGE>. On peut soit continuer ce run, soit ouvrir un nouveau run sur un autre scope publié. Recommandation: continuer le run actif."
    no_active_run: "Aucun run actif n'est ouvert. On peut soit ouvrir un nouveau run à partir d'un scope publié, soit lancer un refresh optionnel du partitionnement des scopes avant d'ouvrir de nouveaux runs."
    ambiguous: "emit_short_next_best_action_only"
