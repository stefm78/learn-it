ai_protocol_scope_selection_patch:
  schema_version: 0.1
  target_protocol: docs/pipelines/constitution/AI_PROTOCOL.yaml
  intent: >-
    Ajuster le comportement d'entrée sans run_id pour qu'il ne déclenche pas
    directement la reprise du run actif, mais propose aussi l'ouverture d'un
    nouveau run sur un autre scope publié.

  required_behavior_change:
    no_run_id_mode:
      if_active_runs_count_eq_1:
        old_behavior: ask_continue_or_new_run
        new_behavior: ask_continue_existing_or_open_new_on_other_scope
      response_policy:
        must_offer:
          - continue_active_run
          - open_new_run
        should_include:
          - active_run_id
          - active_scope_key
          - active_current_stage
          - shortlist_of_other_scope_keys_if_available
      response_example: >-
        Je vois un run actif: <RUN_ID> sur <SCOPE_KEY>, actuellement sur
        <CURRENT_STAGE>. On peut soit continuer ce run, soit ouvrir un nouveau
        run sur un autre scope publié. Choix recommandé: continuer le run actif.

  notes:
    - >-
      L'absence de run_id ne doit pas provoquer de reprise implicite. La réponse
      attendue est une proposition de choix structurée.
