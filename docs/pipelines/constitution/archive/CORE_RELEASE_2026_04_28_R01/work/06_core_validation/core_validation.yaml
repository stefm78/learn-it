    status: PASS
    blocking_anomalies_count: 0
    non_blocking_findings_count: 2
    checks:
      duplicate_rules_and_id_collisions:
        status: PASS
        rationale: >-
          The patch replaced fields on existing IDs only and did not append, rename or remove canonical IDs.
      orphan_dependencies:
        status: PASS
        rationale: >-
          The patch did not introduce new dependencies or relations. Existing references are therefore not expanded
          by the patched content.
      implicit_relations:
        status: PASS
        rationale: >-
          Patched logic clarifies existing semantic boundaries without adding implicit relation edges.
      invariant_integrity:
        status: PASS
        rationale: >-
          Patched invariants strengthen deterministic validation, rollback safety and escalation boundaries without
          making non-patchable invariants operationally mutable at runtime.
      logical_consistency:
        status: PASS
        rationale: >-
          The patch consistently separates local deterministic verification from off-session pedagogical QA, and
          separates patch_lifecycle signal consumption from learner_state signal production.
      source_anchor_completeness:
        status: PASS
        rationale: >-
          The patch modifies fields on existing objects and preserves their existing source_anchor values.
      relation_coherence:
        status: PASS
        rationale: >-
          No new relations were introduced. Existing relations remain unchanged.
      graph_connectivity:
        status: PASS
        rationale: >-
          No object was added, removed or renamed, so graph connectivity is not degraded by this patch.
      reinflation_readiness:
        status: PASS
        rationale: >-
          The sandbox Constitution remains a structured Core YAML with CORE id CORE_LEARNIT_CONSTITUTION_V4_0.
      core_type_alignment:
        status: PASS
        rationale: >-
          The applied file is Constitution and the execution report confirms actual_core_id CORE_LEARNIT_CONSTITUTION_V4_0.
