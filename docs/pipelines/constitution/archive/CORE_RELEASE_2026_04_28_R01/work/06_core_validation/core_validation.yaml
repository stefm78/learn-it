        rationale: >-
          The patch intentionally avoided referentiel.yaml, link.yaml, generated scope catalog files and learner_state
          ownership. Remaining external-read-only alignment work is a governance follow-up, not a STAGE_06 blocker
          for this patch_lifecycle sandbox validation.
        correction: >-
          Preserve as follow-up/backlog; do not correct in this run unless an explicit cross-core change request
          or dedicated run is opened.
      - finding_id: CV-NB-002
