    - op: note
      id: MANUAL_REGISTRY_BACKUPS
      value: >-
        Les fichiers .bak visibles dans docs/registry/ restent hors du patchset et doivent être
        traités par edit manuel limité conformément à l’arbitrage stage 03.

    - op: note
      id: MANUAL_SCAN_CLEANUP
      value: >-
        Le nettoyage de docs/pipelines/governance/work/01_scan/repo_inventory.md reste hors du patchset
        et doit être traité par edit manuel limité conformément à l’arbitrage stage 03.
