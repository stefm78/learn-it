integration_decisions:
  schema_version: 0.1
  decisionset_id: INTEGRATION_DECISIONS_YYYY_MM_DD_R01
  status: draft
  pipeline_family: constitution

  source_state:
    source_fingerprint: TO_BE_FILLED
    policy_ref: docs/transformations/core_modularization/templates/integration_policy.template.yaml

  decisions:
    - decision_id: INTEGRATION_DECISION_001
      status: approved
      decision_type: accept_run_into_integrated_changeset
      run_ids:
        - CONSTITUTION_RUN_YYYY_MM_DD_LEARNER_STATE_R01
      target_ids:
        - RULE_MULTI_AXIS_UNKNOWN_OR_UNOBSERVABLE_SAFE_ENTRY
      decision_payload:
        integration_action: accept
        priority: normal
      applies_from: 2026-04-12
      decided_by: human
      challenged_with_ai: true
      justification: >-
        Le run est localement validé et son changement est jugé compatible avec
        les invariants globaux rejoués.

    - decision_id: INTEGRATION_DECISION_002
      status: approved
      decision_type: reject_change_requires_scope_extension
      run_ids:
        - CONSTITUTION_RUN_YYYY_MM_DD_LEARNER_STATE_R01
      target_ids:
        - RULE_AR_N1_OVERRIDES_PROXY
      decision_payload:
        integration_action: reject
        reason: requires_scope_extension
      applies_from: 2026-04-12
      decided_by: human
      challenged_with_ai: true
      justification: >-
        Le changement est pertinent mais ne peut pas être intégré sans
        élargissement explicite du scope et arbitrage inter-Core.

  notes:
    - >-
      Ce fichier capture les arbitrages humains normalisés qui spécialisent la
      politique d'intégration globale avant reconstruction canonique.
