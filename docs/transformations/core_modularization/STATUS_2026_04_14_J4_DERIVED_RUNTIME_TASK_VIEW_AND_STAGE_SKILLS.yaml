snapshot:
  id: J4_DERIVED_RUNTIME_TASK_VIEW_AND_STAGE_SKILLS
  transformation_id: CORE_MODULARIZATION_BOOTSTRAP
  recorded_on: 2026-04-14
  status: in_progress
  owner_mode: human_plus_successive_ai
  summary: >-
    Nouveau chantier ouvert sur le pipeline constitution : remplacer la logique
    de task capsule persistée par une vue runtime dérivée dans
    `run_context.yaml`, alimentée par des skills de stage génériques et une
    orchestration externe légère.

context:
  previous_runtime_model:
    - pipeline.md as broad operational spec
    - AI_PROTOCOL.yaml as broad AI entry contract
    - update_run_tracking.py for state updates and run_context rebuild
    - build_run_context.py for minimal synthetic read surface
    - tmp/pipeline_launcher.py for orchestration and prompt prebuilding
  target_runtime_model:
    - PIPELINE_MODEL.yaml as minimal state machine
    - stage skill files under docs/pipelines/constitution/stages/
    - enriched run_context.yaml as derived executable task view
    - launcher consuming run_context first

decisions:
  - id: NO_PERSISTED_TASK_CAPSULES
    status: decided
    note: >-
      Le repo ne doit pas introduire des `*.task.yaml` persistés par run comme
      nouvelle source quasi-canonique. La vue de tâche doit être dérivée.
  - id: KEEP_UPDATE_RUN_TRACKING_SOBER
    status: decided
    note: >-
      `update_run_tracking.py` reste centré sur l'état canonique du run et la
      synchronisation ; il ne porte pas la logique métier détaillée des stages.
  - id: ENRICH_RUN_CONTEXT_AS_TASK_VIEW
    status: decided
    note: >-
      `build_run_context.py` est le point naturel pour construire une task view
      dérivée suffisante pour l'exécution IA d'un stage.
  - id: KEEP_EXTERNAL_ORCHESTRATION
    status: decided
    note: >-
      Le launcher garde la responsabilité de choisir le pipeline, le run et le
      type d'action (`continue`, `open_new_run`, `consolidate`, `promote`).

first_deliverables:
  - id: CONSTITUTION_PIPELINE_MODEL_BOOTSTRAP
    status: started
    output: docs/pipelines/constitution/PIPELINE_MODEL.yaml
  - id: CONSTITUTION_STAGE_01_SKILL_BOOTSTRAP
    status: started
    output: docs/pipelines/constitution/stages/STAGE_01_CHALLENGE.skill.yaml

next_steps:
  - Define and commit the minimal state machine for constitution.
  - Commit a first stage skill pilot for STAGE_01_CHALLENGE.
  - Evolve build_run_context.py schema to expose next_executable_stage and skill_ref.
  - Adapt tmp/pipeline_launcher.py to consume the derived task view.

propagation_rule:
  - Constitution first.
  - Generalize to other pipelines only after end-to-end validation.
