transformation:
  id: CORE_MODULARIZATION_BOOTSTRAP
  title: Modularisation des Core et adaptation des pipelines
  branch: feat/core-modularization-bootstrap
  status: active
  owner_mode: human_plus_successive_ai
  started_on: 2026-04-11
  objective: >-
    Transformer progressivement le régime documentaire et pipeline du repo pour
    permettre le traitement de sous-ensembles bornés, sans perte de rigueur ni
    de cohérence canonique globale.

current_state:
  phase_id: P0
  phase_label: Bootstrap du chantier
  phase_status: done
  overall_progress_percent: 8
  confidence: medium
  summary: >-
    Le socle minimal de continuité est posé sur une branche dédiée. La
    transformation est désormais traçable, reprenable et gouvernable sans dépendre
    du contexte implicite d'une conversation unique.

completed:
  - id: BOOTSTRAP_BRANCH_CREATED
    status: done
    note: Branche dédiée créée depuis la baseline main.
  - id: BOOTSTRAP_ENTRYPOINT_CREATED
    status: done
    note: README de transformation ajouté.
  - id: BOOTSTRAP_ROADMAP_CREATED
    status: done
    note: Roadmap initiale ajoutée.
  - id: BOOTSTRAP_STATUS_CREATED
    status: done
    note: Fichier STATUS.yaml ajouté.
  - id: BOOTSTRAP_WORKLOG_PENDING
    status: in_progress
    note: Journal append-only à initialiser.

next_targets:
  - id: J1_SCOPE_CONTRACT
    priority: high
    status: todo
    description: Définir le contrat minimal d'un run borné.
  - id: J1_CONSTITUTION_PIPELINE_DELTA
    priority: high
    status: todo
    description: Définir les changements minimaux à apporter au pipeline constitution.
  - id: J1_TARGET_SOURCE_LAYOUT
    priority: medium
    status: todo
    description: Définir la structure cible minimale des sources modulaires.

non_goals_yet:
  - Refonte complète et immédiate des pipelines existants.
  - Déplacement effectif des artefacts canoniques vers un nouveau layout source.
  - Implémentation immédiate des compileurs, validateurs et projections dérivées.

guardrails:
  - Le canon publié reste unique tant que la nouvelle chaîne n'est pas validée.
  - Les pipelines existants restent la référence opérationnelle tant qu'ils ne sont pas explicitement adaptés.
  - Le parallélisme s'applique aux scopes locaux, pas à la promotion finale.
  - Toute reprise doit mettre à jour STATUS.yaml et WORKLOG.md.

risks:
  - id: RISK_SCOPE_OVERDESIGN
    severity: medium
    description: Concevoir trop de mécanismes avant d'avoir un premier contrat de scope minimal.
  - id: RISK_PIPELINE_EXPLOSION
    severity: high
    description: Multiplier pipelines et prompts au lieu de rendre les artefacts existants scope-aware.
  - id: RISK_HIDDEN_STATE
    severity: high
    description: Laisser des décisions seulement dans des échanges conversationnels et non dans le repo.

resume_protocol:
  ordered_reading:
    - docs/transformations/core_modularization/README.md
    - docs/transformations/core_modularization/ROADMAP.md
    - docs/transformations/core_modularization/STATUS.yaml
    - docs/transformations/core_modularization/WORKLOG.md
  mandatory_before_next_change:
    - Lire les artefacts de transformation ci-dessus.
    - Vérifier la branche active de travail.
    - Ajouter une entrée WORKLOG avant ou juste après un changement significatif.

immediate_next_step:
  id: INIT_WORKLOG_AND_DEFINE_J1
  description: >-
    Initialiser le WORKLOG puis poser le premier livrable J1 : contrat minimal
    d'un run borné (`scope_manifest`, `impact_bundle`, `integration_gate`).
