  description: >-
    Lancer le launcher corrigé (`python tmp/pipeline_launcher.py --parallel-runs 4`)
    pour vérifier le stage_prompt solo STAGE_08, puis exécuter la promotion du
    run CONSTITUTION_RUN_2026_04_11_LEARNER_STATE_R01 vers docs/cores/current/.
    En parallèle (slot 2), ouvrir un nouveau run sur le scope suivant disponible.
