transformation:
  id: CORE_MODULARIZATION_BOOTSTRAP
  title: Modularisation des Core et adaptation des pipelines
  branch: feat/core-modularization-bootstrap
  status: active
  owner_mode: human_plus_successive_ai
  started_on: 2026-04-11
  objective: >-
    Transformer progressivement le régime documentaire et pipeline du repo pour
    permettre le traitement de sous-ensembles bornés, sans perte de rigueur ni
    de cohérence canonique globale.

current_state:
  phase_id: P4
  phase_label: Consolidation IA + reprise de la transformation réelle
  phase_status: in_progress
  overall_progress_percent: 86
  confidence: medium
  summary: >-
    Le pipeline constitution est désormais run-aware et piloté côté IA par un
    point d'entrée unique `docs/pipelines/constitution/AI_PROTOCOL.yaml`.
    Un launcher léger candidat unique existe dans `tmp/pipeline_launcher.py`
    pour résoudre `continue / new run` à faible contexte. La priorité revient
    maintenant à la transformation réelle : nettoyage, publication effective de
    plusieurs scopes, puis exécution réelle du run learner_state.

