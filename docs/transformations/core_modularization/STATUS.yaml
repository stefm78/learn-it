transformation:
  id: CORE_MODULARIZATION_BOOTSTRAP
  title: Modularisation des Core et adaptation des pipelines
  branch: feat/core-modularization-bootstrap
  status: active
  owner_mode: human_plus_successive_ai
  started_on: 2026-04-11
  objective: >-
    Transformer progressivement le régime documentaire et pipeline du repo pour
    permettre le traitement de sous-ensembles bornés, sans perte de rigueur ni
    de cohérence canonique globale.

current_state:
  phase_id: P4
  phase_label: Consolidation de la modularisation bidirectionnelle
  phase_status: in_progress
  overall_progress_percent: 89
  confidence: medium
  summary: >-
    Le pipeline constitution est désormais run-aware et piloté côté IA par un
    point d'entrée unique `docs/pipelines/constitution/AI_PROTOCOL.yaml`.
    La transformation a maintenant clarifié deux marches structurelles
    supplémentaires : J2 pour la réduction de la surface de lecture effective
    des runs bornés, puis J3 pour la reconstruction canonique déterministe à
    partir de résultats bornés intégrés. La priorité de ce chantier devient la
    concrétisation ids-first/projection-first côté scopes et la préparation du
    contrat d'entrée d'un futur reconstructeur canonique.

