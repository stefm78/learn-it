non_goals_yet:
  - Refonte complète et immédiate de tous les pipelines.
  - Promotion du launcher hors de tmp avant stabilisation.
  - Implémentation immédiate de projections minimales générées automatiquement.

guardrails:
  - Le canon publié reste unique tant que la nouvelle chaîne n'est pas validée.
  - Les pipelines existants restent la référence opérationnelle tant qu'ils ne sont pas explicitement adaptés.
  - Le parallélisme s'applique aux scopes locaux, pas à la promotion finale.
  - Le launcher est un helper ; il ne doit pas devenir un chantier principal concurrent.
  - Toute reprise doit mettre à jour STATUS.yaml et WORKLOG.md.

immediate_next_step:
  id: CLEANUP_SCOPE_PUBLICATION_AND_REAL_RUN_EXECUTION
  description: >-
    Nettoyer les anciennes versions du launcher et les anciens docs RUN_*.md,
    publier effectivement le catalogue de scopes V0.2 si nécessaire, puis
    reprendre pour de vrai le run `CONSTITUTION_RUN_2026_04_11_LEARNER_STATE_R01`
    au STAGE_01_CHALLENGE avec tracking explicite.
