    authority: primary
    core_type: REFERENTIEL
    source_anchor: '[S3]'
    depends_on:
    - TYPE_REFERENTIEL_SIGNAL_CONFIDENCE_HIERARCHY
    relations: []
    patchable: true
    parameterizable: true
    human_readable: 'Ordre de résolution des signaux AR et proxys : AR-N1 > AR-N2
      > AR-N3 (calibration) > proxys > tendances. AR-N3 contribue à la hiérarchie
      via son effet de reweighting borné sur AR-N1, documenté dans RULE_REFERENTIEL_LOW_AR_CALIBRATION_TEMPORARILY_REWEIGHTS_SIGNALS.

      '
    logic:
      trigger: Signaux contradictoires
      condition: Plusieurs signaux simultanés
      effect: 'Priorité : AR-N1 > AR-N2 > AR-N3 (calibration, effet via reweighting
        borné) > proxys > tendances. L''effet d''AR-N3 sur AR-N1 est indirect et borné
        : il passe exclusivement par RULE_REFERENTIEL_LOW_AR_CALIBRATION_TEMPORARILY_REWEIGHTS_SIGNALS
        et PARAM_REFERENTIEL_LOW_AR_CALIBRATION_CONSECUTIVE_BILANS.

