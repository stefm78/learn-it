  - id: RULE_REFERENTIEL_ADAPTIVE_REGIME_CONFLICT_RESOLUTION
    authority: primary
    core_type: REFERENTIEL
    source_anchor: '[ARBITRAGE_2026_04_01][MATRIX-01]'
    depends_on:
    - TYPE_REFERENTIEL_ADAPTIVE_REGIME_MATRIX
    relations: []
    patchable: true
    parameterizable: true
    human_readable: 'Table de priorité par paire de conflits pour les cellules de
      frontière de la matrice des régimes adaptatifs. Règle synthétique : (1) Détresse
      l''emporte toujours. (2) Conservateur l''emporte sur Exploration et Consolidation
      (sauf MOT-01). (3) Consolidation l''emporte sur Sous-défi sauf si R est déjà
      atteint. (4) Exploration l''emporte sur Sous-défi. (5) Consolidation vs Exploration
      → régime oscillatoire piloté par R.

      '
    logic:
      trigger: Détection de deux régimes adaptatifs simultanément sur des cellules
        de frontière
      condition: Deux régimes ou plus activés simultanément dans la matrice.
      effect: "Application de la table de priorité : Détresse + tout autre : Détresse\
        \ prime. Conservateur + Sous-défi : Conservateur (borné par MOT-01). Conservateur\
        \ + Exploration : Conservateur. Conservateur + Consolidation : Conservateur.\
        \ Consolidation + Sous-défi : Sous-défi (si R atteint) sinon Consolidation.\
        \ Consolidation + Exploration : régime oscillatoire (alternance 1 session\n\
        \  consolidation satisfaisante → 1 session exploration → retour consolidation,\n\
        \  sortie quand R atteint).\nExploration + Sous-défi : Exploration.\n"
      scope: runtime_state
